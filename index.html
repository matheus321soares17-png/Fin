<title>FIN</title>

<style>
:root{
  --bg:#0d0d0d;--bg2:#111318;--bg3:#161a20;
  --glass:rgba(255,255,255,.04);--glass2:rgba(255,255,255,.07);
  --border:rgba(255,255,255,.09);--border2:rgba(255,255,255,.14);
  --em:#00e676;--em-dim:rgba(0,230,118,.12);--em-glow:rgba(0,230,118,.35);
  --rose:#ff3366;--rose-dim:rgba(255,51,102,.13);--rose-glow:rgba(255,51,102,.35);
  --cyan:#00e5ff;--cyan-dim:rgba(0,229,255,.1);--cyan-glow:rgba(0,229,255,.3);
  --amber:#ffab00;--amber-dim:rgba(255,171,0,.13);
  --purple:#7c3aed;--purple-dim:rgba(124,58,237,.15);
  --text:#f0f4f8;--text2:#8892a4;--text3:#3d4555;
  --r:14px;--rl:20px;--rxl:26px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;max-width:430px;margin:0 auto;display:flex;flex-direction:column}
#app{display:flex;flex-direction:column;height:100%;overflow:hidden;position:relative}
#hdr{flex-shrink:0;padding:0;background:#000;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,229,255,.15);position:relative;z-index:10}
#alerts-wrap{flex-shrink:0;padding:0 18px}
#content{flex:1;overflow-y:auto;padding:12px 18px 100px;-webkit-overflow-scrolling:touch}
#content::-webkit-scrollbar{width:0}
#nav{flex-shrink:0;position:relative;z-index:20;background:rgba(13,13,13,.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid rgba(255,255,255,.07);padding-bottom:env(safe-area-inset-bottom,0px)}

/* FAB */
#fab-wrap{position:fixed;bottom:80px;right:18px;z-index:50;display:flex;flex-direction:column;align-items:flex-end;gap:12px}
#fab-main{width:56px;height:56px;border-radius:50%;background:transparent;backdrop-filter:none;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:none;transition:all .25s;flex-shrink:0;border:none}
#fab-main.open{background:rgba(100,116,139,.4);box-shadow:0 4px 20px rgba(0,0,0,.25),0 0 0 1px rgba(255,255,255,.1)}
#fab-main svg{transition:transform .25s}
#fab-main.open svg{transform:rotate(45deg)}
.fab-opt{display:flex;align-items:center;gap:10px;opacity:0;transform:translateX(20px);pointer-events:none;transition:all .22s}
.fab-opt.show{opacity:1;transform:translateX(0);pointer-events:all}
.fab-opt-btn{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,.4)}
.fab-opt-lbl{background:rgba(0,0,0,.8);backdrop-filter:blur(10px);padding:5px 12px;border-radius:20px;font-size:13px;font-weight:700;white-space:nowrap}

/* Typography */
.mono{font-family:'JetBrains Mono',monospace}
.val{font-family:'JetBrains Mono',monospace;font-weight:600;letter-spacing:-.02em}
.lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.section-title{font-size:16px;font-weight:800;color:var(--text);margin-bottom:12px}

/* Cards */
.card{background:var(--glass);border:1px solid var(--border);border-radius:var(--rl)}
.card-glow-em{box-shadow:0 0 24px rgba(0,230,118,.08);border-color:rgba(0,230,118,.2)}
.card-glow-rose{box-shadow:0 0 24px rgba(255,51,102,.08);border-color:rgba(255,51,102,.2)}
.card-glow-cyan{box-shadow:0 0 24px rgba(0,229,255,.08);border-color:rgba(0,229,255,.2)}
.inset{background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:var(--r)}

/* Metric card hero */
.metric-hero{padding:16px 18px;border-radius:var(--rl);position:relative}
.metric-hero::before{content:'';position:absolute;inset:0;border-radius:inherit;opacity:.06}
.mh-em{background:linear-gradient(135deg,rgba(0,230,118,.15),rgba(0,230,118,.05));border:1px solid rgba(0,230,118,.25)}
.mh-rose{background:linear-gradient(135deg,rgba(255,51,102,.15),rgba(255,51,102,.05));border:1px solid rgba(255,51,102,.25)}
.mh-purple{background:linear-gradient(135deg,rgba(124,58,237,.15),rgba(124,58,237,.05));border:1px solid rgba(124,58,237,.25)}
.mh-cyan{background:linear-gradient(135deg,rgba(0,229,255,.12),rgba(0,229,255,.04));border:1px solid rgba(0,229,255,.2)}

/* Inputs */
.inp{width:100%;padding:14px 16px;background:rgba(0,0,0,.5);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-family:'Outfit',sans-serif;font-size:16px;outline:none;transition:border-color .18s;-webkit-appearance:none}
.inp:focus{border-color:var(--em);box-shadow:0 0 0 3px var(--em-dim)}
.inp::placeholder{color:var(--text3)}
.inp-val{font-size:28px;font-family:'JetBrains Mono',monospace;font-weight:600;text-align:center;letter-spacing:-.03em;background:transparent;border:none;border-bottom:2px solid var(--border2);border-radius:0;padding:8px 0}
.inp-val:focus{border-bottom-color:var(--em);box-shadow:none}

/* Buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:15px 20px;border-radius:var(--r);font-family:'Outfit',sans-serif;font-weight:800;font-size:14px;cursor:pointer;border:none;width:100%;transition:all .15s;letter-spacing:.02em}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}
.btn-em{background:var(--em);color:#000;box-shadow:0 4px 16px var(--em-glow)}
.btn-rose{background:var(--rose);color:#fff;box-shadow:0 4px 16px var(--rose-glow)}
.btn-ghost{background:var(--glass2);border:1px solid var(--border2);color:var(--text)}
.btn-cyan{background:var(--cyan-dim);border:1px solid rgba(0,229,255,.25);color:var(--cyan)}
.btn-danger{background:var(--rose-dim);border:1px solid rgba(255,51,102,.25);color:var(--rose)}
.btn-amber{background:var(--amber-dim);border:1px solid rgba(255,171,0,.25);color:var(--amber)}
.btn-sm{padding:9px 14px;font-size:12px;border-radius:10px}
.btn-icon{width:36px;height:36px;padding:0;border-radius:10px;flex-shrink:0}

/* Nav */
.nav-items{display:flex;padding:4px 8px 6px}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 2px;cursor:pointer;border:none;background:none;color:var(--text3);font-family:'Outfit',sans-serif;font-size:8px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;transition:color .2s;position:relative}
.nav-btn.active{color:var(--em)}
.nav-btn svg{width:20px;height:20px;stroke-width:1.8;transition:all .2s}
.nav-btn.active svg{filter:drop-shadow(0 0 6px var(--em-glow))}
.nav-btn.active::after{content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);width:18px;height:2px;background:var(--em);border-radius:999px}

/* Modal slide-up */
.mwrap{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);backdrop-filter:blur(12px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.mwrap.open{opacity:1;pointer-events:all}
.msheet{width:100%;max-width:430px;background:linear-gradient(180deg,#1a1d26 0%,#13161e 100%);border:1px solid var(--border2);border-bottom:none;border-radius:28px 28px 0 0;max-height:95vh;overflow-y:auto;transform:translateY(100%);transition:transform .32s cubic-bezier(.32,.72,0,1)}
.mwrap.open .msheet{transform:translateY(0)}
.msheet::-webkit-scrollbar{width:0}
/* Center modal */
.mcwrap{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.75);backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.mcwrap.open{opacity:1;pointer-events:all}
.mcbox{width:100%;max-width:380px;background:#1a1d26;border:1px solid var(--border2);border-radius:24px;max-height:88vh;overflow-y:auto;transform:scale(.92) translateY(12px);transition:transform .28s cubic-bezier(.32,.72,0,1)}
.mcwrap.open .mcbox{transform:scale(1) translateY(0)}
.mcbox::-webkit-scrollbar{width:0}

/* Modal header */
.mhdr{display:flex;align-items:center;gap:10px;padding:20px 20px 0;position:sticky;top:0;background:inherit;z-index:2;padding-bottom:16px;border-bottom:1px solid var(--border);margin-bottom:20px}
.mtitle{font-size:20px;font-weight:900;flex:1}
.mclose{width:32px;height:32px;border-radius:50%;background:var(--glass2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);flex-shrink:0}

/* Chips */
.chip{padding:8px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--text3);font-family:'Outfit',sans-serif;transition:all .15s;white-space:nowrap}
.chip.on{border-color:var(--em);background:var(--em-dim);color:var(--em)}

/* Platform circles */
.plt-circle{width:56px;height:56px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px solid var(--border);cursor:pointer;transition:all .15s;font-size:11px;font-weight:700;gap:2px;flex-shrink:0}
.plt-circle.sel{border-width:2.5px;box-shadow:0 0 12px var(--em-glow)}

/* Toggle */
.tog{width:48px;height:26px;border-radius:999px;background:rgba(255,255,255,.1);border:1px solid var(--border);cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.tog.on{background:var(--em)}
.tog-t{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 2px 4px rgba(0,0,0,.5)}
.tog.on .tog-t{left:27px}

/* Progress */
.prog{height:6px;border-radius:999px;background:rgba(255,255,255,.07);overflow:hidden}
.prog-f{height:100%;border-radius:999px;transition:width .6s cubic-bezier(.34,1.56,.64,1)}

/* Category icon circle */
.cat-ic{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}

/* Alert strip */
.alert-s{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:12px;font-size:12px;font-weight:600;margin-bottom:8px}
.alert-r{background:var(--rose-dim);border:1px solid rgba(255,51,102,.3);color:#ff8fa3}
.alert-a{background:var(--amber-dim);border:1px solid rgba(255,171,0,.25);color:#ffd54f}

/* Tooltip trigger dot */
.tip-w{display:inline-flex;align-items:center;vertical-align:middle;margin-left:4px;position:relative;z-index:10}
.tip-dot{width:18px;height:18px;border-radius:50%;background:rgba(0,229,255,.15);border:1.5px solid rgba(0,229,255,.45);color:#00e5ff;font-size:10px;font-weight:900;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;transition:background .15s}
.tip-dot:active{transform:scale(.88)}
/* Tooltip modal global — z-index máximo, acima de tudo incluindo nav e FAB */
#tip-overlay{position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;padding:28px;box-sizing:border-box;opacity:0;pointer-events:none;transition:opacity .2s}
#tip-overlay.show{opacity:1;pointer-events:all}
#tip-card{background:rgba(22,28,45,.92);backdrop-filter:blur(28px) saturate(160%);-webkit-backdrop-filter:blur(28px) saturate(160%);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:28px 24px 20px;max-width:340px;width:100%;transform:translateY(20px) scale(.94);transition:transform .28s cubic-bezier(.34,1.4,.64,1),opacity .2s;opacity:0;box-shadow:0 24px 60px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.04) inset}
#tip-overlay.show #tip-card{transform:translateY(0) scale(1);opacity:1}
#tip-icon-wrap{width:44px;height:44px;border-radius:50%;background:rgba(0,229,255,.12);border:1px solid rgba(0,229,255,.25);display:flex;align-items:center;justify-content:center;margin-bottom:16px}
#tip-title{display:block;font-size:16px;font-weight:800;color:#fff;margin-bottom:10px;line-height:1.3}
#tip-body{font-size:14px;color:rgba(255,255,255,.7);line-height:1.6;margin:0 0 20px}
#tip-close{width:100%;padding:13px;border-radius:14px;background:rgba(0,229,255,.12);border:1px solid rgba(0,229,255,.2);color:#00e5ff;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.04em;transition:background .15s}
#tip-close:active{background:rgba(0,229,255,.22)}
.tip-dot{width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.5);font-size:9px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;vertical-align:middle;margin-left:3px;transition:background .15s,border-color .15s;padding:0;line-height:1;flex-shrink:0}
.tip-dot:active{background:rgba(0,229,255,.2);border-color:rgba(0,229,255,.5);color:#00e5ff}

/* Month badge */
.mon-badge{display:flex;align-items:center;gap:8px;cursor:pointer;transition:opacity .15s}
.mon-badge:active{opacity:.7}

/* Pchip */
.pchip{padding:7px 12px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--text3);font-family:'Outfit',sans-serif;transition:all .15s}
.pchip.on{background:var(--em);border-color:var(--em);color:#000}

/* Cat chip for txn form */
.cchip{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 8px;border-radius:14px;border:1.5px solid var(--border);background:transparent;cursor:pointer;transition:all .15s;min-width:60px}
.cchip.on{border-color:var(--em);background:var(--em-dim)}
.cchip span:first-child{font-size:20px}
.cchip span:last-child{font-size:10px;font-weight:700;color:var(--text3)}
.cchip.on span:last-child{color:var(--em)}

/* Pulsating alert */
@keyframes pulse-r{0%,100%{box-shadow:0 0 0 0 var(--rose-glow)}50%{box-shadow:0 0 0 8px transparent}}
.pulse{animation:pulse-r 2s infinite}

/* Radial progress (meta) */
.radial-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center}
.radial-wrap svg{transform:rotate(-90deg)}

/* Wave/bar chart canvas */
canvas{display:block}

/* Anim */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .24s ease both}
@keyframes glow-pulse{0%,100%{opacity:.6}50%{opacity:1}}

/* Extrato date group */
.date-group-hdr{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;padding:12px 0 6px;display:flex;align-items:center;gap:8px}
.date-group-hdr::after{content:'';flex:1;height:1px;background:var(--border)}

/* Parcel badge */
.parcel-badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:8px;background:var(--glass2);border:1px solid var(--border);font-size:10px;font-weight:700;color:var(--cyan);font-family:'JetBrains Mono',monospace}

@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
[data-longpress]{-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;transition:transform .15s,opacity .15s;cursor:pointer}
[data-longpress].lp-active{transform:scale(.97);opacity:.75}
</style>

<!-- ═══ Tela de Login ═══ -->
<div id="login-screen" style="display:flex;position:fixed;inset:0;z-index:99999;background:#000;flex-direction:column;align-items:center;justify-content:center;padding:28px;font-family:'Outfit',sans-serif">

  <!-- Logo FIN -->
  <div style="margin-bottom:36px;text-align:center">
    <div style="font-size:58px;font-weight:900;color:#00e5ff;letter-spacing:.06em;text-shadow:0 0 24px rgba(0,229,255,.85),0 0 70px rgba(0,229,255,.25)">FIN</div>
    <div style="font-size:11px;color:#2a2a2a;margin-top:5px;letter-spacing:.16em;font-weight:700">CONTROLE FINANCEIRO</div>
  </div>

  <!-- Card principal -->
  <div style="width:100%;max-width:360px;background:rgba(255,255,255,.03);border:1px solid rgba(0,229,255,.12);border-radius:22px;padding:26px;box-shadow:0 0 80px rgba(0,229,255,.05)">

    <div style="font-size:17px;font-weight:700;color:#fff;margin-bottom:3px">Bem-vindo</div>
    <div style="font-size:12px;color:#3a3a3a;margin-bottom:20px">E-mail novo? Conta criada automaticamente.</div>

    <!-- Campos -->
    <label style="font-size:10px;font-weight:700;color:#3a3a3a;letter-spacing:.1em;display:block;margin-bottom:5px">E-MAIL</label>
    <input id="login-email" type="email" placeholder="seu@email.com" autocomplete="email"
      style="width:100%;box-sizing:border-box;padding:13px 14px;border-radius:10px;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.07);color:#fff;font-size:14px;font-family:'Outfit',sans-serif;outline:none;margin-bottom:11px;transition:border-color .2s"
      onfocus="this.style.borderColor='rgba(0,229,255,.45)'" onblur="this.style.borderColor='rgba(255,255,255,.07)'">

    <label style="font-size:10px;font-weight:700;color:#3a3a3a;letter-spacing:.1em;display:block;margin-bottom:5px">SENHA</label>
    <input id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password"
      style="width:100%;box-sizing:border-box;padding:13px 14px;border-radius:10px;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.07);color:#fff;font-size:14px;font-family:'Outfit',sans-serif;outline:none;margin-bottom:6px;transition:border-color .2s"
      onfocus="this.style.borderColor='rgba(0,229,255,.45)'" onblur="this.style.borderColor='rgba(255,255,255,.07)'"
      onkeydown="if(event.key==='Enter')finLogin()">

    <!-- Erro inline -->
    <div id="login-err" style="font-size:12px;color:#ff4466;min-height:18px;margin-bottom:12px;padding:0 2px;line-height:1.4"></div>

    <!-- Botão Entrar -->
    <button id="login-btn" onclick="finLogin()"
      style="width:100%;padding:14px;border-radius:12px;background:linear-gradient(135deg,#00e5ff,#0088bb);border:none;color:#000;font-size:15px;font-weight:800;letter-spacing:.06em;cursor:pointer;font-family:'Outfit',sans-serif;box-shadow:0 0 28px rgba(0,229,255,.2);margin-bottom:10px;transition:opacity .15s">
      ENTRAR / CADASTRAR
    </button>

    <!-- Divisor -->
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <div style="flex:1;height:1px;background:rgba(255,255,255,.07)"></div>
      <span style="font-size:11px;color:#333;font-weight:600">OU</span>
      <div style="flex:1;height:1px;background:rgba(255,255,255,.07)"></div>
    </div>

    <!-- Botão Google -->
    <button id="google-btn" onclick="finLoginGoogle()"
      style="width:100%;padding:13px;border-radius:12px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);color:#fff;font-size:14px;font-weight:700;letter-spacing:.03em;cursor:pointer;font-family:'Outfit',sans-serif;display:flex;align-items:center;justify-content:center;gap:10px;transition:background .2s;box-sizing:border-box"
      onmouseover="this.style.background='rgba(255,255,255,.1)'" onmouseout="this.style.background='rgba(255,255,255,.06)'">
      <!-- Ícone Google SVG -->
      <svg width="18" height="18" viewBox="0 0 48 48">

<!-- ═══ Firebase Init + Auth ═══ -->
<script>
(function(){
  if(typeof firebase === 'undefined'){
    console.error('[FIN] Firebase SDK não carregou — precisa de https://');
    setTimeout(function(){
      document.getElementById('login-screen').style.display='none';
      document.getElementById('app').style.display='flex';
      window.autoCreateRecurring&&window.autoCreateRecurring();
      window.render&&window.render();
    },100);
    return;
  }

  firebase.initializeApp({
    apiKey:            "AIzaSyA6gqBzWiCvtuRWzSNeagN1VS6RPr5SDWM",
    authDomain:        "fin-app-4971b.firebaseapp.com",
    projectId:         "fin-app-4971b",
    storageBucket:     "fin-app-4971b.firebasestorage.app",
    messagingSenderId: "278571832292",
    appId:             "1:278571832292:web:39f502d5812bbc55876df1"
  });

  var _auth = firebase.auth();
  var _db   = firebase.firestore();
  var _ref  = function(uid){ return _db.doc('usuarios/'+uid+'/dados/estado'); };

  // ── Mensagens de erro traduzidas ─────────────────────────
  var ERROS = {
    'auth/wrong-password':      'Senha incorreta. Tente novamente.',
    'auth/invalid-credential':  'E-mail ou senha incorretos.',
    'auth/weak-password':       'Senha muito fraca — use ao menos 6 caracteres.',
    'auth/email-already-in-use':'Este e-mail já tem conta. Verifique a senha.',
    'auth/invalid-email':       'E-mail inválido. Verifique o formato.',
    'auth/too-many-requests':   'Muitas tentativas. Aguarde alguns minutos.',
    'auth/network-request-failed':'Sem conexão. Verifique sua internet.',
    'auth/popup-closed-by-user':'Login cancelado. Tente novamente.',
    'auth/popup-blocked':       'Pop-up bloqueado. Permita pop-ups para este site.',
  };
  function mostrarErro(code, fallback){
    var msg = ERROS[code] || fallback || 'Erro desconhecido. Tente novamente.';
    var el = document.getElementById('login-err');
    if(el) el.textContent = msg;
    console.warn('[FIN] auth error:', code, msg);
  }
  function setBtnState(id, txt, disabled){
    var b = document.getElementById(id);
    if(b){ b.textContent=txt; b.disabled=disabled; }
  }

  // ── Salvar no Firestore (debounce 2s) ───────────────────
  var _t = null;
  window.persistCloud = function(state){
    var uid = _auth.currentUser && _auth.currentUser.uid;
    if(!uid) return;
    clearTimeout(_t);
    _t = setTimeout(function(){
      _ref(uid).set(state).catch(function(e){ console.warn('[FIN] save:',e.message); });
    }, 2000);
  };

  // ── Logout ───────────────────────────────────────────────
  window.doLogout = function(){
    _auth.signOut();
  };

  // ── Recuperação de senha ─────────────────────────────────
  window.finForgotPassword = function(){
    var email = (document.getElementById('login-email').value||'').trim();
    var errEl = document.getElementById('login-err');
    if(!email){
      if(errEl) errEl.textContent='Digite seu e-mail acima antes de continuar.';
      document.getElementById('login-email').focus();
      return;
    }
    if(errEl){ errEl.style.color='#ff4466'; errEl.textContent=''; }
    _auth.sendPasswordResetEmail(email)
      .then(function(){
        if(errEl){
          errEl.style.color='#00e5ff';
          errEl.textContent='✅ Link enviado! Verifique sua caixa de entrada.';
          setTimeout(function(){ errEl.style.color='#ff4466'; errEl.textContent=''; },7000);
        }
      })
      .catch(function(e){ mostrarErro(e.code, e.message); });
  };

  // ── Login E-mail/Senha com auto-cadastro ─────────────────
  window.finLogin = function(){
    var email = (document.getElementById('login-email').value||'').trim();
    var pass  = (document.getElementById('login-pass').value||'');
    var errEl = document.getElementById('login-err');
    if(errEl) errEl.textContent = '';

    if(!email){ mostrarErro('','Preencha o e-mail.'); return; }
    if(!pass) { mostrarErro('','Preencha a senha.');  return; }

    setBtnState('login-btn','...', true);

    _auth.signInWithEmailAndPassword(email, pass)
      .catch(function(e){
        // Conta não existe → criar automaticamente
        if(e.code==='auth/user-not-found' || e.code==='auth/invalid-credential'){
          setBtnState('login-btn','Criando conta...', true);
          return _auth.createUserWithEmailAndPassword(email, pass);
        }
        throw e;
      })
      .catch(function(e){
        mostrarErro(e.code, e.message);
        setBtnState('login-btn','ENTRAR / CADASTRAR', false);
      });
  };

  // ── Login com Google ─────────────────────────────────────
  window.finLoginGoogle = function(){
    var errEl = document.getElementById('login-err');
    if(errEl) errEl.textContent = '';
    var btn = document.getElementById('google-btn');
    if(btn){ btn.textContent='Aguarde...'; btn.disabled=true; }

    var provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });

    _auth.signInWithPopup(provider)
      .catch(function(e){
        mostrarErro(e.code, e.message);
        if(btn){ btn.innerHTML='<svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg> Entrar com Google'; btn.disabled=false; }
      });
  };

  // ── Auth state ───────────────────────────────────────────
  // Referências aos dois documentos do user
  var _perfil = function(uid){ return _db.doc('usuarios/'+uid+'/perfil/dados'); };

  // ── Mostrar modal de nome (conta nova) ─────────────────────
  window.finSaveName = function(){
    var nm = (document.getElementById('welcome-name').value||'').trim();
    if(!nm){ document.getElementById('welcome-name').focus(); return; }
    var uid = _auth.currentUser && _auth.currentUser.uid;
    if(!uid) return;
    // Salvar nome no Firestore perfil
    _perfil(uid).set({ nome: nm }, { merge: true }).catch(function(e){
      console.warn('[FIN] perfil save:', e.message);
    });
    // Salvar no estado local
    S.userName = nm;
    localStorage.setItem('fin_v1', JSON.stringify(S));
    // Esconder modal e mostrar app
    var wm = document.getElementById('welcome-modal');
    if(wm) wm.style.display = 'none';
    window.autoCreateRecurring && window.autoCreateRecurring();
    window.render && window.render();
    window.showToast && window.showToast('Olá, ' + nm + '! 👋');
  };

  _auth.onAuthStateChanged(function(user){
    var ls  = document.getElementById('login-screen');
    var ap  = document.getElementById('app');
    var wm  = document.getElementById('welcome-modal');

    if(!user){
      if(ls) ls.style.display = 'flex';
      if(ap) ap.style.display = 'none';
      if(wm) wm.style.display = 'none';
      setBtnState('login-btn','ENTRAR / CADASTRAR', false);
      var gb = document.getElementById('google-btn');
      if(gb) gb.disabled = false;
      return;
    }

    // ── Mudança de usuário → limpar dados locais do anterior ──
    var lastUid = localStorage.getItem('fin_uid');
    if(lastUid && lastUid !== user.uid){
      localStorage.removeItem('fin_v1');
      S = Object.assign({}, window.INIT || S);
      console.log('[FIN] Novo usuário — cache limpo');
    }
    localStorage.setItem('fin_uid', user.uid);

    // Esconder login
    if(ls) ls.style.display = 'none';

    // ── Carregar perfil (nome) + dados em paralelo ─────────────
    Promise.all([
      _perfil(user.uid).get(),
      _ref(user.uid).get()
    ]).then(function(results){
      var perfSnap = results[0];
      var dadosSnap = results[1];

      // Nome do usuário
      var nomeCloud = perfSnap.exists ? (perfSnap.data().nome || '') : '';
      // Google já tem displayName — usar como fallback
      var nomeFallback = user.displayName || '';
      var nomeLocal = S.userName && S.userName !== 'Matheus' ? S.userName : '';
      var nomeDefinitivo = nomeCloud || nomeLocal || nomeFallback || '';

      // Dados financeiros
      if(dadosSnap.exists){
        var data = dadosSnap.data();
        if(data.bills && window.dedupBills) data.bills = window.dedupBills(data.bills);
        S = Object.assign({}, window.INIT || S, data, {
          bills:        data.bills        || [],
          transactions: data.transactions || [],
          installments: data.installments || [],
          userName:     nomeDefinitivo || data.userName || 'Usuário',
        });
      } else {
        // Conta nova — estado limpo com nome
        S = Object.assign({}, window.INIT || S, {
          userName: nomeDefinitivo || 'Usuário',
        });
      }

      // Mostrar app
      if(ap) ap.style.display = 'flex';

      // Conta nova sem nome → mostrar modal de boas-vindas
      if(!nomeDefinitivo && !dadosSnap.exists){
        if(wm){ wm.style.display = 'flex'; }
        // Pré-preencher com displayName do Google se disponível
        var inp = document.getElementById('welcome-name');
        if(inp && nomeFallback) inp.value = nomeFallback.split(' ')[0];
      } else {
        if(wm) wm.style.display = 'none';
        window.autoCreateRecurring && window.autoCreateRecurring();
        window.render && window.render();
        if(dadosSnap.exists) window.showToast && window.showToast('☁️ Olá, '+S.userName+'!');
      }

    }).catch(function(e){
      console.warn('[FIN] load error:', e.message);
      if(ap) ap.style.display = 'flex';
      if(wm) wm.style.display = 'none';
      window.autoCreateRecurring && window.autoCreateRecurring();
      window.render && window.render();
    });
  });
})();
</script>

<script>
// ─── UTILS ────────────────────────────────────────────────────────────
const $=id=>document.getElementById(id),$$=s=>document.querySelectorAll(s);
const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const round2=n=>Math.round(safeNum(n)*100)/100;

const getYM=ds=>ds?ds.slice(0,7):'';

const addMo=(ds,n)=>{try{const d=new Date(ds+'T00:00:00');d.setMonth(d.getMonth()+n);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}catch{return ds}};

// ─── PERSISTÊNCIA ───────────────────────────────────────────────────
function persist(){
  try{ localStorage.setItem('fin_v1', JSON.stringify(S)); }catch{}
  if(window.persistCloud) window.persistCloud(JSON.parse(JSON.stringify(S)));
}
function dedupBills(bills){
  // Remove boletos com mesmo label+amount+dueDate+mode — mantém primeiro encontrado
  const seen=new Set();
  return (bills||[]).filter(b=>{
    const key=`${b.mode||''}|${b.label||''}|${b.amount||0}|${b.dueDate||''}|${b.installmentGroupId||''}|${b.installmentIndex||''}`;
    if(seen.has(key))return false;
    seen.add(key);return true;
  });
}
function loadS(){
  try{
    const s=localStorage.getItem('fin_v1');
    if(s){
      const parsed=JSON.parse(s);
      // Deduplicar boletos corrompidos de sessões anteriores
      if(parsed.bills) parsed.bills=dedupBills(parsed.bills);
      return{...INIT,...parsed};
    }
  }catch{}
  return{...INIT};
}
function setS(patch){S=typeof patch==='function'?patch(S):{...S,...patch};persist();render()}

// ─── CÁLCULO (comp) ─────────────────────────────────────────────────
function comp(){
  const cats=S.mode==='moto'?CATS_M:CATS_P;
  const allTx=S.transactions.filter(t=>t.mode===S.mode);
  const txnsMonth=allTx.filter(t=>getYM(t.date)===selYM);
  const txns=selDay?txnsMonth.filter(t=>t.date===selYM+'-'+String(selDay).padStart(2,'0')):txnsMonth;
  const rec=txns.filter(t=>t.type==='receita'),dep=txns.filter(t=>t.type==='despesa');
  const totalR=round2(rec.reduce((a,b)=>a+b.amount,0)),totalD=round2(dep.reduce((a,b)=>a+b.amount,0));
  const saldo=round2(totalR-totalD);
  const abast=dep.filter(t=>t.category==='combustivel'&&t.litros&&t.kmAnterior!=null&&t.kmAtual!=null&&t.kmAtual>t.kmAnterior);
  const totLit=round2(abast.reduce((a,b)=>a+b.litros,0)),totKm=round2(abast.reduce((a,b)=>a+(b.kmAtual-b.kmAnterior),0));
  const consMed=totKm>0&&totLit>0?round2(totKm/totLit):null;
  // Lucro/km
  const totalKmAll=round2(allTx.filter(t=>t.type==='despesa'&&t.category==='combustivel'&&t.kmAnterior!=null&&t.kmAtual!=null&&t.kmAtual>t.kmAnterior&&getYM(t.date)===selYM).reduce((a,b)=>a+(b.kmAtual-b.kmAnterior),0));
  const lucroKm=totalKmAll>0?round2(saldo/totalKmAll):null;
  // ganhoHj: selDay activo → esse dia; senão hoje (mês actual) ou último dia com receita
  const tod=today();
  const isCurrentMonth=selYM===curYM();
  const selDate=selDay?selYM+'-'+String(selDay).padStart(2,'0'):null;
  const ganhoHj=selDate
    ?round2(rec.filter(t=>t.date===selDate).reduce((a,b)=>a+b.amount,0))
    :isCurrentMonth
      ?round2(rec.filter(t=>t.date===tod).reduce((a,b)=>a+b.amount,0))
      :round2(rec.filter(t=>t.date===rec.reduce((best,r)=>r.date>best?r.date:best,'')).reduce((a,b)=>a+b.amount,0));
  const meta=S.metaDiaria||250,metaPct=Math.min((ganhoHj/meta)*100,100);
  const platD=PLATS.map(p=>({id:p,label:p,color:PLT_COL[p],value:round2(rec.filter(t=>t.platform===p).reduce((a,b)=>a+b.amount,0))})).filter(p=>p.value>0);
  const pieD=cats.map(c=>({...c,value:round2(dep.filter(t=>t.category===c.id).reduce((a,b)=>a+b.amount,0))})).filter(c=>c.value>0);
  const mBills=S.bills.filter(b=>b.mode===S.mode);
  const mInst=(S.installments||[]).filter(g=>g.mode===S.mode);
  const sBills=mBills.filter(b=>!b.installmentGroupId&&b.dueDate?.startsWith(selYM));
  const parMes=mBills.filter(b=>b.installmentGroupId&&b.dueDate?.startsWith(selYM));
  // DRE
  const recBruta=round2(rec.filter(t=>['Uber','99','Particular'].includes(t.platform)).reduce((a,b)=>a+b.amount,0));
  const recOth=round2(rec.filter(t=>t.platform==='Outros').reduce((a,b)=>a+b.amount,0));
  const custVar=round2(dep.filter(t=>CATS_M.find(c=>c.id===t.category&&c.tipo==='variavel')).reduce((a,b)=>a+b.amount,0));
  const despFix=round2(dep.filter(t=>CATS_M.find(c=>c.id===t.category&&c.tipo==='fixo')).reduce((a,b)=>a+b.amount,0));
  // margC = Receita Operacional - Custos Variáveis (base: recBruta, sem outras receitas)
  const margC=round2(recBruta-custVar);
  // lucro = Margem de Contribuição - Despesas Fixas + Outras Receitas
  const lucro=round2(margC-despFix+recOth);
  const pontoEq=round2(Math.max(0,despFix-margC));
  const margContribPct=recBruta>0?round2(margC/recBruta*100):0;
  // Daily data for chart (last 7 days of selYM or all days)
  const daysInMonth=new Date(parseInt(selYM.split('-')[0]),parseInt(selYM.split('-')[1]),0).getDate();
  const dailyData=Array.from({length:daysInMonth},(_,i)=>{
    const d=`${selYM}-${String(i+1).padStart(2,'0')}`;
    const dr=round2(rec.filter(t=>t.date===d).reduce((a,b)=>a+b.amount,0));
    const dd=round2(dep.filter(t=>t.date===d).reduce((a,b)=>a+b.amount,0));
    return{day:i+1,rec:dr,dep:dd};
  });
  // Projeção
  const diaAtual=parseInt(today().split('-')[2])||1;
  const diasPassados=txns.length>0?diaAtual:0;
  const projecao=diasPassados>0?round2((totalR/diasPassados)*daysInMonth):0;
  // Prev month comparison
  const prevTxns=S.transactions.filter(t=>t.mode===S.mode&&getYM(t.date)===prevYM(selYM));
  const prevLucro=round2(prevTxns.filter(t=>t.type==='receita').reduce((a,b)=>a+b.amount,0)-prevTxns.filter(t=>t.type==='despesa').reduce((a,b)=>a+b.amount,0));
  const tendencia=prevLucro>0?(saldo-prevLucro)/prevLucro*100:null;
  const margLiq=totalR>0?round2(lucro/totalR*100):0;
  return{cats,txns,rec,dep,totalR,totalD,saldo,abast,totLit,totKm,consMed,lucroKm,ganhoHj,meta,metaPct,platD,pieD,mBills,mInst,sBills,parMes,recBruta,recOth,custVar,despFix,margC,lucro,pontoEq,dailyData,projecao,tendencia,margLiq,margContribPct,selDate};
}

// ─── TOOLTIP (modal global centralizado) ─────────────────────────────
function T(id){
  if(!GLOSS[id])return'';
  return'<span class="tip-w"><button class="tip-dot" type="button" onclick=\'event.stopPropagation();tT("'+id+'")\'  aria-label="Saiba mais">!</button></span>';
}
function tT(id){
  const g=GLOSS[id];if(!g)return;
  const ov=document.getElementById('tip-overlay');if(!ov)return;
  document.getElementById('tip-title').textContent=g.term;
  document.getElementById('tip-body').textContent=g.def;
  // display:flex primeiro, depois .show no próximo frame para disparar a transição CSS
  ov.style.display='flex';
  requestAnimationFrame(()=>requestAnimationFrame(()=>ov.classList.add('show')));
}
function closeTip(){
  const ov=document.getElementById('tip-overlay');if(!ov)return;
  ov.classList.remove('show');
  setTimeout(()=>{if(!ov.classList.contains('show'))ov.style.display='none'},260);
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeTip();});
// Listener global delegado para todos os botões tip-dot — funciona mesmo após re-render
document.addEventListener('click',function(e){
  // Não interceptar botões funcionais (mas deixar passar tip-dot)
  const _notTip=e.target.closest('button:not(.tip-dot)')||e.target.closest('a');
  if(_notTip) return;
  const btn=e.target.closest?e.target.closest('[data-tip]'):(e.target.getAttribute&&e.target.getAttribute('data-tip')?e.target:null);
  if(btn){
    const id=btn.getAttribute('data-tip');
    if(id){e.preventDefault();tT(id);}
  }
},{capture:true});

// ── Long Press — Extrato (500ms) ──────────────────────────────
(function(){
  let _lpTimer=null,_lpEl=null,_lpMoved=false;
  const THRESHOLD=500;
  function lpStart(e){
    const el=e.target.closest('[data-longpress]');
    if(!el)return;
    _lpMoved=false;
    _lpEl=el;
    _lpTimer=setTimeout(()=>{
      if(_lpMoved)return;
      const id=el.getAttribute('data-longpress');
      el.classList.add('lp-active');
      if(navigator.vibrate)navigator.vibrate(30);
      setTimeout(()=>el.classList.remove('lp-active'),300);
      longPressMenu(id);
    },THRESHOLD);
  }
  function lpCancel(){
    clearTimeout(_lpTimer);
    _lpTimer=null;
    if(_lpEl){_lpEl.classList.remove('lp-active');_lpEl=null;}
  }
  function lpMove(){_lpMoved=true;lpCancel();}
  document.addEventListener('touchstart',lpStart,{passive:true});
  document.addEventListener('touchend',lpCancel,{passive:true});
  document.addEventListener('touchcancel',lpCancel,{passive:true});
  document.addEventListener('touchmove',lpMove,{passive:true});
  // Mouse (desktop)
  document.addEventListener('mousedown',lpStart);
  document.addEventListener('mouseup',lpCancel);
  document.addEventListener('mousemove',e=>{if(e.buttons)lpMove();});
})();

// ── Long Press — Contas/Boletos ──────────────────────────────
(function(){
  let _lpbTimer=null,_lpbEl=null,_lpbMoved=false;
  const THRESHOLD=500;
  function lpbStart(e){
    const el=e.target.closest('[data-longpress-bill]');
    if(!el)return;
    // Não activar se clicou num botão dentro do card
    if(e.target.closest('[data-no-lp]')) return;
    _lpbMoved=false;
    _lpbEl=el;
    _lpbTimer=setTimeout(()=>{
      if(_lpbMoved)return;
      const id=el.getAttribute('data-longpress-bill');
      const type=el.getAttribute('data-lp-type')||'bill';
      el.style.transform='scale(.97)';el.style.opacity='.75';
      if(navigator.vibrate)navigator.vibrate(30);
      setTimeout(()=>{el.style.transform='';el.style.opacity='';},300);
      longPressBill(id,type);
    },THRESHOLD);
  }
  function lpbCancel(){
    clearTimeout(_lpbTimer);_lpbTimer=null;
    if(_lpbEl){_lpbEl.style.transform='';_lpbEl.style.opacity='';_lpbEl=null;}
  }
  function lpbMove(){_lpbMoved=true;lpbCancel();}
  document.addEventListener('touchstart',lpbStart,{passive:true});
  document.addEventListener('touchend',lpbCancel,{passive:true});
  document.addEventListener('touchcancel',lpbCancel,{passive:true});
  document.addEventListener('touchmove',lpbMove,{passive:true});
  document.addEventListener('mousedown',lpbStart);
  document.addEventListener('mouseup',lpbCancel);
  document.addEventListener('mousemove',e=>{if(e.buttons)lpbMove();});
})();

// ─── GRÁFICOS ───────────────────────────────────────────────────────
function drawBarChart(canvasId,data){
  const canvas=$(canvasId);if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height,pad=30;
  // Adaptar largura/gap ao nº de barras (1 barra = vista de dia, 6 = vista de mês)
  const n=data.length;
  const barW=n===1?40:24;
  const gap=n===1?0:38;
  const maxVal=Math.max(...data.map(d=>Math.max(d.rec,d.dep)),1);
  ctx.clearRect(0,0,W,H);
  // Grid lines
  for(let i=0;i<=4;i++){
    const y=pad+(H-pad*2)*(1-i/4);
    ctx.beginPath();ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=1;
    ctx.moveTo(pad,y);ctx.lineTo(W-10,y);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.2)';ctx.font='10px JetBrains Mono';
    ctx.textAlign='right';ctx.fillText(Math.round(maxVal*i/4),pad-4,y+4);
  }
  // Offset de início para centrar quando há poucos pontos
  const totalW=n*(barW*2+4)+(n-1)*gap;
  const startX=n===1?Math.floor((W-totalW)/2):pad+20;
  data.forEach((d,i)=>{
    const x=startX+i*(barW*2+4+gap);
    const rH=Math.max((d.rec/maxVal)*(H-pad*2),d.rec>0?2:0);
    const dH=Math.max((d.dep/maxVal)*(H-pad*2),d.dep>0?2:0);
    // Rec bar
    const rY=pad+(H-pad*2)-rH;
    const rGrad=ctx.createLinearGradient(0,rY,0,rY+rH);
    rGrad.addColorStop(0,'rgba(0,230,118,.9)');rGrad.addColorStop(1,'rgba(0,230,118,.3)');
    ctx.fillStyle=rGrad;roundRect(ctx,x,rY,barW,rH,4);ctx.fill();
    // Dep bar
    const dY=pad+(H-pad*2)-dH;
    const dGrad=ctx.createLinearGradient(0,dY,0,dY+dH);
    dGrad.addColorStop(0,'rgba(255,51,102,.85)');dGrad.addColorStop(1,'rgba(255,51,102,.25)');
    ctx.fillStyle=dGrad;roundRect(ctx,x+barW+4,dY,barW,dH,4);ctx.fill();
    // Label data
    ctx.fillStyle='rgba(255,255,255,.35)';ctx.font='10px Outfit';
    ctx.textAlign='center';ctx.fillText(d.label,x+barW+2,H-6);
    // Valor no topo da barra (apenas vista de 1 dia)
    if(n===1){
      if(d.rec>0){ctx.fillStyle='rgba(0,230,118,.8)';ctx.font='bold 11px Outfit';ctx.textAlign='center';ctx.fillText('+'+fmtN(d.rec),x+barW/2,rY-5);}
      if(d.dep>0){ctx.fillStyle='rgba(255,51,102,.8)';ctx.font='bold 11px Outfit';ctx.textAlign='center';ctx.fillText('−'+fmtN(d.dep),x+barW*1.5+4,dY-5);}
    }
  });
}
function drawWaveChart(canvasId,data){
  const canvas=$(canvasId);if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height,padL=36,padR=10,padT=10,padB=24;
  const maxVal=Math.max(...data.flatMap(d=>[d.rec,d.dep]),1);
  ctx.clearRect(0,0,W,H);
  const xOf=i=>padL+i*(W-padL-padR)/(data.length-1||1);
  const yOf=v=>padT+(H-padT-padB)*(1-v/maxVal);
  // Grid
  for(let i=0;i<=3;i++){const y=padT+(H-padT-padB)*i/3;ctx.beginPath();ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=1;ctx.moveTo(padL,y);ctx.lineTo(W,y);ctx.stroke()}
  const drawArea=(key,col)=>{
    if(data.length<2)return;
    ctx.beginPath();ctx.moveTo(xOf(0),yOf(data[0][key]));
    for(let i=1;i<data.length;i++){const xc=(xOf(i-1)+xOf(i))/2;ctx.bezierCurveTo(xc,yOf(data[i-1][key]),xc,yOf(data[i][key]),xOf(i),yOf(data[i][key]))}
    ctx.lineTo(xOf(data.length-1),H-padB);ctx.lineTo(xOf(0),H-padB);ctx.closePath();
    const grad=ctx.createLinearGradient(0,0,0,H);grad.addColorStop(0,col.replace('1)','.45)'));grad.addColorStop(1,col.replace('1)','0)'));ctx.fillStyle=grad;ctx.fill();
    ctx.beginPath();ctx.moveTo(xOf(0),yOf(data[0][key]));
    for(let i=1;i<data.length;i++){const xc=(xOf(i-1)+xOf(i))/2;ctx.bezierCurveTo(xc,yOf(data[i-1][key]),xc,yOf(data[i][key]),xOf(i),yOf(data[i][key]))}
    ctx.strokeStyle=col.replace('1)','.9)');ctx.lineWidth=2;ctx.stroke();
  };
  drawArea('dep','rgba(255,51,102,1)');drawArea('rec','rgba(0,230,118,1)');
  // X labels
  const step=Math.ceil(data.length/6);
  data.forEach((d,i)=>{if(i%step===0||i===data.length-1){ctx.fillStyle='rgba(255,255,255,.3)';ctx.font='9px Outfit';ctx.textAlign='center';ctx.fillText(d.label,xOf(i),H-6)}});
}
function drawDonut(canvasId,data){
  const canvas=$(canvasId);if(!canvas)return;
  const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height,cx=W/2,cy=H/2,R=Math.min(W,H)/2-10,r=R*0.55;
  const tot=data.reduce((a,b)=>a+b.value,0);if(!tot)return;
  ctx.clearRect(0,0,W,H);let ang=-Math.PI/2;
  data.forEach((d,i)=>{
    const slice=2*Math.PI*(d.value/tot);
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,R,ang,ang+slice);ctx.closePath();ctx.fillStyle=d.color;ctx.fill();
    ctx.beginPath();ctx.arc(cx,cy,r,0,2*Math.PI);ctx.fillStyle=canvas.style.background||'#161a20';ctx.fill();
    ang+=slice;
  });
}
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h);ctx.lineTo(x,y+h);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath()}

function renderDayStrip(){

  var html='';
  for(var i=1;i<=days;i++){

    var ds=selYM+'-'+(d<10?'0':'')+d;

    +'background:'+(selDay===null?'rgba(255,255,255,.14)':'rgba(255,255,255,.04)')+';'

// ─── ALERTS ───────────────────────────────────────────────────────────
function renderAlerts(mBills){
  // 1. Candidatos: não pagos, vencimento <= 2 dias
  const cands=mBills.filter(b=>!b.paid).map(b=>({...b,d:daysDiff(b.dueDate)})).filter(b=>isFinite(b.d)&&b.d<=2).sort((a,b)=>a.d-b.d);

  // 2. Agrupar por série (installmentGroupId ou nome base)
  const groups=new Map();
  cands.forEach(b=>{
    const key=b.installmentGroupId||(b.label||'').replace(/\s*\(\d+\/\d+\)$/,'').trim()||b.id;
    if(!groups.has(key)) groups.set(key,[]);
    groups.get(key).push(b);
  });

  // 3. Um alerta por grupo — o mais antigo (já ordenado por d)
  const al=[...groups.values()].map(grp=>({
    bill:    grp[0],                          // mais antigo / urgente
    count:   grp.length,                      // total de vencidas/próximas no grupo
    allPaid: grp.every(x=>x.paid)
  })).sort((a,b)=>a.bill.d-b.bill.d);

  $('alerts-wrap').innerHTML=al.length?`<div style="padding:4px 0 2px">${al.map(({bill:b,count})=>{
    const r=b.d<0,z=b.d===0,u=b.d===1;
    const base=(b.label||'').replace(/\s*\(\d+\/\d+\)$/,'').trim();
    const msg=r?`VENCIDA há ${Math.abs(b.d)}d`:z?'VENCE HOJE!':u?'Vence amanhã':'';
    const extra=count>1?` <span style="background:var(--rose);color:#fff;border-radius:5px;padding:1px 5px;font-size:10px;font-weight:700">${count}x</span>`:'';
    const label=b.installmentGroupId?`${base} (${b.installmentIndex||'?'}/${b.installmentTotal||'?'})`:esc(b.label);
    return`<div class="alert-s ${r||z?'alert-r':'alert-a'} ${r||z?'pulse':''}">${r?'🚨':z?'⚠️':'🔔'}<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"><strong>${msg}</strong>${extra} — ${label} ${fmt(b.amount)}</span>${`<button onclick="pagarBill('${b.id}')" style="padding:5px 10px;border-radius:8px;background:var(--rose);border:none;color:#fff;font-weight:700;font-size:11px;cursor:pointer;white-space:nowrap">Pagar</button>`}</div>`;

// ─── EXTRATO ──────────────────────────────────────────────────────────
function renderExtrato(c){
  const cats=c.cats;
  let txns=selDay?[...c.txns].filter(t=>t.date===selYM+'-'+String(selDay).padStart(2,'0')):[...c.txns];
  if(exFilterType==='rec') txns=txns.filter(t=>t.type==='receita');
  else if(exFilterType==='dep') txns=txns.filter(t=>t.type==='despesa');
  // Categorias pertencem apenas a despesas — forçar type=despesa ao filtrar por categoria
  if(exFilterCat) txns=txns.filter(t=>t.type==='despesa'&&t.category===exFilterCat);
  if(exSearch.trim()){
    const q=exSearch.trim().toLowerCase();
    txns=txns.filter(t=>(t.description||'').toLowerCase().includes(q)||(t.platform||'').toLowerCase().includes(q)||(String(t.amount)).includes(q));
  }
  const hasFilter=!!(exSearch||exFilterCat||exFilterType);
  const groups={};
  txns.forEach(t=>{(groups[t.date]=groups[t.date]||[]).push(t)});
  const sorted=Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  const listHTML=sorted.length===0
    ?`<div style="text-align:center;padding:40px;color:var(--text3);font-size:13px">${hasFilter?'Nenhum resultado para os filtros aplicados.':'Sem lan\u00e7amentos neste m\u00eas.'}</div>`
    :sorted.map(dt=>`
      <div class="date-group-hdr">${dateLbl(dt)} \u2014 ${dt.split('-').slice(1).reverse().join('/')}</div>
      ${groups[dt].map(t=>{
        const cat=cats.find(cc=>cc.id===t.category);
        const isR=t.type==='receita';
        const kmR=t.kmAtual&&t.kmAnterior?round2(t.kmAtual-t.kmAnterior):null;
        const cons=kmR&&kmR>0&&t.litros?fmtN(kmR/t.litros):null;
        const dispName=isR?(t.description&&!cat?t.description:(!t.description||t.description===(cat&&cat.label)||t.description===(cat?cat.icon+' '+cat.label:''))?'Receita':t.description):(t.description||'');
        return`<div data-longpress="${t.id}" style="display:flex;align-items:center;gap:10px;padding:12px;border-radius:14px;background:var(--glass);border:1px solid ${isR?'rgba(0,230,118,.12)':'rgba(255,51,102,.08)'};margin-bottom:7px">
          ${txnIcon(t)}
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(dispName)}</div>
            <div style="display:flex;align-items:center;gap:6px;margin-top:2px">
              ${t.platform?`<span style="font-size:10px;font-weight:700;color:var(--text3)">${esc(t.platform)}</span>`:''}
              ${t.installmentIndex?`<span class="parcel-badge">${t.installmentIndex}/${t.installmentTotal}</span>`:''}
              ${cons?`<span style="font-size:10px;color:#ff6d00">\u26fd ${cons}km/L</span>`:''}
            </div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
            <div class="val" style="font-size:14px;color:${isR?'var(--em)':'var(--rose)'}">${isR?'+':'\u2212'}${fmt(t.amount)}</div>
            <div style="font-size:10px;color:var(--text3);margin-top:2px">${dateLbl(t.date)}</div>
          </div>
        </div>`;
      }).join('')}
    `).join('');

  $('content').innerHTML=`<div class="fu">
    <!-- Search bar -->
    <div style="display:flex;align-items:center;gap:8px;padding:11px 14px;border-radius:14px;background:var(--glass);border:1px solid var(--border);margin-bottom:10px">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="ex-search" type="text" placeholder="Buscar lan\u00e7amentos\u2026" value="${esc(exSearch)}" style="flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px" autocomplete="off"/>
      ${exSearch?`<button type="button" onclick="exClearSearch()" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;line-height:1;padding:0">\u2715</button>`:''}
    </div>
    <!-- Filter chips (scrollable) -->
    <div style="display:flex;gap:7px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px;-webkit-overflow-scrolling:touch;scrollbar-width:none">
      <div class="chip ${!exFilterType&&!exFilterCat?'on':''}" onclick="exSetFilter('','')">Tudo</div>
      <div class="chip ${exFilterType==='rec'?'on':''}" onclick="exSetFilter('rec','')">&#x1F4C8; Receitas</div>
      <div class="chip ${exFilterType==='dep'?'on':''}" onclick="exSetFilter('dep','')">&#x1F4C9; Despesas</div>
      ${cats.map(cat=>`<div class="chip ${exFilterCat===cat.id?'on':''}" style="${exFilterCat===cat.id?`border-color:${cat.color};background:${cat.color}22;color:${cat.color}`:''}" onclick="exSetFilter('','${cat.id}')">${cat.icon} ${cat.label}</div>`).join('')}
    </div>
    <!-- KPI cards with (!) tooltips — flex row aligned -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:${hasFilter?'8':'14'}px">
      <div style="padding:13px 15px;border-radius:16px;background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.2)">
        <div style="display:flex;flex-direction:row;align-items:center;gap:5px;margin-bottom:4px">
          <span style="font-size:11px;font-weight:700;color:rgba(0,230,118,.7)">Entradas</span>
          ${T('entradas')}
        </div>
        <div class="val" style="font-size:20px;color:var(--em)">${fmt(c.totalR)}</div>
        <div style="font-size:10px;color:rgba(0,230,118,.5);margin-top:2px">${c.rec.length} lan\u00e7amento(s)</div>
      </div>
      <div style="padding:13px 15px;border-radius:16px;background:rgba(255,51,102,.1);border:1px solid rgba(255,51,102,.2)">
        <div style="display:flex;flex-direction:row;align-items:center;gap:5px;margin-bottom:4px">
          <span style="font-size:11px;font-weight:700;color:rgba(255,51,102,.7)">Sa\u00eddas</span>
          ${T('saidas')}
        </div>
        <div class="val" style="font-size:20px;color:var(--rose)">${fmt(c.totalD)}</div>
        <div style="font-size:10px;color:rgba(255,51,102,.5);margin-top:2px">${c.dep.length} lan\u00e7amento(s)</div>
      </div>
    </div>
    ${hasFilter?`<div style="display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:10px;background:var(--amber-dim);border:1px solid rgba(255,171,0,.2);margin-bottom:12px;font-size:12px;color:var(--amber)">
      <span>&#x1F50D; ${txns.length} resultado(s)</span>
      <button type="button" onclick="exClearAll()" style="margin-left:auto;background:none;border:none;color:var(--amber);font-weight:700;font-size:11px;cursor:pointer">Limpar \u2715</button>
    </div>`:''}
    ${listHTML}
  </div>`;
  // Bind live search — stable after innerHTML
  const sinp=document.getElementById('ex-search');
  if(sinp){
    sinp.addEventListener('input',function(){exSearch=this.value;renderExtrato(comp())});
  }
}
function exSetFilter(type,cat){
  if(type){exFilterType=(exFilterType===type?'':type);exFilterCat='';}
  else{exFilterCat=(exFilterCat===cat?'':cat);exFilterType='';}
  renderExtrato(comp());
}
function exClearSearch(){exSearch='';renderExtrato(comp());}
function exClearAll(){exSearch='';exFilterCat='';exFilterType='';renderExtrato(comp());}
function relSetFilter(cat){relFilterCat=(relFilterCat===cat?'':cat);renderRelat(comp());}
// ─── RELATÓRIOS ───────────────────────────────────────────────────────

  // Apply category filter if set
  const filteredDep=relFilterCat?c.dep.filter(t=>t.category===relFilterCat):c.dep;
  const filteredPie=relFilterCat?c.pieD.filter(p=>p.id===relFilterCat):c.pieD;
  const daysWithData=c.dailyData.filter(d=>d.rec>0||d.dep>0);
  const waveData=c.dailyData.map(d=>({...d,label:`${String(d.day).padStart(2,'0')}/${selYM.split('-')[1]}/${String(selYM.split('-')[0]).slice(2)}`}));
  const tend=c.tendencia;
  $('content').innerHTML=`<div class="fu">
  <!-- Category filter chips for relatório -->

// ─── CHART INTERACTIONS (cursor interactivo + haptic) ─────────────────

// Variáveis de estado para reset timer
let _barResetT=null, _waveResetT=null;

// Haptic feedback leve (se disponível)
function hapticTick(){
  if(navigator.vibrate) navigator.vibrate(6);
}

// ── Bar Chart (Home: últimos 5 dias) ────────────────────────────────
function attachBarInteraction(data){
  const overlay=$('bar-overlay');
  const cursor=$('bar-cursor');
  const wrap=$('bar-wrap');
  const canvas=$('bar-chart');
  if(!overlay||!cursor||!canvas||!data||data.length===0) return;

  // Remover listeners anteriores (troca de mês)
  const fresh=overlay.cloneNode(true);
  overlay.parentNode.replaceChild(fresh,overlay);

  const W=canvas.offsetWidth||canvas.width;
  const pad=30,barW=24,gap=40;
  let lastIdx=-1;

  // Resetar para totais do período
  function showDefault(){
    const el=document.getElementById('bar-tip-lbl');
    const elR=document.getElementById('bar-tip-rec');
    const elD=document.getElementById('bar-tip-dep');
    if(el) el.textContent=selYM?ymLblS(selYM).toUpperCase():'';
    if(elR) elR.textContent='';
    if(elD) elD.textContent='';
    if(cursor) cursor.style.display='none';
    lastIdx=-1;
  }

  function showPoint(idx){
    if(idx<0||idx>=data.length) return;
    const d=data[idx];
    const lbl=document.getElementById('bar-tip-lbl');
    const recEl=document.getElementById('bar-tip-rec');
    const depEl=document.getElementById('bar-tip-dep');
    if(lbl) lbl.textContent=d.label||'';
    if(recEl) recEl.textContent=d.rec>0?'+'+fmt(d.rec):'–';
    if(depEl) depEl.textContent=d.dep>0?'−'+fmt(d.dep):'–';

    // Posição da linha cursor
    const scaleX=W/canvas.width;
    const n=data.length;
    const _bW=n===1?40:24,_gap=n===1?0:38;
    const _totalW=n*(_bW*2+4)+(n-1)*_gap;
    const _startX=n===1?Math.floor((canvas.width-_totalW)/2):30+20;
    const cx=(_startX+idx*(_bW*2+4+_gap)+_bW+2)*scaleX;
    cursor.style.left=cx+'px';
    cursor.style.display='block';

    if(idx!==lastIdx){ hapticTick(); lastIdx=idx; }
  }

  function getIdxFromX(clientX){
    const rect=canvas.getBoundingClientRect();
    const x=(clientX-rect.left)*(canvas.width/rect.width);
    const pad=30,barW=24,gap=40;
    let best=-1,bestDist=9999;
    data.forEach((d,i)=>{
      const cx=pad+20+i*(barW*2+gap)+barW+2;
      const dist=Math.abs(x-cx);
      if(dist<bestDist){bestDist=dist;best=i;}
    });
    return bestDist<(barW+gap/2)?best:-1;
  }

  function onMove(clientX){
    if(_barResetT){clearTimeout(_barResetT);_barResetT=null;}
    const idx=getIdxFromX(clientX);
    if(idx>=0) showPoint(idx);
  }

  function onEnd(){
    _barResetT=setTimeout(()=>{showDefault();},2000);
  }

  fresh.addEventListener('mousemove',e=>onMove(e.clientX),{passive:true});
  fresh.addEventListener('mouseleave',()=>onEnd());
  fresh.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(e.touches.length>0) onMove(e.touches[0].clientX);
  },{passive:false});
  fresh.addEventListener('touchend',()=>onEnd());
  // Mostrar período logo ao inicializar (antes de qualquer toque)
  showDefault();
}

// ── Wave Chart (Relatório: todos os dias do mês) ─────────────────────
function attachWaveInteraction(data){
  const overlay=$('wave-overlay');
  const cursor=$('wave-cursor');
  const dotR=$('wave-dot-r');
  const dotD=$('wave-dot-d');
  const canvas=$('wave-chart');
  if(!overlay||!cursor||!canvas||!data||data.length===0) return;

  // Remover listeners anteriores
  const fresh=overlay.cloneNode(true);
  overlay.parentNode.replaceChild(fresh,overlay);

  // Geometria idêntica ao drawWaveChart
  const padL=36,padR=10,padT=10,padB=24;
  const maxVal=Math.max(...data.flatMap(d=>[d.rec,d.dep]),1);
  let lastIdx=-1;

  function xOf(i,W){ return padL+i*(W-padL-padR)/(data.length-1||1); }
  function yOf(v,H){ return padT+(H-padT-padB)*(1-v/maxVal); }

  function showDefault(){
    const lbl=document.getElementById('wave-tip-lbl');
    const recEl=document.getElementById('wave-tip-rec');
    const depEl=document.getElementById('wave-tip-dep');
    // Restaurar ao período geral
    if(lbl) lbl.textContent=selYM?ymLblS(selYM).toUpperCase():'';
    if(recEl) recEl.textContent='';
    if(depEl) depEl.textContent='';
    if(cursor) cursor.style.display='none';
    if(dotR){dotR.style.display='none';}
    if(dotD){dotD.style.display='none';}
    lastIdx=-1;
  }

  function showPoint(idx){
    if(idx<0||idx>=data.length) return;
    const d=data[idx];
    const lbl=document.getElementById('wave-tip-lbl');
    const recEl=document.getElementById('wave-tip-rec');
    const depEl=document.getElementById('wave-tip-dep');
    if(lbl) lbl.textContent=d.label||String(d.day).padStart(2,'0');
    if(recEl) recEl.textContent='+'+fmt(d.rec);
    if(depEl) depEl.textContent='−'+fmt(d.dep);

    const rect=canvas.getBoundingClientRect();
    const W=rect.width, H=rect.height;
    const scaleX=W/canvas.width, scaleY=H/canvas.height;

    const cx=xOf(idx,canvas.width)*scaleX;
    cursor.style.left=cx+'px';
    cursor.style.display='block';

    // Dots nos pontos das linhas
    if(dotR){
      const cy=yOf(d.rec,canvas.height)*scaleY;
      dotR.style.left=cx+'px';
      dotR.style.top=cy+'px';
      dotR.style.display='block';
    }
    if(dotD){
      const cy=yOf(d.dep,canvas.height)*scaleY;
      dotD.style.left=cx+'px';
      dotD.style.top=cy+'px';
      dotD.style.display='block';
    }

    if(idx!==lastIdx){ hapticTick(); lastIdx=idx; }
  }

  function getIdxFromX(clientX){
    const rect=canvas.getBoundingClientRect();
    const xRel=clientX-rect.left;
    const xCanvas=xRel*(canvas.width/rect.width);
    const W=canvas.width;
    let best=0,bestDist=9999;
    data.forEach((_,i)=>{
      const cx=xOf(i,W);
      const dist=Math.abs(xCanvas-cx);
      if(dist<bestDist){bestDist=dist;best=i;}
    });
    return best;
  }

  function onMove(clientX){
    if(_waveResetT){clearTimeout(_waveResetT);_waveResetT=null;}
    const idx=getIdxFromX(clientX);
    showPoint(idx);
  }

  function onEnd(){
    _waveResetT=setTimeout(()=>showDefault(),2000);
  }

  fresh.addEventListener('mousemove',e=>onMove(e.clientX),{passive:true});
  fresh.addEventListener('mouseleave',()=>onEnd());
  fresh.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(e.touches.length>0) onMove(e.touches[0].clientX);
  },{passive:false});
  fresh.addEventListener('touchend',()=>onEnd());
  // Mostrar período logo ao inicializar (antes de qualquer toque)
  showDefault();
}

// Ajustes tab helpers (stable DOM, no modal)
function setAvTab(id){S.avatarId=id;persist();renderCfgTab();renderHdr()}
function setModeTab(m){S.mode=m;persist();render();openCfgModal()}
function saveProfileTab(){const n=$('tab-name')?.value||'';setS({userName:n.trim()});showToast('✅ Perfil salvo!')}
function savePrefsTab(){const v=round2(safeNum($('tab-meta')?.value));if(v>0)setS({metaDiaria:v});showToast('✅ Preferências salvas!')}
function showRstTab(){const rc=$('tab-rst-c'),rb=$('tab-rst-btn');if(rc)rc.style.display='block';if(rb)rb.style.display='none'}
function cancelRstTab(){const rc=$('tab-rst-c'),rb=$('tab-rst-btn');if(rc)rc.style.display='none';if(rb)rb.style.display='block'}
function importBkpTab(){const txt=$('tab-imp')?.value||'',err=$('tab-imp-err');try{const p=JSON.parse(txt);if(!Array.isArray(p.transactions))throw new Error('Formato inválido');S={...INIT,...p};persist();if(err)err.style.display='none';render();showToast('✅ Dados importados!')}catch(e){if(err){err.textContent='Erro: '+(e.message||'JSON inválido.');err.style.display='block'}}}

// Toast notification
function showToast(msg){let t=document.getElementById('toast');if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1d26;border:1px solid rgba(0,230,118,.3);color:var(--em);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:999;opacity:0;transition:all .3s;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,.5)';document.body.appendChild(t)}t.textContent=msg;t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';clearTimeout(t._to);t._to=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(10px)'},2200)}

// ─── RENDER PRINCIPAL ───────────────────────────────────────────────
function render(){
  const c=comp();

function buildFuel(){return`<div style="padding:14px;border-radius:14px;background:rgba(255,109,0,.08);border:1px solid rgba(255,109,0,.2);margin-bottom:16px"><div class="lbl" style="margin-bottom:10px;color:#ff6d00">⛽ ABASTECIMENTO ${T('cons')}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px"><div><div class="lbl">LITROS</div><input class="inp" id="tf-lit" type="number" inputmode="decimal" step="0.01" placeholder="8.50" autocomplete="off"/></div><div><div class="lbl">KM ANTERIOR</div><input class="inp" id="tf-kma" type="number" inputmode="numeric" placeholder="12000" autocomplete="off"/></div></div><div class="lbl">KM ATUAL (hodômetro)</div><input class="inp" id="tf-kmb" type="number" inputmode="numeric" placeholder="12350" style="margin-bottom:10px" autocomplete="off"/><div id="tf-kmerr" style="display:none;padding:9px 12px;border-radius:10px;background:var(--rose-dim);border:1px solid rgba(255,51,102,.25);font-size:12px;color:#ff8fa3;margin-bottom:8px">⚠️ KM Atual deve ser maior que KM Anterior.</div><div id="tf-fprev" style="display:none;padding:10px 14px;border-radius:10px;background:rgba(255,109,0,.12);border:1px solid rgba(255,109,0,.2);align-items:center;gap:8px"><span style="font-size:20px">⚡</span><div><span id="tf-cons-v" class="val" style="color:#ff6d00;font-size:20px"></span> <span id="tf-cons-s" style="font-size:11px;color:var(--text3)"></span></div></div></div>`}
function bindFuelListeners(){const l=$('tf-lit'),a=$('tf-kma'),b=$('tf-kmb');if(!l)return;l.addEventListener('input',function(){TF.litros=this.value;fuelCalc()});a.addEventListener('input',function(){TF.kmAnterior=this.value;fuelCalc()});b.addEventListener('input',function(){TF.kmAtual=this.value;fuelCalc()})}
function fuelCalc(){const fL=safeNum(TF.litros),fA=safeNum(TF.kmAnterior),fB=safeNum(TF.kmAtual);const diff=fA>0&&fB>0?fB-fA:null,inv=diff!==null&&diff<=0;const err=$('tf-kmerr'),prev=$('tf-fprev'),cEl=$('tf-cons-v'),sEl=$('tf-cons-s');if(err)err.style.display=inv?'block':'none';if(prev){if(diff&&diff>0&&fL>0){if(cEl)cEl.textContent=fmtN(diff/fL)+' km/L';if(sEl)sEl.textContent=`${fmtN(diff,0)} km com ${fmtN(fL)} L`;prev.style.display='flex'}else prev.style.display='none'}tfBtn()}
function tfBtn(){const btn=$('tf-save');if(!btn)return;const fA=safeNum(TF.kmAnterior),fB=safeNum(TF.kmAtual),inv=fA>0&&fB>0&&fB<=fA;btn.disabled=safeNum(TF.amount)<=0||inv}
function tfPlat(p){TF.platform=p;PLATS.forEach(pl=>{const el=$('plt-'+pl),lb=$('pltlbl-'+pl);if(el){el.className='plt-circle'+(pl===p?' sel':'');el.style.borderColor=pl===p?PLT_COL[p]:'var(--border)';el.style.background=pl===p?PLT_COL[p]+'22':'transparent'}if(lb){lb.style.color=pl===p?PLT_COL[p]:'var(--text3)'}})}
function tfCat(id){TF.category=id;const cats=S.mode==='moto'?CATS_M:CATS_P;cats.forEach(c=>{const el=$('cat-'+c.id);if(!el)return;const sel=c.id===id;el.className='cchip'+(sel?' on':'');el.style.borderColor=sel?c.color:'';el.style.background=sel?c.color+'18':''});const fd=$('tf-fuel');if(fd){const show=id==='combustivel'&&S.mode==='moto';fd.style.display=show?'block':'none';if(show&&!$('tf-lit')){fd.innerHTML=buildFuel();bindFuelListeners()}}}
function tfTogPar(){TF.parcelar=!TF.parcelar;const t=$('tf-par-tog');if(t)t.className='tog'+(TF.parcelar?' on':'');const ps=$('tf-par-sec'),lbl=$('tf-par-lbl');if(ps)ps.style.display=TF.parcelar?'block':'none';if(lbl)lbl.textContent=TF.parcelar?`Sim — ${TF.numParcelas}x`:'Não';if(TF.parcelar)tfParHint()}
function tfNP(n){TF.numParcelas=n;tfNPChips();tfParHint();const tog=$('tf-par-lbl');if(tog&&TF.parcelar)tog.textContent=`Sim — ${n}x`}
function tfNPChips(){[2,3,4,6,12].forEach(n=>{const el=$('tpc-'+n);if(el)el.className='pchip'+(n===TF.numParcelas?' on':'')})}
function tfParHint(){const hint=$('tf-par-hint');if(!hint)return;const amt=safeNum(TF.amount),nP=safeInt(TF.numParcelas,2);hint.textContent=amt>0?`A despesa será parcelada em ${nP}x de ${fmt(amt)}.\nTotal: ${fmt(amt)} (sem juros).`:`${nP}x Mensais — Defina o valor acima.`}
function saveTxn(){
  const aEl=$('tf-amt'),dEl=$('tf-desc'),dtEl=$('tf-date');
  if(aEl)TF.amount=aEl.value;if(dEl)TF.description=dEl.value;if(dtEl)TF.date=dtEl.value;
  const cats=S.mode==='moto'?CATS_M:CATS_P;
  const amt=round2(safeNum(TF.amount));if(amt<=0){alert('⚠️ Digite um valor válido.');return}
  const fA=safeNum(TF.kmAnterior),fB=safeNum(TF.kmAtual),fL=safeNum(TF.litros);
  if(TF.category==='combustivel'&&S.mode==='moto'&&fA>0&&fB>0&&fB<=fA){alert('⚠️ KM Atual deve ser maior que KM Anterior.');return}
  const cat=TF.type==='receita'?null:(cats.find(c=>c.id===TF.category)||cats[0]);
  const desc=(TF.description||'').trim()||(TF.type==='receita'?'Receita':(cat?`${cat.icon} ${cat.label}`:'Despesa'));
  if(TF.type==='despesa'&&TF.parcelar&&TF.numParcelas>1){
    const nP=safeInt(TF.numParcelas,2),gid=uid();
    const grp={id:gid,mode:S.mode,label:desc,amountPerParcela:amt,totalParcelas:nP};
    const bills=Array.from({length:nP},(_,i)=>({id:uid(),mode:S.mode,label:`${desc} (${i+1}/${nP})`,amount:amt,dueDate:addMo(TF.date,i),paid:false,installmentGroupId:gid,installmentIndex:i+1,installmentTotal:nP}));
    const txList=Array.from({length:nP},(_,i)=>({id:uid(),mode:S.mode,type:'despesa',description:desc,amount:amt,category:TF.category||cats[0]?.id,platform:TF.platform,date:addMo(TF.date,i),installmentGroupId:gid,installmentIndex:i+1,installmentTotal:nP}));
    setS(s=>({...s,installments:[grp,...(s.installments||[])],bills:[...bills,...s.bills],transactions:[...txList,...s.transactions]}));
  } else {
    setS(s=>({...s,transactions:[{id:uid(),mode:S.mode,type:TF.type,description:desc,amount:amt,category:TF.type==='receita'?null:(TF.category||cats[0]?.id),platform:TF.platform,date:TF.date||today(),litros:fL>0?round2(fL):null,kmAnterior:fA>0?round2(fA):null,kmAtual:fB>0?round2(fB):null},...s.transactions]}));
  }
  closeM();
}

// ─── CONTAS: EDIÇÃO ─────────────────────────────────────────────────
function openEditBill(id, isInst){
  // Busca correcta
  const b = isInst
    ? S.bills.find(x=>String(x.installmentGroupId)===String(id))
    : S.bills.find(x=>String(x.id)===String(id));

  if(!b){
    console.log('[openEditBill] id:', id, '| isInst:', isInst,
                '| ids:', S.bills.map(x=>x.id));
    showToast('Boleto não encontrado');
    return;
  }

  // ── 1. Metadados ──────────────────────────────────────────────
  const isParc  = !!b.installmentGroupId;
  // installmentTotal é a fonte autoritativa; count de bills como fallback
  const nP      = isParc
    ? (b.installmentTotal||b.totalParcelas||
       S.bills.filter(x=>x.installmentGroupId===b.installmentGroupId).length||
       2)
    : 2;
  const sP      = isParc ? (b.installmentIndex||1) : 1;
  const baseLbl = b.label.replace(/\s*\(\d+\/\d+\)$/, '').trim();

  // ── 2. Popular CF ──────────────────────────────────────────────
  editingBillId = b.id;
  // Pré-popular customDates com as datas reais de cada parcela do grupo
  const _customDates = {};
  if(isParc){
    const _grpBills = S.bills
      .filter(x=>x.installmentGroupId===b.installmentGroupId)
      .sort((a,z)=>(a.installmentIndex||0)-(z.installmentIndex||0));
    _grpBills.forEach(x=>{
      const i = (x.installmentIndex||1) - sP; // i=0 → 1ª parcela (firstDueDate)
      if(i>0) _customDates[i] = x.dueDate||''; // i>=1 vai para inputs .cfd
    });
  }

  CF = {
    label:         baseLbl,
    amount:        String(b.amount),
    parcelado:     false,           // começa false — cfSetParc vai activar
    startParcela:  sP,
    totalParcelas: nP,
    firstDueDate:  isParc ? (b.dueDate||'') : '',
    dueDateMode:   'auto',
    customDates:   _customDates,   // datas reais do grupo pré-populadas
    dueDate:       isParc ? '' : (b.dueDate||''),
    recurrence:    b.recurrence||'unico'
  };

  // ── 3. Abrir modal original ────────────────────────────────────
  showM(contaShell());
  cfBind();

  // ── 4. Preencher UI após DOM pronto ───────────────────────────
  requestAnimationFrame(()=>{ requestAnimationFrame(()=>{
    const fire = el=>{
      el.dispatchEvent(new Event('input',  {bubbles:true}));
      el.dispatchEvent(new Event('change', {bubbles:true}));
    };

    // Nome
    const lEl=$('cf-lbl');
    if(lEl){ lEl.value=baseLbl; fire(lEl); }

    // Valor
    const aEl=$('cf-amt');
    if(aEl){ aEl.value=String(b.amount); fire(aEl); }

    // Recorrência — pinta botão Único/Fixo
    cfRec();

    // Parcelado — cfSetParc FORÇA o estado (não toggle)
    cfSetParc(isParc);

    if(isParc){
      // startParcela ANTES de cfNP — cfSpUpdate usa CF.startParcela
      CF.startParcela = sP;
      cfNP(nP);                          // chips + hint + cfSpUpdate
      // input numérico (cobre nP não-standard: 5,7,9…)
      const npcEl=$('cf-npc');
      if(npcEl){ npcEl.value=String(nP); }
      // garantir cf-sp hidden com o valor correcto
      const spHidEl=$('cf-sp');
      if(spHidEl){ spHidEl.value=String(sP); }
      const fdEl=$('cf-fdue');
      if(fdEl){ fdEl.value=b.dueDate||''; CF.firstDueDate=b.dueDate||''; fire(fdEl); }
    } else {
      const dEl=$('cf-due');
      if(dEl){ dEl.value=b.dueDate||''; CF.dueDate=b.dueDate||''; fire(dEl); }
    }

    // Título e botão — DEPOIS de tudo (cfHint não sobrescreve por !editingBillId)
    const title=$('ms')?.querySelector('.mtitle');
    if(title) title.textContent='📝 Editar Conta';
    const sb=$('cf-sb');
    if(sb){ sb.textContent='💾 Salvar Alterações'; sb.style.background='var(--em)'; }
  }); });
}
