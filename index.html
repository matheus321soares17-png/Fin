// ─── EXTRATO ──────────────────────────────────────────────────────────
// ─── FILTRO EXTRATO — função pura reutilizável ─────────────────────────
function _applyExFilters(txns){
  // 1. Tipo
  if(exFilterType==='rec') txns=txns.filter(t=>t.type==='receita');
  else if(exFilterType==='dep') txns=txns.filter(t=>t.type==='despesa');
  // 2. Categoria (chip) — filtra por categoria sem restringir ao tipo
  if(exFilterCat) txns=txns.filter(t=>t.category===exFilterCat);
  // 3. Busca textual MULTI-CAMPO — label (descrição) + categoria + plataforma + tags
  const q=(exSearch||'').trim().toLowerCase().replace(/\s+/g,' ');
  if(q){
    const allCats=getCats();
    txns=txns.filter(t=>{
      const desc=(t.description||'').toLowerCase().trim();
      const catObj=allCats.find(c=>c.id===t.category);
      const catLabel=(catObj?catObj.label:'').toLowerCase().trim();
      const catIcon=(catObj?catObj.icon:'').toLowerCase().trim();
      const catId=(t.category||'').toLowerCase().trim();
      const plat=t.type==='receita'?(t.platform||'').toLowerCase().trim():'';
      const tags=(t.tags||[]).join(' ').toLowerCase();
      // Match em qualquer campo: nome/descrição OU categoria OU plataforma OU tag
      return desc.includes(q)||catLabel.includes(q)||catIcon.includes(q)||catId.includes(q)||plat.includes(q)||tags.includes(q);
    });
  }
  // 4. Tag
  if(exFilterTag) txns=txns.filter(t=>(t.tags||[]).includes(exFilterTag));
  return txns;
}

  let baseTxns;
  if(dateRangeStart&&dateRangeEnd){
    baseTxns=AP().transactions.filter(t=>t.mode===AP().mode&&t.date>=dateRangeStart&&t.date<=dateRangeEnd);
  } else {
    baseTxns=[...c.txns];
  }
  const txns=_applyExFilters(baseTxns);
  const hasFilter=!!(exSearch.trim()||exFilterCat||exFilterType||exFilterTag);
  const groups={};
  txns.forEach(t=>{(groups[t.date]=groups[t.date]||[]).push(t)});
  const sorted=Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  return sorted.length===0
    ?`<div style="text-align:center;padding:40px;color:var(--text3);font-size:13px">${hasFilter?'Nenhum resultado para os filtros aplicados.':'Sem lan\u00e7amentos neste m\u00eas.'}</div>`
    :sorted.map(dt=>`
      <div class="date-group-hdr">${dateLbl(dt)} \u2014 ${dt.split('-').slice(1).reverse().join('/')}</div>
      ${groups[dt].map(t=>{
        const cat=cats.find(cc=>cc.id===t.category);
        const isR=t.type==='receita';
        const kmR=t.kmAtual&&t.kmAnterior?round2(t.kmAtual-t.kmAnterior):null;
        const cons=kmR&&kmR>0&&t.litros?fmtN(kmR/t.litros):null;
        const dispName=isR?(t.description&&!cat?t.description:(!t.description||t.description===(cat&&cat.label)||t.description===(cat?cat.icon+' '+cat.label:''))?'Receita':t.description):(t.description||'');
        return`<div class="swipe-wrap" data-swipe-id="${t.id}">
          <div class="swipe-bg-right">
            <div class="swipe-action-lbl">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
              PAGO
            </div>
          </div>
          <div class="swipe-bg-left">
            <div class="swipe-action-lbl">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>
              EDITAR
            </div>
          </div>
          <div class="swipe-inner" data-longpress="${t.id}" style="display:flex;align-items:center;gap:10px;padding:12px;border-radius:14px;background:var(--glass);border:1px solid ${isR?'rgba(10,92,70,.1)':'rgba(106,4,15,.07)'}">
            ${txnIcon(t)}
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(dispName)}</div>
              <div style="display:flex;align-items:center;gap:6px;margin-top:2px">
                ${isR&&t.platform?`<span style="font-size:10px;font-weight:400;color:var(--text3)">${esc(t.platform)}</span>`:''}
                ${t.installmentIndex?`<span class="parcel-badge" style="font-weight:400">${t.installmentIndex}/${t.installmentTotal}</span>`:''}
                ${cons?`<span style="font-size:10px;color:#ff6d00">\u26fd ${cons}km/L</span>`:''}
                ${cat&&!isR?`<span style="font-size:10px;font-weight:400;color:var(--text3)">${cat.icon} ${cat.label}</span>`:''}
                ${(t.tags||[]).slice(0,3).map(tag=>`<span style="font-size:9px;font-weight:700;color:var(--cyan);background:var(--cyan-dim);border:1px solid rgba(45,47,143,.18);border-radius:6px;padding:1px 5px">#${esc(tag)}</span>`).join('')}
              </div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
              <div class="val" style="font-size:14px;color:var(--val-color);font-weight:600">${isR?'+':'\u2212'}${fmt(t.amount)}</div>
              <div style="font-size:10px;font-weight:400;color:var(--text3);margin-top:2px">${dateLbl(t.date)}</div>
            </div>
          </div>
        </div>`;
      }).join('')}
    `).join('');
}

// ── Bar Chart (Home: últimos 5 dias) ────────────────────────────────
function attachBarInteraction(data){
  const overlay=$('bar-overlay');
  const cursor=$('bar-cursor');
  const wrap=$('bar-wrap');
  const canvas=$('bar-chart');
  if(!overlay||!cursor||!canvas||!data||data.length===0) return;

  // Remover listeners anteriores (troca de mês)
  const fresh=overlay.cloneNode(true);
  overlay.parentNode.replaceChild(fresh,overlay);

  const W=canvas.offsetWidth||canvas.width;
  const pad=30,barW=24,gap=40;
  let lastIdx=-1;

  // Resetar para totais do período
  function showDefault(){
    const el=document.getElementById('bar-tip-lbl');
    const elR=document.getElementById('bar-tip-rec');
    const elD=document.getElementById('bar-tip-dep');
    if(el) el.textContent=selYM?ymLblS(selYM).toUpperCase():'';
    if(elR) elR.textContent='';
    if(elD) elD.textContent='';
    if(cursor) cursor.style.display='none';
    lastIdx=-1;
  }

  function showPoint(idx){
    if(idx<0||idx>=data.length) return;
    const d=data[idx];
    const lbl=document.getElementById('bar-tip-lbl');
    const recEl=document.getElementById('bar-tip-rec');
    const depEl=document.getElementById('bar-tip-dep');
    if(lbl) lbl.textContent=d.label||'';
    if(recEl) recEl.textContent=d.rec>0?'+'+fmt(d.rec):'–';
    if(depEl) depEl.textContent=d.dep>0?'−'+fmt(d.dep):'–';

    // Posição da linha cursor
    const scaleX=W/canvas.width;
    const n=data.length;
    const _bW=n===1?40:24,_gap=n===1?0:38;
    const _totalW=n*(_bW*2+4)+(n-1)*_gap;
    const _startX=n===1?Math.floor((canvas.width-_totalW)/2):30+20;
    const cx=(_startX+idx*(_bW*2+4+_gap)+_bW+2)*scaleX;
    cursor.style.left=cx+'px';
    cursor.style.display='block';

    if(idx!==lastIdx){ hapticTick(); lastIdx=idx; }
  }

  function getIdxFromX(clientX){
    const rect=canvas.getBoundingClientRect();
    const x=(clientX-rect.left)*(canvas.width/rect.width);
    const pad=30,barW=24,gap=40;
    let best=-1,bestDist=9999;
    data.forEach((d,i)=>{
      const cx=pad+20+i*(barW*2+gap)+barW+2;
      const dist=Math.abs(x-cx);
      if(dist<bestDist){bestDist=dist;best=i;}
    });
    return bestDist<(barW+gap/2)?best:-1;
  }

  function onMove(clientX){
    if(_barResetT){clearTimeout(_barResetT);_barResetT=null;}
    const idx=getIdxFromX(clientX);
    if(idx>=0) showPoint(idx);
  }

  function onEnd(){
    _barResetT=setTimeout(()=>{showDefault();},2000);
  }

  fresh.addEventListener('mousemove',e=>onMove(e.clientX),{passive:true});
  fresh.addEventListener('mouseleave',()=>onEnd());
  fresh.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(e.touches.length>0) onMove(e.touches[0].clientX);
  },{passive:false});
  fresh.addEventListener('touchend',()=>onEnd());
  // Mostrar período logo ao inicializar (antes de qualquer toque)
  showDefault();
}

// ── Wave Chart (Relatório: todos os dias do mês) ─────────────────────
function attachWaveInteraction(data){
  const overlay=$('wave-overlay');
  const cursor=$('wave-cursor');
  const dotR=$('wave-dot-r');
  const dotD=$('wave-dot-d');
  const canvas=$('wave-chart');
  if(!overlay||!cursor||!canvas||!data||data.length===0) return;

  // Remover listeners anteriores
  const fresh=overlay.cloneNode(true);
  overlay.parentNode.replaceChild(fresh,overlay);

  // Geometria idêntica ao drawWaveChart
  const padL=36,padR=10,padT=10,padB=24;
  const maxVal=Math.max(...data.flatMap(d=>[d.rec,d.dep]),1);
  let lastIdx=-1;

  function xOf(i,W){ return padL+i*(W-padL-padR)/(data.length-1||1); }
  function yOf(v,H){ return padT+(H-padT-padB)*(1-v/maxVal); }

  function showDefault(){
    const lbl=document.getElementById('wave-tip-lbl');
    const recEl=document.getElementById('wave-tip-rec');
    const depEl=document.getElementById('wave-tip-dep');
    // Restaurar ao período geral
    if(lbl) lbl.textContent=selYM?ymLblS(selYM).toUpperCase():'';
    if(recEl) recEl.textContent='';
    if(depEl) depEl.textContent='';
    if(cursor) cursor.style.display='none';
    if(dotR){dotR.style.display='none';}
    if(dotD){dotD.style.display='none';}
    lastIdx=-1;
  }

  function showPoint(idx){
    if(idx<0||idx>=data.length) return;
    const d=data[idx];
    const lbl=document.getElementById('wave-tip-lbl');
    const recEl=document.getElementById('wave-tip-rec');
    const depEl=document.getElementById('wave-tip-dep');
    if(lbl) lbl.textContent=d.label||String(d.day).padStart(2,'0');
    if(recEl) recEl.textContent='+'+fmt(d.rec);
    if(depEl) depEl.textContent='−'+fmt(d.dep);

    const rect=canvas.getBoundingClientRect();
    const W=rect.width, H=rect.height;
    const scaleX=W/canvas.width, scaleY=H/canvas.height;

    const cx=xOf(idx,canvas.width)*scaleX;
    cursor.style.left=cx+'px';
    cursor.style.display='block';

    // Dots nos pontos das linhas
    if(dotR){
      const cy=yOf(d.rec,canvas.height)*scaleY;
      dotR.style.left=cx+'px';
      dotR.style.top=cy+'px';
      dotR.style.display='block';
    }
    if(dotD){
      const cy=yOf(d.dep,canvas.height)*scaleY;
      dotD.style.left=cx+'px';
      dotD.style.top=cy+'px';
      dotD.style.display='block';
    }

    if(idx!==lastIdx){ hapticTick(); lastIdx=idx; }
  }

  function getIdxFromX(clientX){
    const rect=canvas.getBoundingClientRect();
    const xRel=clientX-rect.left;
    const xCanvas=xRel*(canvas.width/rect.width);
    const W=canvas.width;
    let best=0,bestDist=9999;
    data.forEach((_,i)=>{
      const cx=xOf(i,W);
      const dist=Math.abs(xCanvas-cx);
      if(dist<bestDist){bestDist=dist;best=i;}
    });
    return best;
  }

  function onMove(clientX){
    if(_waveResetT){clearTimeout(_waveResetT);_waveResetT=null;}
    const idx=getIdxFromX(clientX);
    showPoint(idx);
  }

  function onEnd(){
    _waveResetT=setTimeout(()=>showDefault(),2000);
  }

  fresh.addEventListener('mousemove',e=>onMove(e.clientX),{passive:true});
  fresh.addEventListener('mouseleave',()=>onEnd());
  fresh.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(e.touches.length>0) onMove(e.touches[0].clientX);
  },{passive:false});
  fresh.addEventListener('touchend',()=>onEnd());
  // Mostrar período logo ao inicializar (antes de qualquer toque)
  showDefault();
}

// ─── FLUXO ESTRATÉGICO ────────────────────────────────────────────────
function renderFluxo(c, switcherHTML=''){
  const allTx   = AP().transactions.filter(t=>t.mode===AP().mode);
  const txMonth = allTx.filter(t=>getYM(t.date)===selYM);
  const cats    = getCats();

  // ── Dados de bills do mês ──────────────────────────────────────────
  const mBills  = (AP().bills||[]).filter(b=>b.mode===AP().mode);
  const sBills  = mBills.filter(b=>!b.installmentGroupId && (b.dueDate||'').startsWith(selYM));
  const parMes  = mBills.filter(b=> b.installmentGroupId && (b.dueDate||'').startsWith(selYM));
  const mInst   = (AP().installments||[]).filter(g=>g.mode===AP().mode);

  // ── Receitas recorrentes (fixas) do mês ───────────────────────────
  const recTx   = txMonth.filter(t=>t.type==='receita');
  const recByPlat = {};
  recTx.forEach(t=>{
    const k = t.platform||t.category||'Outros';
    if(!recByPlat[k]) recByPlat[k]={label:k, total:0, items:[]};
    recByPlat[k].total = round2(recByPlat[k].total + t.amount);
    recByPlat[k].items.push(t);
  });

  // ── Despesas do mês por categoria ─────────────────────────────────
  const depTx   = txMonth.filter(t=>t.type==='despesa');

  // ── Cartões: agrupar despesas por platform (se preenchido) ────────
  const cartaoMap = {};
  // Busca dueDay e closingDay salvos no objeto do cartão ou na transação
  const getCardDueDay = (creditCardId, invoiceDueDay) => {
    if(invoiceDueDay) return invoiceDueDay;
    if(creditCardId){
      const saved=(AP().creditCards||[]).find(c=>c.id===creditCardId);
      if(saved&&saved.dueDay) return saved.dueDay;
    }
    return '';
  };
  const getCardClosingDay = (creditCardId, closingDay) => {
    if(closingDay) return closingDay;
    if(creditCardId){
      const saved=(AP().creditCards||[]).find(c=>c.id===creditCardId);
      if(saved&&saved.closingDay) return saved.closingDay;
    }
    return null;
  };
  depTx.forEach(t=>{
    if(!t.platform) return;
    const key=t.platform;
    const dueDay=getCardDueDay(t.creditCard,t.invoiceDueDay);
    const closingDay=getCardClosingDay(t.creditCard,t.closingDay);
    if(!cartaoMap[key]) cartaoMap[key]={name:key, total:0, items:[], invoiceDueDay:dueDay, closingDay:closingDay, creditCardId:t.creditCard||''};
    cartaoMap[key].total = round2(cartaoMap[key].total + t.amount);
    if(dueDay&&!cartaoMap[key].invoiceDueDay) cartaoMap[key].invoiceDueDay=dueDay;
    if(closingDay&&!cartaoMap[key].closingDay) cartaoMap[key].closingDay=closingDay;
    cartaoMap[key].items.push(t);
  });
  // Garante que cartões com bills (parcelamentos) aparecem mesmo sem txn no mês
  (AP().bills||[]).filter(b=>b.mode===AP().mode&&(b.creditCard||b.platform)&&(b.dueDate||'').startsWith(selYM)).forEach(b=>{
    const cardObj=(AP().creditCards||[]).find(c=>c.id===b.creditCard);
    const key=b.platform||(cardObj?.name)||b.creditCard;
    if(!key) return;
    const dueDay=getCardDueDay(b.creditCard,b.invoiceDueDay);
    const closingDay=getCardClosingDay(b.creditCard,b.closingDay);
    if(!cartaoMap[key]) cartaoMap[key]={name:key,total:0,items:[],invoiceDueDay:dueDay,closingDay:closingDay,creditCardId:b.creditCard||''};
    if(dueDay&&!cartaoMap[key].invoiceDueDay) cartaoMap[key].invoiceDueDay=dueDay;
    if(closingDay&&!cartaoMap[key].closingDay) cartaoMap[key].closingDay=closingDay;
    // Não soma o valor do bill (a txn atual já foi somada acima para evitar double-count)
  });
  const cartoes = Object.values(cartaoMap).sort((a,b)=>b.total-a.total);
  // ── Projeção: receitas fixas vs despesas fixas (recurrence=fixo) ──


  // ── Despesas fixas (bills recurrence=fixo) ────────────────────────
  const fixasBills = sBills.filter(b=>b.recurrence==='fixo');
  const totalFixas = round2(fixasBills.reduce((a,b)=>a+b.amount,0));
  // ── Projeção: receitas fixas vs despesas fixas ────────────────────
  const recFixas = (AP().transactions||[]).filter(t=>t.mode===AP().mode&&t.type==='receita'&&t.recurrence==='fixo');
  const depFixasTx = (AP().transactions||[]).filter(t=>t.mode===AP().mode&&t.type==='despesa'&&t.recurrence==='fixo');
  const totalRecFixas = round2(recFixas.reduce((s,t)=>s+t.amount,0));
  const totalDepFixas = round2(depFixasTx.reduce((s,t)=>s+t.amount,0) + fixasBills.reduce((s,b)=>s+b.amount,0));
  const saldoFixo = round2(totalRecFixas - totalDepFixas);

  // ── Despesas variáveis (bills recurrence!=fixo + sem parcelamento) ─
  const varBills  = sBills.filter(b=>b.recurrence!=='fixo');
  const totalVar  = round2(varBills.reduce((a,b)=>a+b.amount,0));

  // ── Parcelamentos ativos do mês ───────────────────────────────────
  const parsAtivos = mInst.filter(g=>AP().bills.some(b=>b.installmentGroupId===g.id && (b.dueDate||'').startsWith(selYM)));

  // ── Totais para o saldo projetado ─────────────────────────────────
  const totalRec      = round2(recTx.reduce((a,b)=>a+b.amount,0));
  const totalDep      = round2(depTx.reduce((a,b)=>a+b.amount,0));
  const totalBillsPend= round2([...sBills,...parMes].filter(b=>!b.paid).reduce((a,b)=>a+b.amount,0));
  const saldoProj     = round2(totalRec - totalDep - totalBillsPend);

  // ─ helpers ────────────────────────────────────────────────────────
  const urgBg  = d => {
    if(!d) return 'var(--glass)';
    const diff = daysDiff(d);
    if(diff < 0)  return 'rgba(255,51,102,.10)';
    if(diff <= 3) return 'rgba(255,171,0,.10)';
    return 'var(--glass)';
  };
  const urgCol = d => {
    if(!d) return 'var(--text3)';
    const diff = daysDiff(d);
    if(diff < 0)  return 'var(--rose)';
    if(diff <= 3) return 'var(--amber)';
    return 'var(--text3)';
  };

  // ─ filter buttons ─────────────────────────────────────────────────
  const filters = [
    {id:'todas',          label:'Ver Todas',    icon:'📋'},
    {id:'cartao',         label:'Por Cartão',   icon:'💳'},
    {id:'parcelamentos',  label:'Parcelamentos',icon:'🗂️'},
  ];
  if(fluxoFilter==='fixas') fluxoFilter='todas'; // reset se veio de aba antiga
  const filterBar = `<div style="display:flex;gap:7px;overflow-x:auto;padding-bottom:6px;margin-bottom:16px;-webkit-overflow-scrolling:touch;scrollbar-width:none">
    ${filters.map(f=>`<button onclick="setFluxoFilter('${f.id}')" style="display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:20px;white-space:nowrap;font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid ${fluxoFilter===f.id?'var(--cyan)':'var(--border)'};background:${fluxoFilter===f.id?'var(--cyan-dim)':'transparent'};color:${fluxoFilter===f.id?'var(--cyan)':'var(--text2)'};transition:all .18s">${f.icon} ${f.label}</button>`).join('')}
  </div>`;

  // ─ Saldo projetado hero ───────────────────────────────────────────
  const heroCard = `<div style="padding:16px 18px;border-radius:16px;margin-bottom:14px;background:${saldoProj>=0?'var(--em-dim)':'var(--rose-dim)'};border:1px solid ${saldoProj>=0?'rgba(0,153,187,.2)':'rgba(255,51,102,.2)'}">
    <div style="font-size:11px;font-weight:700;color:${saldoProj>=0?'var(--em)':'var(--rose)'};letter-spacing:.07em;margin-bottom:6px">SALDO PROJETADO DO MÊS</div>
    <div class="val" style="font-size:28px;color:${saldoProj>=0?'var(--em)':'var(--rose)'}">${fmt(saldoProj)}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px">
      <div style="text-align:center">
        <div style="font-size:10px;color:var(--text3);font-weight:700;margin-bottom:3px">RECEITAS</div>
        <div class="val" style="font-size:14px;color:var(--em)">${fmt(totalRec)}</div>
      </div>
      <div style="text-align:center;border-left:1px solid var(--border);border-right:1px solid var(--border)">
        <div style="font-size:10px;color:var(--text3);font-weight:700;margin-bottom:3px">GASTOS DO MÊS</div>
        <div class="val" style="font-size:14px;color:var(--rose)">${fmt(totalDep)}</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:10px;color:var(--text3);font-weight:700;margin-bottom:3px">A PAGAR</div>
        <div class="val" style="font-size:14px;color:var(--amber)">${fmt(totalBillsPend)}</div>
      </div>
    </div>
  </div>`;

  // ─ Seção: Receitas previsíveis ────────────────────────────────────
  const recSection = (fluxoFilter==='todas') ? `<div class="card" style="padding:16px;margin-bottom:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div style="font-size:14px;font-weight:800;display:flex;align-items:center;gap:7px">💰 Receitas do Mês</div>
      <div class="val" style="font-size:15px;color:var(--em)">${fmt(totalRec)}</div>
    </div>
    ${Object.keys(recByPlat).length===0
      ? `<div style="text-align:center;padding:20px 0;color:var(--text3);font-size:13px">Nenhuma receita lançada neste mês</div>`
      : Object.values(recByPlat).sort((a,b)=>b.total-a.total).map(g=>`
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
        <div>
          <div style="font-size:13px;font-weight:600;color:var(--text)">${esc(g.label)}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:1px">${g.items.length} lançamento(s)</div>
        </div>
        <div class="val" style="font-size:14px;color:var(--em)">${fmt(g.total)}</div>
      </div>`).join('')
    }
  </div>` : '';

  // ─ Seção: Agrupamento por Cartão ─────────────────────────────────
  // ── Helpers de status de fatura ──────────────────────────────────────
  const getInvoiceStatus = (closingDay, dueDay, selYM) => {
    // selYM = 'YYYY-MM' do mês visualizado
    const now = new Date();
    const [sy, sm] = selYM.split('-').map(Number);
    const isCurrentMonth = now.getFullYear()===sy && (now.getMonth()+1)===sm;
    const todayD = now.getDate();

    if(!closingDay && !dueDay) return {label:'Sem datas', color:'var(--text3)', bg:'var(--glass2)', icon:'❓'};

    // Fatura paga?
    const paidKey = `inv_${selYM}_${closingDay||0}_${dueDay||0}`;
    const paidInvs = AP().paidInvoices||{};
    if(paidInvs[paidKey]) return {label:'Paga', color:'var(--em)', bg:'var(--em-dim)', icon:'✅', paidKey};

    if(!isCurrentMonth){
      // Mês passado: verifica se estava vencida
      const isPast = (sy < now.getFullYear()) || (sy===now.getFullYear() && sm < now.getMonth()+1);
      if(isPast && dueDay) return {label:'Vencida', color:'var(--rose)', bg:'var(--rose-dim)', icon:'🔴', paidKey};
      return {label:'Futura', color:'var(--text3)', bg:'var(--glass2)', icon:'🔵', paidKey};
    }

    // Mês atual
    const cd = parseInt(closingDay||0), dd = parseInt(dueDay||0);
    if(cd && todayD <= cd) return {label:'Aberta', color:'var(--em)', bg:'var(--em-dim)', icon:'🟢', paidKey};
    if(cd && todayD > cd && (!dd || todayD <= dd)) return {label:'Fechada', color:'var(--amber)', bg:'var(--amber-dim)', icon:'🟡', paidKey};
    if(dd && todayD > dd) return {label:'Vencida', color:'var(--rose)', bg:'var(--rose-dim)', icon:'🔴', paidKey};
    return {label:'Em aberto', color:'var(--text3)', bg:'var(--glass2)', icon:'❓', paidKey};
  };

  // Serializar cartoes para o drawer (evitar closures complexas)
  window._fluxoCartoes = cartoes;
  window._fluxoSelYM = selYM;
  window._fluxoCats = cats;

  const cartaoSection = (fluxoFilter==='todas'||fluxoFilter==='cartao') ? `<div class="card" style="padding:16px;margin-bottom:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div style="font-size:14px;font-weight:800;display:flex;align-items:center;gap:7px">💳 Despesas por Cartão</div>
      ${cartoes.length>0?`<div style="font-size:11px;font-weight:700;color:var(--text3)">${cartoes.length} cartão${cartoes.length>1?'s':''}</div>`:''}
    </div>
    ${cartoes.length===0
      ? `<div style="text-align:center;padding:20px 0;color:var(--text3);font-size:13px">Nenhuma despesa com cartão registrada.<br><span style="font-size:11px">Selecione "Crédito" e um cartão ao lançar uma despesa.</span></div>`
      : cartoes.map((ct,ci)=>{
          const dueDay    = ct.invoiceDueDay;
          const closingDay = ct.closingDay||getCardClosingDay(ct.creditCardId,null);
          const status    = getInvoiceStatus(closingDay, dueDay, selYM);
          const pctOfDep  = totalDep>0 ? Math.min(100,(ct.total/totalDep*100)) : 0;
          const cardObj   = (AP().creditCards||[]).find(c=>c.id===ct.creditCardId);
          const cardIcon  = cardObj?.icon||'💳';

          return `<div onclick="openInvoiceDrawer(${ci})" style="display:flex;align-items:center;gap:12px;padding:14px;border-radius:16px;background:var(--glass);border:1px solid var(--border);margin-bottom:8px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent"
            onmouseenter="this.style.background='var(--glass2)'" onmouseleave="this.style.background='var(--glass)'">
            <!-- Ícone -->
            <div style="width:44px;height:44px;border-radius:14px;background:var(--glass2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">${cardIcon}</div>
            <!-- Info principal -->
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:7px;margin-bottom:4px">
                <div style="font-size:14px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(ct.name)}</div>
                <span style="flex-shrink:0;font-size:10px;font-weight:700;color:${status.color};background:${status.bg};padding:2px 7px;border-radius:20px;border:1px solid ${status.color}33">${status.icon} ${status.label}</span>
              </div>
              <div style="display:flex;gap:8px;flex-wrap:wrap">
                ${closingDay?`<span style="font-size:10px;color:var(--text3);font-weight:600">🔒 Fecha ${closingDay}</span>`:''}
                ${dueDay?`<span style="font-size:10px;color:var(--text3);font-weight:600">📅 Vence ${dueDay}</span>`:''}
                <span style="font-size:10px;color:var(--text3)">${ct.items.length} gasto${ct.items.length!==1?'s':''}</span>
              </div>
              <!-- Barra de progresso do total -->
              <div style="height:3px;border-radius:999px;background:var(--border);margin-top:7px">
                <div style="height:100%;border-radius:999px;width:${pctOfDep.toFixed(0)}%;background:var(--rose);opacity:.7;transition:width .5s"></div>
              </div>
            </div>
            <!-- Valor + seta -->
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
              <div class="val" style="font-size:16px;font-weight:800;color:var(--rose)">${fmt(ct.total)}</div>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2.5"><polyline points="9,18 15,12 9,6"/></svg>
            </div>
          </div>`;
        }).join('')
    }
  </div>` : '';

  // ─ Seção: Despesas Fixas ──────────────────────────────────────────
  const fixasSection = (fluxoFilter==='todas') ? `<div class="card" style="padding:16px;margin-bottom:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div style="font-size:14px;font-weight:800;display:flex;align-items:center;gap:7px">📌 Despesas Fixas</div>
      <div class="val" style="font-size:15px;color:var(--rose)">${fmt(totalFixas)}</div>
    </div>
    ${fixasBills.length===0
      ? `<div style="text-align:center;padding:20px 0;color:var(--text3);font-size:13px">Nenhuma conta fixa neste mês</div>`
      : fixasBills.sort((a,b)=>(a.dueDate||'').localeCompare(b.dueDate||'')).map(b=>`
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:12px;margin-bottom:6px;background:${b.paid?'var(--glass)':urgBg(b.dueDate)};border:1px solid ${b.paid?'transparent':'var(--border)'}">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:32px;height:32px;border-radius:10px;background:${b.paid?'var(--em-dim)':'var(--rose-dim)'};border:1px solid ${b.paid?'rgba(0,230,118,.2)':'rgba(255,51,102,.15)'};display:flex;align-items:center;justify-content:center;font-size:16px">${b.emoji||'📌'}</div>
          <div>
            <div style="font-size:13px;font-weight:600;color:${b.paid?'var(--text3)':'var(--text)'};${b.paid?'text-decoration:line-through':''}">${esc(b.label)}</div>
            <div style="font-size:10px;color:${urgCol(b.dueDate)};margin-top:1px;font-weight:600">Vence ${fmtDue(b.dueDate)} ${b.paid?'· ✅ Pago':''}</div>
          </div>
        </div>
        <div class="val" style="font-size:14px;color:${b.paid?'var(--text3)':'var(--rose)'}">${fmt(b.amount)}</div>
      </div>`).join('')
    }
    ${varBills.length>0&&fluxoFilter==='todas'?`
    <div style="border-top:1.5px solid var(--border);margin:10px 0 10px"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div style="font-size:13px;font-weight:700;color:var(--text2)">📦 Variáveis</div>
      <div class="val" style="font-size:13px;color:var(--rose)">${fmt(totalVar)}</div>
    </div>
    ${varBills.map(b=>`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
      <div style="font-size:12px;color:var(--text)">${esc(b.label)}</div>
      <div class="val" style="font-size:12px;color:var(--rose)">${fmt(b.amount)}</div>
    </div>`).join('')}`:''}
  </div>` : '';

  // ─ Seção: Parcelamentos ───────────────────────────────────────────
  const parcelSection = (fluxoFilter==='todas'||fluxoFilter==='parcelamentos') ? `<div class="card" style="padding:16px;margin-bottom:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div style="font-size:14px;font-weight:800;display:flex;align-items:center;gap:7px">🗂️ Parcelamentos Ativos</div>
      <div style="font-size:11px;color:var(--text3);font-weight:700">${parsAtivos.length} ativo(s)</div>
    </div>
    ${parsAtivos.length===0
      ? `<div style="text-align:center;padding:20px 0;color:var(--text3);font-size:13px">Nenhum parcelamento ativo neste mês</div>`
      : parsAtivos.map(g=>{
          const gB      = (AP().bills||[]).filter(b=>b.installmentGroupId===g.id).sort((a,b)=>a.installmentIndex-b.installmentIndex);
          const tot     = g.totalParcelas||gB.length||1;
          const paidN   = gB.filter(b=>b.paid).length;
          const pendN   = gB.filter(b=>!b.paid).length;
          const saldoDev= round2(gB.filter(b=>!b.paid).reduce((a,b)=>a+b.amount,0));
          const mBill   = gB.find(b=>(b.dueDate||'').startsWith(selYM));
          const pct     = tot>0?Math.round((paidN/tot)*100):0;
          const barColor= pct>=100?'var(--em)':pct>=50?'var(--amber)':'var(--rose)';
          return `<div data-longpress-bill="${g.id}" data-lp-type="inst" style="padding:12px 14px;border-radius:14px;background:var(--glass);border:1px solid var(--border);margin-bottom:8px;cursor:pointer;-webkit-touch-callout:none;user-select:none">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px">
              <div style="flex:1;margin-right:12px">
                <div style="display:flex;align-items:center;gap:6px">
                  <div style="font-size:13px;font-weight:700;color:var(--text)">${esc(g.label||g.name||'Parcelamento')}</div>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
                </div>
                <div style="font-size:11px;color:var(--text3);margin-top:2px">
                  ${mBill?`Vence ${fmtDue(mBill.dueDate)}`:'Sem parcela este mês'}
                  ${mBill&&!mBill.paid?` · <span style="color:${urgCol(mBill.dueDate)};font-weight:700">${daysDiff(mBill.dueDate)<0?'Vencida':'Pendente'}</span>`:''}
                  ${mBill&&mBill.paid?' · <span style="color:var(--em);font-weight:700">✅ Paga</span>':''}
                </div>
              </div>
              <div style="text-align:right;flex-shrink:0">
                <div class="val" style="font-size:15px;color:var(--text)">${fmt(g.amountPerParcela||0)}<span style="font-size:10px;color:var(--text3)">/mês</span></div>
                <div style="font-size:10px;color:var(--rose);margin-top:2px;font-weight:700">Resta ${fmt(saldoDev)}</div>
              </div>
            </div>
            <!-- Progress bar -->
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
              <div style="flex:1;height:6px;border-radius:999px;background:var(--border);overflow:hidden">
                <div style="height:100%;border-radius:999px;width:${pct}%;background:${barColor};transition:width .4s"></div>
              </div>
              <div style="font-size:11px;font-weight:800;color:${barColor};min-width:40px;text-align:right">${paidN}/${tot}</div>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3)">
              <span>${paidN} paga(s)</span>
              <span>${pendN} restante(s)</span>
            </div>
          </div>`;
        }).join('')
    }
  </div>` : '';

  $('content').innerHTML=`<div class="fu">
  ${switcherHTML}
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <div style="font-size:14px;font-weight:800;color:var(--text2)">🔀 Fluxo de Caixa</div>
    <div style="display:flex;align-items:center;gap:6px">
      
      ${H('fluxo')}
    </div>
  </div>
  ${filterBar}
  ${heroCard}
  ${fluxoFilter==='todas'?recSection:''}
  ${cartaoSection}
  ${fixasSection}
  ${parcelSection}
  </div>`;
}

  </div>`;
}

// ─── PROJEÇÃO (SUB-ABA) ────────────────────────────────────────────────
function renderProjecao(c, switcherHTML=''){
  const allForecasts = (AP().forecasts||[])
    .filter(f=>f.mode===AP().mode&&(f.date||'').startsWith(selYM))
    .sort((a,b)=>(a.date||'').localeCompare(b.date||''));

  const fcCalc = f => {
    const pmts = f.payments||[];
    const realizado = round2(pmts.reduce((s,p)=>s+p.amount,0));
    const falta     = round2(f.amount - realizado);
    const pct       = f.amount>0 ? Math.min(100, Math.round(realizado/f.amount*100)) : 0;
    const status    = realizado<=0 ? 'pendente' : falta<=0 ? 'quitado' : 'parcial';
    return {realizado, falta, pct, status};
  };

  const fRec      = allForecasts.filter(f=>f.type==='receita'||(f.type==null));
  const fDesp     = allForecasts.filter(f=>f.type==='despesa');
  const fRecPrev  = round2(fRec.reduce((s,f)=>s+f.amount,0));
  const fRecReal  = round2(fRec.reduce((s,f)=>s+fcCalc(f).realizado,0));
  const fDespPrev = round2(fDesp.reduce((s,f)=>s+f.amount,0));
  const fDespReal = round2(fDesp.reduce((s,f)=>s+fcCalc(f).realizado,0));

  // ── Row helper ──────────────────────────────────────────────────────
  const fcRow = (f, accentColor, accentDim, accentBorder) => {
    const {realizado, falta, pct, status} = fcCalc(f);
    const daysD    = daysDiff(f.date);
    const isPend   = status==='pendente';
    const isQuit   = status==='quitado';
    const isParcial= status==='parcial';
    const statusColor = isQuit?'var(--em)':isParcial?'var(--amber)':'var(--text3)';
    const statusLabel = isQuit?'✅ Efetivado'
      : isParcial?`⚡ Parcial · ${fmt(realizado)} de ${fmt(f.amount)} efetivados`
      : isPend&&daysD<0?'⚠️ Vencida':'⏳ Pendente';
    const borderC = isPend&&daysD<0?'rgba(255,51,102,.3)':isPend&&daysD===0?'rgba(255,171,0,.3)':'var(--border)';
    const pmts = f.payments||[];
    const pmtRows = pmts.map(p=>`
      <div style="display:flex;align-items:center;justify-content:space-between;padding:5px 8px;border-radius:9px;background:var(--glass);margin-top:4px">
        <div>
          <span style="font-size:11px;color:var(--text3)">${fmtDue(p.date)}${p.obs?` · ${esc(p.obs)}`:''}</span>
          ${p.launched?`<span style="font-size:10px;color:var(--em);margin-left:4px">✅ extrato</span>`:''}
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="val" style="font-size:12px;color:${accentColor}">${fmt(p.amount)}</span>
          <button onclick="delFcPaymentInline('${f.id}','${p.id}')" style="background:none;border:none;color:var(--rose);font-size:15px;cursor:pointer;padding:0 3px;line-height:1">×</button>
        </div>
      </div>`).join('');
    return `<div style="padding:12px 14px;border-radius:14px;background:var(--glass);border:1px solid ${borderC};margin-bottom:8px">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(f.label)}</div>
          ${f.obs?`<div style="font-size:11px;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">📝 ${esc(f.obs)}</div>`:''}
          <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
            <span style="font-size:11px;color:${isPend&&daysD<0?'var(--rose)':isPend&&daysD===0?'var(--amber)':'var(--text3)'};font-weight:600">${fmtDue(f.date)}</span>
            <span style="font-size:11px;color:${statusColor};font-weight:700">${statusLabel}</span>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">
          <div class="val" style="font-size:14px;color:${accentColor}">${fmt(f.amount)}</div>
          <div style="display:flex;gap:5px">
            <button onclick="openFcAporte('${f.id}')" style="padding:5px 10px;border-radius:9px;background:${accentDim};border:1px solid ${accentBorder};color:${accentColor};font-size:11px;font-weight:700;cursor:pointer">${isQuit?'➕ Adicional':'⚡ Efetivar'}</button>
            <button onclick="openFcMenu('${f.id}')" style="padding:5px 9px;border-radius:9px;background:var(--glass2);border:1px solid var(--border);color:var(--text2);font-size:14px;font-weight:900;cursor:pointer;line-height:1">⋯</button>
          </div>
        </div>
      </div>
      <div style="height:5px;border-radius:999px;background:var(--border);overflow:hidden;margin-bottom:${pmts.length?'6px':'0'}">

    <div style="font-size:14px;font-weight:800;color:var(--text2)">💡 Previsões do Mês</div>

function savePrefsTab(){const v=round2(safeNum($('tab-meta')?.value));if(v>0)setPS({metaDiaria:v});showToast('✅ Preferências salvas!')}

function cancelRstTab(){const rc=$('tab-rst-c'),rb=$('tab-rst-btn');if(rc)rc.style.display='none';if(rb)rb.style.display='block'}
function limparDuplicatas(){
  const before=(AP().bills||[]).length;
  const cleaned=deduplicateBills({...AP()});
  setPS(p=>({...p,bills:cleaned.bills,installments:cleaned.installments||p.installments}));
  const after=(AP().bills||[]).length;
  const removed=before-after;
  showToast(removed>0?`🧹 ${removed} registro(s) duplicado(s) removido(s)!`:'✅ Nenhuma duplicata encontrada.');
}

// Toast notification
function showErr(msg, elId){
  const el=elId?document.getElementById(elId):null;
  if(el){el.textContent='⚠️ '+msg;el.style.display='block';setTimeout(()=>{el.style.display='none';},3500);}
  else showToast('⚠️ '+msg);
}
function showToast(msg){let t=document.getElementById('toast');if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg2);border:1px solid var(--cyan);color:var(--cyan);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:999;opacity:0;transition:all .3s;white-space:nowrap;box-shadow:var(--card-shadow)';document.body.appendChild(t)}t.textContent=msg;t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';clearTimeout(t._to);t._to=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(10px)'},2200)}

// ─── HELPER: progresso da meta com cálculo automático por transações ──
function goalProgressInfo(g){
  const rec=g.recurrence||'personalizada';
  const tod=today();
  const mode=AP().mode;
  let current=0,periodLabel='',neededLabel='',deadlineLabel='';

  if(rec==='diaria'){
    // Soma receitas do dia corrente
    current=round2(AP().transactions.filter(t=>t.mode===mode&&t.type==='receita'&&t.date===tod).reduce((a,b)=>a+b.amount,0));
    periodLabel='Meta Diária';
    neededLabel=current<g.target?'Faltam '+fmt(round2(g.target-current))+' hoje':'';
  } else if(rec==='semanal'){
    // Soma receitas da semana corrente (seg–dom)
    const n=new Date();const dow=n.getDay()||7;
    const weekDates=[];
    for(let i=0;i<dow;i++){const d=new Date(n);d.setDate(n.getDate()-i);weekDates.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`)}
    current=round2(AP().transactions.filter(t=>t.mode===mode&&t.type==='receita'&&weekDates.includes(t.date)).reduce((a,b)=>a+b.amount,0));
    periodLabel='Meta Semanal';
    const daysLeft=7-dow;
    neededLabel=current<g.target&&daysLeft>0?'Faltam '+fmt(round2(g.target-current))+' ('+daysLeft+'d restantes)':'';
  } else if(rec==='mensal'){
    // Soma receitas do mês corrente
    const ym=tod.slice(0,7);
    current=round2(AP().transactions.filter(t=>t.mode===mode&&t.type==='receita'&&(t.date||'').startsWith(ym)).reduce((a,b)=>a+b.amount,0));
    periodLabel='Meta Mensal';
    const diaAtual=parseInt(tod.split('-')[2])||1;
    const daysInMonth=new Date(parseInt(ym.split('-')[0]),parseInt(ym.split('-')[1]),0).getDate();
    const daysLeft=daysInMonth-diaAtual;
    neededLabel=current<g.target&&daysLeft>0?'Faltam '+fmt(round2(g.target-current))+' ('+daysLeft+'d restantes)':'';
  } else {
    // personalizada — usa campo saved (aporte manual)
    current=g.saved||0;
    periodLabel='Meta Personalizada';
    const daysLeft=g.deadline?Math.max(0,Math.ceil((new Date(g.deadline+' 00:00:00')-new Date())/86400000)):null;
    deadlineLabel=g.deadline?'Prazo: '+g.deadline:'Sem prazo';
    const rem=round2(g.target-current);
    const monthly=daysLeft&&daysLeft>0?round2(rem/(daysLeft/30.44)):null;
    neededLabel=monthly&&current<g.target?('≈ '+fmt(monthly)+'/mês'):'';
  }

  const pct=Math.min(g.target>0?(current/g.target)*100:0,100);
  const rem=round2(Math.max(0,g.target-current));
  return{pct,rem,current,periodLabel,deadlineLabel,neededLabel};
}

    if(v&&!_txTags.includes(v)){_txTags.push(v);renderTagsField();}

    </button>

      <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="0,9 3,5 6,7 9,2 12,4"/></svg> Linhas
    </button>

  const canvasH=120;
  const chartInner=compChartType==='bar'
    ? _compBarHTML(compMonths,cyanColor,roseColor,isDark,canvasH)

// ── Gráfico de BARRAS ──────────────────────────────────────────────────
function _compBarHTML(compMonths,cyanColor,roseColor,isDark,H){
  const maxVal=Math.max(...compMonths.map(m=>Math.max(m.rec,m.dep)),1);
  const barMaxH=68;
  const cols=compMonths.map((m,i)=>{
    const rH=Math.max((m.rec/maxVal)*barMaxH,m.rec>0?3:0);
    const dH=Math.max((m.dep/maxVal)*barMaxH,m.dep>0?3:0);
    const [,mm]=m.ym.split('-');
    const lbl=MONTHS_S[parseInt(mm)-1];
    const isSel=m.ym===selYM;
    return`<div class="comp-bar-col" data-idx="${i}" style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;cursor:pointer;-webkit-tap-highlight-color:transparent" onclick="compBarTap(this,${i})">
      <div style="display:flex;align-items:flex-end;gap:2px;height:${barMaxH}px">
        <div style="width:11px;height:${rH}px;border-radius:3px 3px 0 0;background:${cyanColor};opacity:${isSel?1:.45};transition:opacity .2s"></div>
        <div style="width:11px;height:${dH}px;border-radius:3px 3px 0 0;background:${roseColor};opacity:${isSel?1:.45};transition:opacity .2s"></div>
      </div>
      <div style="font-size:9px;font-weight:${isSel?'800':'500'};color:${isSel?'var(--cyan)':'var(--text3)'};font-family:'Outfit',sans-serif">${lbl}</div>
    </div>`;
  }).join('');

  return`<div style="position:relative">
    <div id="comp-bar-tip" style="position:absolute;top:-4px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:5px 11px;font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;pointer-events:none;display:none;z-index:10;box-shadow:0 2px 10px rgba(0,0,0,.15);font-family:'Outfit',sans-serif"></div>
    <div style="display:flex;align-items:flex-end;gap:2px">${cols}</div>
  </div>`;
}

// ── Tap handler para barras ────────────────────────────────────────────
function compBarTap(el,idx){
  const tip=document.getElementById('comp-bar-tip');
  if(!tip)return;
  const c=window._lastCompMonths;
  if(!c||!c[idx])return;
  const m=c[idx];
  const [y,mm]=m.ym.split('-');
  const lbl=`${MONTHS_S[parseInt(mm)-1]}/${String(y).slice(2)}`;
  tip.innerHTML=`<span style="color:var(--cyan)">${fmt(m.rec)}</span> · <span style="color:var(--rose)">${fmt(m.dep)}</span> <span style="color:var(--text3);font-size:10px;font-weight:500">${lbl}</span>`;

  // Posição horizontal relativa ao card
  const cols=document.querySelectorAll('.comp-bar-col');
  const elRect=el.getBoundingClientRect();
  const parentRect=el.closest('[style*="position:relative"]')?.getBoundingClientRect();
  if(parentRect){
    const cx=elRect.left+elRect.width/2-parentRect.left;
    tip.style.left=Math.max(60,Math.min(parentRect.width-60,cx))+'px';
  }
  tip.style.display='block';
  setTimeout(()=>{if(tip)tip.style.display='none';},2800);
}

// ── Gráfico de LINHAS com linha guia deslizante ───────────────────────
function _compLineHTML(compMonths,cyanColor,roseColor,isDark,H){
  const W=360;
  const padL=32,padR=12,padT=14,padB=22;
  const maxVal=Math.max(...compMonths.map(m=>Math.max(m.rec,m.dep)),1);
  const n=compMonths.length;
  const xOf=i=>padL+(i/(n-1||1))*(W-padL-padR);
  const yOf=v=>padT+(1-(v/maxVal))*(H-padT-padB);

  // Grid lines
  const gridSteps=4;
  let gridSVG='';
  for(let i=0;i<=gridSteps;i++){
    const y=padT+i*((H-padT-padB)/gridSteps);
    const val=maxVal*(1-i/gridSteps);
    gridSVG+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="${isDark?'rgba(255,255,255,.06)':'rgba(0,0,0,.06)'}" stroke-width="1"/>`;
    if(i<gridSteps) gridSVG+=`<text x="${padL-4}" y="${y+4}" text-anchor="end" font-size="8" fill="${isDark?'rgba(255,255,255,.28)':'rgba(0,0,0,.28)'}" font-family="Outfit,sans-serif">${val>=1000?Math.round(val/1000)+'k':Math.round(val)}</text>`;
  }

  // X axis labels
  let xLabels='';
  compMonths.forEach((m,i)=>{
    const [,mm]=m.ym.split('-');
    const lbl=MONTHS_S[parseInt(mm)-1];
    xLabels+=`<text x="${xOf(i)}" y="${H-4}" text-anchor="middle" font-size="9" fill="${m.ym===selYM?cyanColor:(isDark?'rgba(255,255,255,.3)':'rgba(0,0,0,.3)')}" font-weight="${m.ym===selYM?'800':'500'}" font-family="Outfit,sans-serif">${lbl}</text>`;
  });

  // Rec line
  const recPts=compMonths.map((m,i)=>`${xOf(i)},${yOf(m.rec)}`).join(' ');
  const depPts=compMonths.map((m,i)=>`${xOf(i)},${yOf(m.dep)}`).join(' ');

  // Area fills (gradient)
  const recAreaPts=`${xOf(0)},${yOf(0)} ${compMonths.map((m,i)=>`${xOf(i)},${yOf(m.rec)}`).join(' ')} ${xOf(n-1)},${yOf(0)}`;
  const depAreaPts=`${xOf(0)},${yOf(0)} ${compMonths.map((m,i)=>`${xOf(i)},${yOf(m.dep)}`).join(' ')} ${xOf(n-1)},${yOf(0)}`;

  // Dots
  let recDots='',depDots='';
  compMonths.forEach((m,i)=>{
    const rx=xOf(i),ry=yOf(m.rec),dx=xOf(i),dy=yOf(m.dep);
    const sel=m.ym===selYM;
    recDots+=`<circle cx="${rx}" cy="${ry}" r="${sel?4:2.5}" fill="${cyanColor}" opacity="${sel?1:.7}"/>`;
    depDots+=`<circle cx="${dx}" cy="${dy}" r="${sel?4:2.5}" fill="${roseColor}" opacity="${sel?1:.7}"/>`;
  });

  const svgId='comp-line-svg';
  const svg=`<svg id="${svgId}" viewBox="0 0 ${W} ${H}" width="100%" height="${H}" style="display:block;overflow:visible">
    <defs>
      <linearGradient id="recFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${cyanColor}" stop-opacity="${isDark?'.18':'.12'}"/><stop offset="100%" stop-color="${cyanColor}" stop-opacity="0"/></linearGradient>
      <linearGradient id="depFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${roseColor}" stop-opacity="${isDark?'.18':'.12'}"/><stop offset="100%" stop-color="${roseColor}" stop-opacity="0"/></linearGradient>
    </defs>
    ${gridSVG}
    <polygon points="${recAreaPts}" fill="url(#recFill)"/>
    <polygon points="${depAreaPts}" fill="url(#depFill)"/>
    <polyline points="${recPts}" fill="none" stroke="${cyanColor}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <polyline points="${depPts}" fill="none" stroke="${roseColor}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${recDots}${depDots}
    ${xLabels}
    <!-- linha guia deslizante -->
    <line id="comp-guide" x1="0" y1="${padT}" x2="0" y2="${H-padB}" stroke="${isDark?'rgba(255,255,255,.35)':'rgba(0,0,0,.25)'}" stroke-width="1.5" stroke-dasharray="3,3" display="none"/>
    <circle id="comp-dot-r" cx="0" cy="0" r="5" fill="${cyanColor}" stroke="${isDark?'#111':'#fff'}" stroke-width="2" display="none"/>
    <circle id="comp-dot-d" cx="0" cy="0" r="5" fill="${roseColor}" stroke="${isDark?'#111':'#fff'}" stroke-width="2" display="none"/>
  </svg>`;

  // Tooltip flutuante
  const tip=`<div id="comp-line-tip" style="position:absolute;top:8px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:5px 12px;font-size:12px;font-weight:700;white-space:nowrap;pointer-events:none;display:none;z-index:10;box-shadow:0 2px 10px rgba(0,0,0,.15);font-family:'Outfit',sans-serif"></div>`;

  // Armazena dados para acesso no handler
  setTimeout(()=>attachCompLineInteraction(compMonths,W,padL,padR,padT,padB,H),30);

  return`<div style="position:relative;touch-action:none" id="comp-line-wrap">
    ${svg}${tip}
    <div id="comp-line-overlay" style="position:absolute;inset:0;cursor:crosshair"></div>
  </div>`;
}

function attachCompLineInteraction(months,W,padL,padR,padT,padB,H){
  const overlay=document.getElementById('comp-line-overlay');
  const guide=document.getElementById('comp-guide');
  const dotR=document.getElementById('comp-dot-r');
  const dotD=document.getElementById('comp-dot-d');
  const tip=document.getElementById('comp-line-tip');
  const svg=document.getElementById('comp-line-svg');
  if(!overlay||!guide||!svg)return;
  const n=months.length;
  const maxVal=Math.max(...months.map(m=>Math.max(m.rec,m.dep)),1);
  const xOf=i=>padL+(i/(n-1||1))*(W-padL-padR);
  const yOf=v=>padT+(1-(v/maxVal))*(H-padT-padB);

  function onMove(clientX){
    const rect=svg.getBoundingClientRect();
    const scaleX=W/rect.width;
    const xRel=(clientX-rect.left)*scaleX;
    // Snap ao ponto mais próximo
    let best=0,bestDist=Infinity;
    months.forEach((_,i)=>{const d=Math.abs(xOf(i)-xRel);if(d<bestDist){bestDist=d;best=i;}});
    const m=months[best];
    const gx=xOf(best);
    const ry=yOf(m.rec),dy=yOf(m.dep);
    guide.setAttribute('x1',gx);guide.setAttribute('x2',gx);
    guide.removeAttribute('display');
    dotR.setAttribute('cx',gx);dotR.setAttribute('cy',ry);dotR.removeAttribute('display');
    dotD.setAttribute('cx',gx);dotD.setAttribute('cy',dy);dotD.removeAttribute('display');
    const [y,mm]=m.ym.split('-');
    const lbl=`${MONTHS_S[parseInt(mm)-1]}/${String(y).slice(2)}`;
    tip.innerHTML=`<span style="color:var(--cyan)">${fmt(m.rec)}</span> · <span style="color:var(--rose)">${fmt(m.dep)}</span> <span style="color:var(--text3);font-size:10px;font-weight:500">${lbl}</span>`;
    // posição horizontal do tip
    const tipX=Math.max(70,Math.min(rect.width-70,gx/scaleX));
    tip.style.left=tipX+'px';
    tip.style.display='block';
  }
  function onEnd(){
    guide.setAttribute('display','none');
    dotR.setAttribute('display','none');
    dotD.setAttribute('display','none');
    tip.style.display='none';
  }
  overlay.addEventListener('mousemove',e=>onMove(e.clientX));
  overlay.addEventListener('mouseleave',onEnd);
  overlay.addEventListener('touchstart',e=>{e.preventDefault();onMove(e.touches[0].clientX)},{passive:false});
  overlay.addEventListener('touchmove',e=>{e.preventDefault();onMove(e.touches[0].clientX)},{passive:false});
  overlay.addEventListener('touchend',onEnd);
}

function renderDashGoalsBlock(c){
  // Metas de periodicidade (diária/semanal/mensal/personalizada) no estado
  const dashMetas=AP().dashMetas||{};
  // Calcular progresso de cada tipo de meta activa
  const tipos=[
    {key:'diaria',  label:'Meta Diária',   icon:'📅', period:'dia',  getValue:()=>c.ganhoHj,   getTarget:()=>dashMetas.diaria||AP().metaDiaria||250},
    {key:'semanal', label:'Meta Semanal',  icon:'📆', period:'semana', getValue:()=>{
      // Soma receitas da semana atual
      const n=new Date();const dow=n.getDay()||7;
      const dates=[];for(let i=0;i<dow;i++){const d=new Date(n);d.setDate(n.getDate()-i);dates.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`)}
      return round2(AP().transactions.filter(t=>t.mode===AP().mode&&t.type==='receita'&&dates.includes(t.date)).reduce((a,b)=>a+b.amount,0));
    }, getTarget:()=>dashMetas.semanal||0},
    {key:'mensal',  label:'Meta Mensal',   icon:'🗓️', period:'mês',  getValue:()=>c.totalR,    getTarget:()=>dashMetas.mensal||0},
    {key:'custom',  label:dashMetas.customLabel||'Meta Personalizada',icon:'🎯',period:'personalizada',getValue:()=>dashMetas.customSaved||0,getTarget:()=>dashMetas.custom||0},
  ];
  const ativas=tipos.filter(t=>t.getTarget()>0);
  if(!ativas.length){
    // Sem metas — mostrar prompt amigável
    return`<div class="card" style="padding:16px 18px;margin-bottom:12px;cursor:pointer;border-style:dashed;border-color:rgba(0,229,255,.3)" onclick="openMetaModal()">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:46px;height:46px;border-radius:14px;background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.2);display:flex;align-items:center;justify-content:center;font-size:22px">🎯</div>

        </div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>
      </div>
    </div>`;
  }
  // Uma única meta — layout hero com anel radial
  if(ativas.length===1){
    const m=ativas[0];
    const val=m.getValue();const tgt=m.getTarget();
    const pct=Math.min((val/tgt)*100,100);
    const mC=pct>=100?'#ffd54f':pct>=60?'var(--em)':'var(--rose)';
    const metaGlow=pct>=100?'rgba(255,213,79,.4)':'';

// ─── Modal tela-cheia de Metas ─────────────────────────────────────────
function openGoalDetailModal(){
  const dashMetas=AP().dashMetas||{};

  // ── Texto dinâmico inteligente (falta / excedeu) ──────────────────

            stroke-linecap="round"

      <button onclick="event.stopPropagation();openGoalsModal()" style="width:32px;height:32px;border-radius:50%;background:var(--glass);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0">

          </div>
          <div style="height:5px;border-radius:999px;background:var(--border);overflow:hidden">
            <div style="height:100%;border-radius:999px;background:${col};width:${pct}%;transition:width .5s cubic-bezier(.34,1.56,.64,1)"></div>
          </div>
          ${neededLabel?`<div style="font-size:10px;color:var(--text3);margin-top:3px">${neededLabel}</div>`:''}
        </div>`;
      }).join('')}
    </div>`:'';

  return`<div class="card" style="padding:14px 16px;margin-bottom:12px;${p1pct>=100?'border-color:rgba(255,213,79,.25);box-shadow:0 0 20px rgba(255,213,79,.07);':''}">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
      <div style="font-size:14px;font-weight:800">🎯 Metas Financeiras</div>

const BILL_EMOJIS=['💡','💧','🌐','📱','🎬','🏠','🚗','🛡️','🎓','🏋️','🐾','🎵','💊','🛒','✈️','📺','🔥','🌊'];
function billIcon(b,sz){
  const s=sz||42,r=sz?Math.round(sz*0.31):13,f=sz?Math.round(sz*0.48):20;
  const wrap=(bg,br,ico)=>`<div style="width:${s}px;height:${s}px;border-radius:${r}px;background:${bg};border:1px solid ${br};display:flex;align-items:center;justify-content:center;font-size:${f}px;flex-shrink:0">${ico}</div>`;
  if(b.emoji) return wrap('rgba(255,171,0,.12)','rgba(255,171,0,.2)',b.emoji);
  if(b.category){const cat=getCats().find(c=>c.id===b.category);if(cat)return wrap(cat.color+'18',cat.color+'44',cat.icon);}
  return wrap('rgba(255,171,0,.12)','rgba(255,171,0,.2)','📄');
}

function exportRelatorio(){
  const c=comp();
  const lines=[
    `FIN — Relatório Mensal`,
    `${ymLbl(selYM)} · Modo: ${AP().mode==='moto'?'Motorista':'Pessoal'}`,
    `Usuário: ${S.userName||'Usuário'}`,
    `Gerado em: ${today()}`,
    ``,
    `═══════════════════════════════`,
    `RESUMO FINANCEIRO`,
    `═══════════════════════════════`,
    `Receita Total:    ${fmt(c.totalR)}`,
    `Despesas Total:   ${fmt(c.totalD)}`,
    `Saldo Líquido:    ${fmt(c.saldo)}`,
    `Margem:   ${c.margLiq.toFixed(1)}%`,
    ``,
    `═══════════════════════════════`,
    `DESPESAS POR CATEGORIA`,
    `═══════════════════════════════`,
    ...c.pieD.map(d=>`${d.icon} ${d.label.padEnd(15)} ${fmt(d.value).padStart(12)} (${(c.totalD>0?(d.value/c.totalD*100):0).toFixed(0)}%)`),
    ``,
    `═══════════════════════════════`,
    `EXTRATO (${c.txns.length} lançamentos)`,
    `═══════════════════════════════`,
    ...c.txns.slice(0,50).map(t=>`${t.date} ${t.type==='receita'?'+':`-`}${fmt(t.amount).padStart(12)}  ${esc(t.description||'')}`),
    ``,
    `FIN — Controle Financeiro Inteligente`,
  ];
  const txt=lines.join('\n');
  try{
    const b=new Blob([txt],{type:'text/plain;charset=utf-8'});
    const u=URL.createObjectURL(b);
    const a=document.createElement('a');
    a.href=u;a.download=`fin_relatorio_${selYM}.txt`;
    document.body.appendChild(a);a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(u)},300);
    showToast('✅ Relatório exportado!');
  }catch(e){
    const uri='data:text/plain;charset=utf-8,'+encodeURIComponent(txt);
    window.open(uri,'_blank');
    showToast('Relatório aberto em nova aba');
  }
}

// FEATURE: RECORRÊNCIA INTELIGENTE (detectar padrões)
// ═══════════════════════════════════════════════════════════════════════
function detectRecurring(){
  const txns=AP().transactions.filter(t=>t.mode===AP().mode&&t.type==='despesa');
  const groups={};
  txns.forEach(t=>{
    const key=(t.description||'').toLowerCase().trim();
    if(!key)return;
    if(!groups[key])groups[key]=[];
    groups[key].push(t);
  });
  const suspects=Object.entries(groups)
    .filter(([,v])=>v.length>=2)
    .map(([k,v])=>{
      const months=[...new Set(v.map(t=>getYM(t.date)))];
      return{desc:v[0].description,amount:v[0].amount,count:v.length,months:months.length,last:v[0].date};
    })
    .filter(s=>s.months>=2)
    .slice(0,5);
  if(!suspects.length){showToast('Nenhum padrão recorrente detectado.');return;}
  showMC(`<div style="padding:22px">
    <div style="font-size:18px;font-weight:900;margin-bottom:6px">🔄 Padrões Detectados</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:18px">Estas despesas aparecem regularmente. Deseja criar boletos fixos?</div>
    ${suspects.map(s=>`<div style="padding:14px;border-radius:14px;background:var(--glass);border:1px solid var(--border);margin-bottom:10px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <div style="font-size:13px;font-weight:700">${esc(s.desc)}</div>
        <div class="val" style="font-size:13px;color:var(--amber)">${fmt(s.amount)}</div>
      </div>
      <div style="font-size:11px;color:var(--text3)">Apareceu em ${s.months} meses · ${s.count}x no total</div>
    </div>`).join('')}
    <div style="font-size:12px;color:var(--text3);text-align:center;margin-top:8px">Vá em Contas → + para criar boletos fixos.</div>
  </div>`);
}

// ─── RENDER PRINCIPAL ───────────────────────────────────────────────
function render(){
  const c=comp();
  renderHdr();renderAlerts(c.mBills);
  if(curTab==='home')          renderHome(c);
  else if(curTab==='extrato')  renderExtrato(c);
  else if(curTab==='analise')  renderAnalise(c);
  else if(curTab==='metas')    renderMetas();
  else if(curTab==='contas')   renderContas(c);
  else if(curTab==='cfg')      renderCfgTab();
}

// ─── NAVIGATION ───────────────────────────────────────────────────────
function goTab(t){
  // Redirect legacy tabs to new unified ones
  if(t==='relat'||t==='dre') t='analise';
  curTab=t;
  $$('.nav-btn').forEach(b=>b.classList.remove('active'));
  const nb=$('nb-'+t);if(nb)nb.classList.add('active');
  $('content').scrollTop=0;closeFab();render();
}

function _cardDayChips(prefix, onclick, selectedDay){

// Calcula em qual mês-ano o gasto deve cair com base na data do gasto e fechamento do cartão
// Regra: gasto ANTES do fechamento → fatura do mês atual; APÓS o fechamento → fatura do mês seguinte
function calcInvoiceMonth(txDate, closingDay){
  if(!txDate||!closingDay) return txDate;
  const [y,m,d]=txDate.split('-').map(Number);
  if(d <= closingDay){
    // Antes ou no fechamento → mês atual
    return txDate;
  } else {
    // Após fechamento → mês seguinte
    const dt=new Date(y,m-1,d);
    dt.setMonth(dt.getMonth()+1);
    return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
  }
}

function tfAdjCurInst(delta){const nP=safeInt(TF.numParcelas,2);TF.currentInstallment=Math.max(1,Math.min(nP,((TF.currentInstallment||1)+delta)));const lbl=$('tf-curinst-lbl');const ci=TF.currentInstallment;const sfx=ci===1?'ª':ci===2?'ª':ci===3?'ª':'ª';if(lbl)lbl.textContent=`${ci}${sfx} parcela de ${nP}`;tfParHint();}
function saveTxn(){
  const aEl=$('tf-amt'),dEl=$('tf-desc'),dtEl=$('tf-date');
  if(aEl)TF.amount=parseCurrency(aEl);if(dEl)TF.description=dEl.value;if(dtEl)TF.date=dtEl.value;
  const cats=getCats();
  const recCats=getRecCats();
  const amt=round2(TF.amount||0);if(amt<=0){showErr('Digite um valor válido.','cf-err');return}
  const fA=safeNum(TF.kmAnterior),fB=safeNum(TF.kmAtual),fL=safeNum(TF.litros);
  if(TF.category==='combustivel'&&AP().mode==='moto'&&fA>0&&fB>0&&fB<=fA){showToast('⚠️ KM Atual deve ser maior que KM Anterior.');return}
  const cat=TF.type==='receita'?(recCats.find(c=>c.id===TF.category)||recCats[0]):(cats.find(c=>c.id===TF.category)||cats[0]);
  const desc=(TF.description||'').trim()||(cat?`${cat.icon} ${cat.label}`:(TF.type==='receita'?'Receita':'Despesa'));
  const platformVal=TF.platform||'';

  if(TF.type==='despesa'&&TF.parcelar&&TF.numParcelas>1){
    const nP=safeInt(TF.numParcelas,2),gid=uid();
    const ci=Math.max(1,Math.min(TF.currentInstallment||1,nP));
    const remaining=nP-ci+1;
    // Calcular mês da fatura para parcelas com cartão
    const effectiveClosing=TF.closingDay||(TF.creditCard?(AP().creditCards||[]).find(c=>c.id===TF.creditCard)?.closingDay:null);
    const effectiveDue=TF.invoiceDueDay||(TF.creditCard?(AP().creditCards||[]).find(c=>c.id===TF.creditCard)?.dueDay:null);
    const baseDate=TF.creditCard&&effectiveClosing?calcInvoiceMonth(TF.date||today(),effectiveClosing):(TF.date||today());
    const grp={id:gid,mode:AP().mode,label:desc,amountPerParcela:amt,totalParcelas:nP,emoji:'',category:'',creditCard:TF.creditCard||'',paymentMethod:TF.paymentMethod||'',invoiceDueDay:effectiveDue||'',closingDay:effectiveClosing||''};
    const bills=Array.from({length:remaining},(_,i)=>({id:uid(),mode:AP().mode,label:`${desc} (${ci+i}/${nP})`,amount:amt,dueDate:addMo(baseDate,i),paid:false,installmentGroupId:gid,installmentIndex:ci+i,installmentTotal:nP,creditCard:TF.creditCard||'',paymentMethod:TF.paymentMethod||'',invoiceDueDay:effectiveDue||'',closingDay:effectiveClosing||''}));
    const txCurrent={id:uid(),mode:AP().mode,type:'despesa',description:`${desc} (${ci}/${nP})`,amount:amt,category:TF.category||cats[0]?.id,platform:platformVal,date:baseDate,installmentGroupId:gid,installmentIndex:ci,installmentTotal:nP,creditCard:TF.creditCard||'',paymentMethod:TF.paymentMethod||'',invoiceDueDay:effectiveDue||'',closingDay:effectiveClosing||'',...(TF.recurrenceType==='fixo'?{recurrence:'fixo'}:{})};
    // Parcelas afetam contas também — render completo necessário
    _setPS_andRender(p=>({...p,installments:[grp,...(p.installments||[])],bills:[...bills,...p.bills],transactions:[txCurrent,...p.transactions]}), 'full');
  } else {
    // Calcular mês correto da fatura se for cartão de crédito
    const effectiveClosing=TF.closingDay||(TF.creditCard?(AP().creditCards||[]).find(c=>c.id===TF.creditCard)?.closingDay:null);
    const effectiveDue=TF.invoiceDueDay||(TF.creditCard?(AP().creditCards||[]).find(c=>c.id===TF.creditCard)?.dueDay:null);
    const txDate=TF.creditCard&&effectiveClosing?calcInvoiceMonth(TF.date||today(),effectiveClosing):(TF.date||today());
    const newTxn={id:uid(),mode:AP().mode,type:TF.type,description:desc,amount:amt,category:TF.category||(TF.type==='receita'?recCats[0]?.id:cats[0]?.id),platform:platformVal,date:txDate,litros:fL>0?round2(fL):null,kmAnterior:fA>0?round2(fA):null,kmAtual:fB>0?round2(fB):null,tags:[..._txTags],paymentMethod:TF.paymentMethod||'',creditCard:TF.creditCard||'',invoiceDueDay:effectiveDue||'',closingDay:effectiveClosing||'',...(TF.type==='despesa'&&TF.recurrenceType==='fixo'?{recurrence:'fixo'}:{})};
    // ── Otimização: se estamos no extrato, atualiza só a lista ──────
    _setPS_andRender(p=>({...p,transactions:[newTxn,...p.transactions]}), 'partial');
  }
  closeM();
}

// ── _setPS_andRender: aplica patch + decide se faz render completo ou parcial ──
// strategy: 'full' = render() completo | 'partial' = tenta atualizar só o extrato
function _setPS_andRender(patchFn, strategy) {
  const patchResult = typeof patchFn === 'function' ? patchFn : (p => ({...p, ...patchFn}));
  S = {...S, profiles: S.profiles.map(p => p.id === S.activeProfileId ? patchResult(p) : p)};
  persist();
  applyTheme();

  // Render parcial: só reconstrói a lista de transações se o extrato já estiver visível
  if (strategy === 'partial' && curTab === 'extrato') {
    const listEl = document.getElementById('extrato-list');
    if (listEl) {
      // Atualiza apenas o container da lista — header e filtros permanecem intactos
      const c = comp();
      const listHtml = _buildExtratoList(c);
      listEl.innerHTML = listHtml;
      renderAlerts(c.mBills);
      return;
    }
  }
  // Fallback: render completo (home, analise, contas, etc.)
  render();
}

function openEditBill(id, isInst){
  // Busca correcta
  const b = isInst
    ? AP().bills.find(x=>String(x.installmentGroupId)===String(id))
    : AP().bills.find(x=>String(x.id)===String(id));

  if(!b){
    console.log('[openEditBill] id:', id, '| isInst:', isInst,
                '| ids:', AP().bills.map(x=>x.id));
    showToast('Boleto não encontrado');
    return;
  }

  // ── 1. Metadados ──────────────────────────────────────────────
  const isParc  = !!b.installmentGroupId;
  // installmentTotal é a fonte autoritativa; count de bills como fallback
  const nP      = isParc
    ? (b.installmentTotal||b.totalParcelas||
       AP().bills.filter(x=>x.installmentGroupId===b.installmentGroupId).length||
       2)
    : 2;
  const sP      = isParc ? (b.installmentIndex||1) : 1;
  const baseLbl = b.label.replace(/\s*\(\d+\/\d+\)$/, '').trim();

  // ── 2. Popular CF ──────────────────────────────────────────────
  editingBillId = b.id;
  // Pré-popular customDates com as datas reais de cada parcela do grupo
  const _customDates = {};
  if(isParc){
    const _grpBills = AP().bills
      .filter(x=>x.installmentGroupId===b.installmentGroupId)
      .sort((a,z)=>(a.installmentIndex||0)-(z.installmentIndex||0));
    _grpBills.forEach(x=>{
      const i = (x.installmentIndex||1) - sP; // i=0 → 1ª parcela (firstDueDate)
      if(i>0) _customDates[i] = x.dueDate||''; // i>=1 vai para inputs .cfd
    });
  }

  CF = {
    label:         baseLbl,
    amount:        String(b.amount),
    parcelado:     false,           // começa false — cfSetParc vai activar
    startParcela:  sP,
    totalParcelas: nP,
    firstDueDate:  isParc ? (b.dueDate||'') : '',
    dueDateMode:   'auto',
    customDates:   _customDates,   // datas reais do grupo pré-populadas
    dueDate:       isParc ? '' : (b.dueDate||''),
    recurrence:    b.recurrence||'unico',
    emoji:         b.emoji||'',
    category:      b.category||''
  };

  // ── 3. Abrir modal original ────────────────────────────────────
  showM(contaShell());
  cfBind();

  // ── 4. Preencher UI após DOM pronto ───────────────────────────
  requestAnimationFrame(()=>{ requestAnimationFrame(()=>{
    const fire = el=>{
      el.dispatchEvent(new Event('input',  {bubbles:true}));
      el.dispatchEvent(new Event('change', {bubbles:true}));
    };

    // Nome
    const lEl=$('cf-lbl');
    if(lEl){ lEl.value=baseLbl; fire(lEl); }

    // Valor — usa setMaskVal diretamente pois cfBind() já registrou _masked=true
    const aEl=$('cf-amt');
    if(aEl){
      setMaskVal(aEl, b.amount);
      CF.amount = String(b.amount); // sincroniza estado
      fire(aEl);
    }

    // Recorrência — pinta botão Único/Fixo
    cfRec();

    // Parcelado — cfSetParc FORÇA o estado (não toggle)
    cfSetParc(isParc);

    if(isParc){
      // startParcela ANTES de cfNP — cfSpUpdate usa CF.startParcela
      CF.startParcela = sP;
      cfNP(nP);                          // chips + hint + cfSpUpdate
      // input numérico (cobre nP não-standard: 5,7,9…)
      const npcEl=$('cf-npc');
      if(npcEl){ npcEl.value=String(nP); }
      // garantir cf-sp hidden com o valor correcto
      const spHidEl=$('cf-sp');
      if(spHidEl){ spHidEl.value=String(sP); }
      const fdEl=$('cf-fdue');
      if(fdEl){ fdEl.value=b.dueDate||''; CF.firstDueDate=b.dueDate||''; fire(fdEl); }
    } else {
      const dEl=$('cf-due');
      if(dEl){ dEl.value=b.dueDate||''; CF.dueDate=b.dueDate||''; fire(dEl); }
    }

    // Highlight emoji salvo
    if(b.emoji){
      const eEl=document.getElementById('be-'+b.emoji.codePointAt(0));
      if(eEl){eEl.style.borderColor='var(--em)';eEl.style.background='var(--em-dim)';}
    }
    // Highlight categoria salva
    if(b.category) selBillCat(b.category);

    // Título e botão — DEPOIS de tudo (cfHint não sobrescreve por !editingBillId)
    const title=$('ms')?.querySelector('.mtitle');
    if(title) title.textContent='📝 Editar Conta';
    const sb=$('cf-sb');
    if(sb){ sb.textContent='💾 Salvar Alterações'; sb.style.background='var(--em)'; }
  }); });
}

function cfHint(){const nP=safeInt(CF.totalParcelas,2),amt=safeNum(CF.amount),sP=Math.max(1,Math.min(safeInt(CF.startParcela,1),nP)),countP=nP-sP+1;const h=$('cf-hint');if(h){if(CF.parcelado&&amt>0&&nP>1){h.textContent=sP>1?`Gerando parcelas ${sP} a ${nP} (${countP}x de ${fmt(amt)}) — ${sP-1} já pagas.`:`A despesa será parcelada em ${nP}x de ${fmt(amt)}.`}else h.textContent=''}const la=$('cf-al');if(la)la.textContent=CF.parcelado?'VALOR POR PARCELA *':'VALOR *';const sb=$('cf-sb');if(sb&&!editingBillId){sb.textContent=CF.parcelado?(sP>1?`CRIAR PARCELAS ${sP}→${nP} (${countP}x)`:`CRIAR ${nP}x PARCELAS`):'SALVAR';sb.style.background=CF.parcelado?'var(--amber)':'var(--em)'}}

function cfPrev(){const pEl=$('cf-prev');if(!pEl)return;const nP=safeInt(CF.totalParcelas,2),amt=safeNum(CF.amount),sP=Math.max(1,Math.min(safeInt(CF.startParcela,1),nP)),countP=nP-sP+1;if(!CF.firstDueDate||nP<2){pEl.innerHTML='';return}if(CF.dueDateMode==='auto'){pEl.innerHTML=`<div style="padding:11px;border-radius:12px;background:var(--glass2);border:1px solid var(--border);max-height:140px;overflow-y:auto;margin-bottom:12px"><div class="lbl" style="margin-bottom:7px">PREVIEW (${sP>1?`parcelas ${sP}→${nP}`:`${nP}x`})</div>${Array.from({length:Math.min(countP,24)},(_,i)=>{const idx=sP+i;return`<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:12px"><span style="color:var(--text3)">${idx}/${nP} — ${addMo(CF.firstDueDate,i)}</span><span class="val" style="color:var(--em);font-size:12px">${fmt(amt)}</span></div>`}).join('')}</div>`}else{const rows=Array.from({length:Math.min(countP,24)},(_,i)=>{const idx=sP+i;return i===0?`<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:12px"><span style="color:var(--text3)">${idx}/${nP}</span><span style="color:var(--em)">${CF.firstDueDate}</span></div>`:`<div style="display:flex;align-items:center;gap:7px;padding:2px 0"><span style="font-size:11px;color:var(--text3);width:38px;flex-shrink:0">${idx}/${nP}</span><input type="date" value="${CF.customDates[i]||addMo(CF.firstDueDate,i)}" data-idx="${i}" class="cfd" style="flex:1;padding:4px 7px;border-radius:8px;background:var(--glass);border:1px solid var(--border);color:var(--text);font-size:11px;outline:none"/></div>`}).join('');pEl.innerHTML=`<div style="padding:11px;border-radius:12px;background:var(--glass2);border:1px solid var(--border);max-height:160px;overflow-y:auto;margin-bottom:12px"><div class="lbl" style="margin-bottom:7px">DATAS INDIVIDUAIS</div>${rows}</div>`;pEl.querySelectorAll('.cfd').forEach(inp=>inp.addEventListener('input',function(){CF.customDates[parseInt(this.dataset.idx)]=this.value}))}}
function cfSave(){
  const lEl=$('cf-lbl'),aEl=$('cf-amt'),fEl=$('cf-fdue'),dEl=$('cf-due');
  if(lEl)CF.label=lEl.value;if(aEl)CF.amount=parseCurrency(aEl);
  if(fEl)CF.firstDueDate=fEl.value;if(dEl)CF.dueDate=dEl.value;
  const lbl=(CF.label||'').trim(),amt=round2(CF.amount||0);
  if(!lbl){showErr('Digite o nome da conta.','cf-err');return}
  if(amt<=0){showToast('⚠️ Digite um valor válido.');return}

  // ── MODO EDIÇÃO ───────────────────────────────────────────────────
  if(editingBillId){
    const due=CF.parcelado?CF.firstDueDate:CF.dueDate;
    if(!due){showErr('Selecione a data de vencimento.','cf-err');return}

    const eid        = editingBillId;
    const spEl       = $('cf-sp');
    const npcEl      = $('cf-npc');
    // Fonte de verdade: cf-sp (hidden, mantido por cfSpUpdate) > CF.startParcela > 1
    const rawIdx     = spEl ? safeInt(spEl.value, CF.startParcela) : CF.startParcela;
    const newIdx     = Math.max(1, rawIdx);
    const src        = AP().bills.find(x=>x.id===eid);
    const gid        = src?.installmentGroupId||null;
    const nT         = src?.installmentTotal||src?.totalParcelas||null;
    // cf-npc.value é mantido por cfNP (chips) e pelo listener cfBind
    const newTotal   = CF.parcelado
      ? Math.max(1, npcEl&&safeInt(npcEl.value,0)>1 ? safeInt(npcEl.value) : safeInt(CF.totalParcelas,nT||2))
      : null;
    const dueDay     = due ? parseInt(due.split('-')[2],10) : null;
    const myNT       = newTotal||nT;
    editingBillId=null;

    // Fallback de grupo por nome base (bills antigos sem installmentGroupId)
    const baseLblSrc=(src?.label||'').replace(/\s*\(\d+\/\d+\)$/,'').trim();

    if(!gid){
      // ── Sem installmentGroupId — actualiza por nome base (série legada) ou só este ──
      const sameGroup=AP().bills.filter(x=>{
        const xBase=(x.label||'').replace(/\s*\(\d+\/\d+\)$/,'').trim();
        return xBase===baseLblSrc && x.installmentIndex!=null;
      });
      const isLegacySeries = sameGroup.length > 1;

      setPS(p=>({...p,bills:p.bills.map(x=>{
        const xBase=(x.label||'').replace(/\s*\(\d+\/\d+\)$/,'').trim();
        const inGroup = isLegacySeries && xBase===baseLblSrc && x.installmentIndex!=null;
        if(!inGroup && x.id!==eid) return x;
        const myIdx = x.id===eid ? newIdx : (x.installmentIndex||newIdx);
        const relI  = myIdx - newIdx;
        let newDue;
        if(CF.dueDateMode!=='auto'){
          newDue = relI===0
            ? (CF.firstDueDate||x.dueDate)
            : (CF.customDates[relI]||addMo(CF.firstDueDate,relI)||x.dueDate);
        } else {
          newDue = x.id===eid ? due : x.dueDate;
          if(isLegacySeries && dueDay && x.dueDate){
            const p=x.dueDate.split('-');
            const maxD=new Date(+p[0],+p[1],0).getDate();
            newDue=`${p[0]}-${p[1]}-${String(Math.min(dueDay,maxD)).padStart(2,'0')}`;
          }
        }
        const xNT   = myNT!=null ? myNT : (x.installmentTotal||x.totalParcelas||null);
        const xLbl  = xNT ? `${lbl} (${myIdx}/${xNT})` : lbl;
        return{...x,label:xLbl,amount:amt,dueDate:newDue,recurrence:CF.recurrence,
          installmentIndex:myIdx,
          installmentTotal:xNT,
          totalParcelas:xNT,emoji:CF.emoji||x.emoji||'',category:CF.category||x.category||''};
      })}));
    } else {
      // ── Série com installmentGroupId — actualiza TODOS do grupo ──────
      setPS(pr=>({...pr,
        bills:pr.bills.map(x=>{
          if(x.installmentGroupId!==gid) return x;
          const myIdx = x.id===eid ? newIdx : (x.installmentIndex||newIdx);
          const relI  = myIdx - newIdx;
          let newDue;
          if(CF.dueDateMode!=='auto'){
            newDue = relI===0
              ? (CF.firstDueDate||x.dueDate)
              : (CF.customDates[relI]||addMo(CF.firstDueDate,relI)||x.dueDate);
          } else {
            newDue = x.dueDate;
            if(dueDay&&x.dueDate){
              const p=x.dueDate.split('-');
              const maxD=new Date(+p[0],+p[1],0).getDate();
              newDue=`${p[0]}-${p[1]}-${String(Math.min(dueDay,maxD)).padStart(2,'0')}`;
            }
          }
          const xLbl  = myNT ? `${lbl} (${myIdx}/${myNT})` : lbl;
          return{...x,label:xLbl,amount:amt,dueDate:newDue,recurrence:CF.recurrence,
            installmentIndex:myIdx,
            installmentTotal:myNT,
            totalParcelas:myNT,emoji:CF.emoji||x.emoji||'',category:CF.category||x.category||''};
        }),
        installments:(pr.installments||[]).map(g=>g.id!==gid?g:
          {...g,label:lbl,amountPerParcela:amt,emoji:CF.emoji||g.emoji||'',category:CF.category||g.category||'',
            ...(myNT!=null?{totalParcelas:myNT}:{})})
      }));
    }

    showToast('Conta atualizada ✅');
    closeM();
    return;
  }

  // ── MODO CRIAÇÃO — lógica original intacta ────────────────────────
  if(CF.parcelado){
    if(!CF.firstDueDate){showErr('Selecione o vencimento da 1ª parcela.','cf-err');return}
    const nP=safeInt(CF.totalParcelas,2),gid=uid();
    const startP=Math.max(1,Math.min(safeInt(CF.startParcela,1),nP));
    const countP=nP-startP+1;

      const idx=startP+i;

    if(!CF.dueDate){showErr('Selecione a data de vencimento.','cf-err');return}
    setPS(p=>({...p,bills:[{id:uid(),mode:AP().mode,label:lbl,amount:amt,dueDate:CF.dueDate,paid:false,recurrence:CF.recurrence,notifEnabled:true,notifAdvance:'24h',emoji:CF.emoji||'',category:CF.category||''},...p.bills]}));
  }
  closeM();
}
