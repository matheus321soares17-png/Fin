<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Fin"/>
<meta name="theme-color" content="#0d0d0d"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="description" content="Fin v26 — Controle financeiro inteligente · Cache offline + Quota guard"/>
<title>FIN</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  /* ── Tema CLARO — Fintech Premium v22 ── */
  /* Paleta sólida: sem neon, sem glow. Cores institucionais. */
  --bg:#f4f6f9;--bg2:#ffffff;--bg3:#eaecf0;
  --glass:rgba(0,0,0,.025);--glass2:rgba(0,0,0,.05);
  --border:rgba(0,0,0,.07);--border2:rgba(0,0,0,.12);
  /* Verde Petróleo — receitas / acento principal */
  --em:#0a5c46;--em-dim:rgba(10,92,70,.08);--em-glow:rgba(10,92,70,.14);
  /* Vinho — despesas / alertas */
  --rose:#6A040F;--rose-dim:rgba(106,4,15,.07);--rose-glow:rgba(106,4,15,.14);
  /* Roxo Índigo Profundo — acento geral */
  --cyan:#2d2f8f;--cyan-dim:rgba(45,47,143,.08);--cyan-glow:rgba(45,47,143,.14);
  /* Âmbar sólido legível */
  --amber:#a05c00;--amber-dim:rgba(160,92,0,.09);
  /* Índigo Profundo alias */
  --purple:#2d2f8f;--purple-dim:rgba(45,47,143,.08);
  /* Textos */
  --text:#0d0d0d;--text2:#374151;--text3:#6b7280;
  --r:14px;--rl:20px;--rxl:26px;
  --acc:#2d2f8f;--acc-dim:rgba(45,47,143,.08);--acc-glow:rgba(45,47,143,.14);
  --nav-bg:rgba(255,255,255,.98);--nav-border:rgba(0,0,0,.06);
  --hdr-bg:#ffffff;--hdr-border:rgba(45,47,143,.12);
  --msheet-bg:#ffffff;--card-shadow:0 2px 8px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --val-color:#111827;
  --fab-lbl-bg:rgba(15,15,25,.88);
}
/* ── Tema ESCURO ── */
body.dark{
  --bg:#0d0d0d;--bg2:#111318;--bg3:#161a20;
  --glass:rgba(255,255,255,.04);--glass2:rgba(255,255,255,.07);
  --border:rgba(255,255,255,.09);--border2:rgba(255,255,255,.14);
  --em:#00e5ff;--em-dim:rgba(0,229,255,.12);--em-glow:rgba(0,229,255,.3);
  --rose:#ff3366;--rose-dim:rgba(255,51,102,.13);--rose-glow:rgba(255,51,102,.35);
  --cyan:#00e5ff;--cyan-dim:rgba(0,229,255,.1);--cyan-glow:rgba(0,229,255,.3);
  --amber:#ffab00;--amber-dim:rgba(255,171,0,.13);
  --purple:#7c3aed;--purple-dim:rgba(124,58,237,.15);
  --text:#f0f4f8;--text2:#8892a4;--text3:#3d4555;
  --acc:#00e5ff;--acc-dim:rgba(0,229,255,.12);--acc-glow:rgba(0,229,255,.3);
  --nav-bg:rgba(13,13,13,.96);--nav-border:rgba(255,255,255,.07);
  --hdr-bg:#000000;--hdr-border:rgba(0,229,255,.15);
  --msheet-bg:#1a1d26;--card-shadow:none;
  --val-color:#f0f4f8;
  --fab-lbl-bg:rgba(15,15,20,.92);
}
/* ── Budget ── */
.budget-bar{height:7px;border-radius:999px;background:var(--border);overflow:hidden;margin-top:6px}
.budget-fill{height:100%;border-radius:999px;transition:width .6s cubic-bezier(.34,1.56,.64,1)}
/* ── Date Range Modal ── */
#date-range-modal{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.55);backdrop-filter:blur(14px);display:none;align-items:flex-end;justify-content:center}
#date-range-modal.open{display:flex}
#date-range-box{width:100%;max-width:430px;background:var(--msheet-bg);border:1px solid var(--border2);border-bottom:none;border-radius:28px 28px 0 0;padding:24px 20px 40px;transform:translateY(100%);transition:transform .32s cubic-bezier(.32,.72,0,1)}
#date-range-modal.open #date-range-box{transform:translateY(0)}
.dr-inp{width:100%;padding:13px 14px;background:var(--glass2);border:1.5px solid var(--border2);border-radius:12px;color:var(--text);font-family:'Outfit',sans-serif;font-size:15px;outline:none;-webkit-appearance:none;margin-bottom:0}
.dr-inp:focus{border-color:var(--cyan);box-shadow:0 0 0 3px var(--cyan-dim)}
.dr-quick{padding:8px 14px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--text3);font-family:'Outfit',sans-serif;transition:all .15s;white-space:nowrap}
.dr-quick.on{background:var(--cyan);border-color:var(--cyan);color:#fff}
/* ── Tags ── */
.tag-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;background:var(--cyan-dim);border:1px solid rgba(45,47,143,.2);color:var(--cyan)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;max-width:430px;margin:0 auto;display:flex;flex-direction:column}
#app{display:flex;flex-direction:column;height:100%;overflow:hidden;position:relative}
#hdr{flex-shrink:0;padding:0;background:var(--hdr-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--hdr-border);position:relative;z-index:10}
#alerts-wrap{flex-shrink:0;padding:0 18px}
#content{flex:1;overflow-y:auto;padding:12px 18px 100px;-webkit-overflow-scrolling:touch}
#content::-webkit-scrollbar{width:0}
#nav{flex-shrink:0;position:relative;z-index:20;background:var(--nav-bg);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--nav-border);padding-bottom:env(safe-area-inset-bottom,0px)}

/* FAB */
#fab-wrap{position:fixed;bottom:80px;right:18px;z-index:50;display:flex;flex-direction:column;align-items:flex-end;gap:12px}
#fab-main{width:56px;height:56px;border-radius:50%;background:transparent;backdrop-filter:none;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:none;transition:all .25s;flex-shrink:0;border:none}
#fab-main.open{background:var(--glass2);box-shadow:var(--card-shadow),0 0 0 1px var(--border)}
#fab-main svg{transition:transform .25s}
#fab-main.open svg{transform:rotate(45deg)}
.fab-opt{display:flex;align-items:center;gap:10px;opacity:0;transform:translateX(20px);pointer-events:none;transition:all .22s}
.fab-opt.show{opacity:1;transform:translateX(0);pointer-events:all}
.fab-opt-btn{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,.4)}
.fab-opt-lbl{background:var(--fab-lbl-bg,rgba(15,15,15,.88));backdrop-filter:blur(10px);padding:5px 12px;border-radius:20px;font-size:13px;font-weight:700;white-space:nowrap;color:#fff}

/* Typography */
.mono{font-family:'JetBrains Mono',monospace}
.val{font-family:'JetBrains Mono',monospace;font-weight:600;letter-spacing:-.02em}
.val-desc{font-weight:400;color:var(--text2)}
.lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.section-title{font-size:16px;font-weight:800;color:var(--text);margin-bottom:12px}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);box-shadow:var(--card-shadow)}
.card-glow-em{box-shadow:0 4px 12px rgba(0,0,0,.06);border-color:rgba(10,92,70,.18)}
.card-glow-rose{box-shadow:0 4px 12px rgba(0,0,0,.06);border-color:rgba(106,4,15,.15)}
.card-glow-cyan{box-shadow:0 4px 12px rgba(0,0,0,.06);border-color:rgba(45,47,143,.15)}
.inset{background:var(--glass2);border:1px solid var(--border);border-radius:var(--r)}

/* Metric card hero */
.metric-hero{padding:16px 18px;border-radius:var(--rl);position:relative}
.metric-hero::before{content:'';position:absolute;inset:0;border-radius:inherit;opacity:.06}
.mh-em{background:linear-gradient(135deg,var(--em-dim),rgba(10,92,70,.03));border:1px solid rgba(10,92,70,.2)}
.mh-rose{background:linear-gradient(135deg,var(--rose-dim),rgba(106,4,15,.03));border:1px solid rgba(106,4,15,.18)}
.mh-purple{background:linear-gradient(135deg,var(--purple-dim),rgba(45,47,143,.03));border:1px solid rgba(45,47,143,.18)}
.mh-cyan{background:linear-gradient(135deg,var(--cyan-dim),rgba(45,47,143,.03));border:1px solid var(--cyan-glow)}

/* Inputs */
.inp{width:100%;padding:14px 16px;background:var(--glass);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-family:'Outfit',sans-serif;font-size:16px;outline:none;transition:border-color .18s;-webkit-appearance:none}
.inp:focus{border-color:var(--cyan);box-shadow:0 0 0 3px var(--cyan-dim)}
.inp::placeholder{color:var(--text3)}
.inp-val{font-size:28px;font-family:'JetBrains Mono',monospace;font-weight:600;text-align:center;letter-spacing:-.03em;background:transparent;border:none;border-bottom:2px solid var(--border);border-radius:0;padding:8px 0}
.inp-val:focus{border-bottom-color:var(--cyan);box-shadow:none}

/* Buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:15px 20px;border-radius:var(--r);font-family:'Outfit',sans-serif;font-weight:800;font-size:14px;cursor:pointer;border:none;width:100%;transition:all .15s;letter-spacing:.02em}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}
.btn-em{background:var(--cyan);color:#fff}
.btn-rose{background:var(--rose);color:#fff}
body.dark .btn-em{box-shadow:0 2px 10px var(--cyan-glow)}
body.dark .btn-rose{box-shadow:0 4px 16px var(--rose-glow)}
.btn-ghost{background:var(--bg2);border:1px solid var(--border);color:var(--text)}
.btn-cyan{background:var(--cyan-dim);border:1px solid var(--cyan);color:var(--cyan)}
.btn-danger{background:var(--rose-dim);border:1px solid rgba(255,51,102,.25);color:var(--rose)}
.btn-amber{background:var(--amber-dim);border:1px solid rgba(255,171,0,.25);color:var(--amber)}
.btn-sm{padding:9px 14px;font-size:12px;border-radius:10px}
.btn-icon{width:36px;height:36px;padding:0;border-radius:10px;flex-shrink:0}

/* Nav */
.nav-items{display:flex;padding:4px 8px 6px}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 2px;cursor:pointer;border:none;background:none;color:var(--text3);font-family:'Outfit',sans-serif;font-size:8px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;transition:color .2s;position:relative}
.nav-btn.active{color:var(--cyan)}
.nav-btn svg{width:20px;height:20px;stroke-width:1.8;transition:all .2s}
/* No modo claro: sem drop-shadow neon; escuro mantém o glow */
body:not(.dark) .nav-btn.active svg{filter:none}
body.dark .nav-btn.active svg{filter:drop-shadow(0 0 4px var(--cyan-glow))}
.nav-btn.active::after{content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);width:18px;height:2px;background:var(--cyan);border-radius:999px}

/* Modal slide-up */
.mwrap{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.45);backdrop-filter:blur(12px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.mwrap.open{opacity:1;pointer-events:all}
.msheet{width:100%;max-width:430px;background:var(--msheet-bg);border:1px solid var(--border2);border-bottom:none;border-radius:28px 28px 0 0;max-height:95vh;overflow-y:auto;transform:translateY(100%);transition:transform .32s cubic-bezier(.32,.72,0,1)}
.mwrap.open .msheet{transform:translateY(0)}
.msheet::-webkit-scrollbar{width:0}
/* Center modal */
.mcwrap{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.4);backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.mcwrap.open{opacity:1;pointer-events:all}
.mcbox{width:100%;max-width:380px;background:var(--msheet-bg);border:1px solid var(--border2);border-radius:24px;max-height:88vh;overflow-y:auto;transform:scale(.92) translateY(12px);transition:transform .28s cubic-bezier(.32,.72,0,1)}
.mcwrap.open .mcbox{transform:scale(1) translateY(0)}
.mcbox::-webkit-scrollbar{width:0}

/* Modal header */
.mhdr{display:flex;align-items:center;gap:10px;padding:20px 20px 0;position:sticky;top:0;background:var(--msheet-bg);z-index:2;padding-bottom:16px;border-bottom:1px solid var(--border);margin-bottom:20px}
.mtitle{font-size:20px;font-weight:900;flex:1}
.mclose{width:32px;height:32px;border-radius:50%;background:var(--glass2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);flex-shrink:0;transition:background .15s}

/* Chips */
.chip{padding:8px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:var(--glass);color:var(--text2);font-family:'Outfit',sans-serif;transition:all .15s;white-space:nowrap}
.chip.on{border-color:var(--cyan);background:var(--cyan-dim);color:var(--cyan)}

/* Platform circles */
.plt-circle{width:56px;height:56px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px solid var(--border);cursor:pointer;transition:all .15s;font-size:11px;font-weight:700;gap:2px;flex-shrink:0}
.plt-circle.sel{border-width:2.5px;box-shadow:0 0 12px var(--em-glow)}

/* Toggle */
.tog{width:48px;height:26px;border-radius:999px;background:var(--glass2);border:1px solid var(--border);cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.tog.on{background:var(--cyan)}
.tog-t{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 2px 4px rgba(0,0,0,.5)}
.tog.on .tog-t{left:27px}

/* Progress */
.prog{height:6px;border-radius:999px;background:rgba(255,255,255,.07);overflow:hidden}
.prog-f{height:100%;border-radius:999px;transition:width .6s cubic-bezier(.34,1.56,.64,1)}

/* Category icon circle */
.cat-ic{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}

/* Alert strip */
.alert-s{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:12px;font-size:12px;font-weight:600;margin-bottom:8px}
.alert-r{background:var(--rose-dim);border:1px solid rgba(214,48,80,.3);color:var(--rose)}
.alert-a{background:var(--amber-dim);border:1px solid rgba(196,125,0,.25);color:var(--amber)}

/* Tooltip trigger dot */
.tip-w{display:inline-flex;align-items:center;vertical-align:middle;margin-left:4px;position:relative;z-index:10}
/* tip-dot: preto no tema claro, branco no escuro */
.tip-dot{width:16px;height:16px;border-radius:50%;background:rgba(0,0,0,.08);border:1.5px solid rgba(0,0,0,.28);color:#000;font-size:9px;font-weight:900;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;vertical-align:middle;margin-left:3px;transition:background .15s,border-color .15s;padding:0;line-height:1;flex-shrink:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none}
.tip-dot:active{background:rgba(0,0,0,.18);border-color:rgba(0,0,0,.5);transform:scale(.88)}
body.dark .tip-dot{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.22);color:rgba(255,255,255,.6)}
body.dark .tip-dot:active{background:rgba(0,229,255,.2);border-color:rgba(0,229,255,.5);color:#00e5ff}
/* Tooltip modal global — z-index máximo, acima de tudo incluindo nav e FAB */
#tip-overlay{position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;padding:28px;box-sizing:border-box;opacity:0;pointer-events:none;transition:opacity .2s}
#tip-overlay.show{opacity:1;pointer-events:all}
#tip-card{background:rgba(22,28,45,.92);backdrop-filter:blur(28px) saturate(160%);-webkit-backdrop-filter:blur(28px) saturate(160%);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:28px 24px 20px;max-width:340px;width:100%;transform:translateY(20px) scale(.94);transition:transform .28s cubic-bezier(.34,1.4,.64,1),opacity .2s;opacity:0;box-shadow:0 24px 60px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.04) inset}
#tip-overlay.show #tip-card{transform:translateY(0) scale(1);opacity:1}
#tip-icon-wrap{width:44px;height:44px;border-radius:50%;background:rgba(0,229,255,.12);border:1px solid rgba(0,229,255,.25);display:flex;align-items:center;justify-content:center;margin-bottom:16px}
#tip-title{display:block;font-size:16px;font-weight:800;color:#fff;margin-bottom:10px;line-height:1.3}
#tip-body{font-size:14px;color:rgba(255,255,255,.7);line-height:1.6;margin:0 0 20px}
#tip-close{width:100%;padding:13px;border-radius:14px;background:rgba(0,229,255,.12);border:1px solid rgba(0,229,255,.2);color:#00e5ff;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.04em;transition:background .15s}
#tip-close:active{background:rgba(0,229,255,.22)}
/* ── Help button (?) — contextual feature help ── */
.help-btn{width:22px;height:22px;border-radius:50%;background:rgba(0,229,255,.1);border:1.5px solid rgba(0,229,255,.3);color:var(--cyan);font-size:11px;font-weight:900;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;vertical-align:middle;margin-left:6px;transition:background .15s,border-color .15s,transform .15s;padding:0;line-height:1;flex-shrink:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;letter-spacing:0;font-family:'Outfit',sans-serif}
.help-btn:active{background:rgba(0,229,255,.25);border-color:var(--cyan);transform:scale(.88)}
body:not(.dark) .help-btn{background:var(--cyan-dim);border-color:rgba(45,47,143,.3);color:var(--cyan)}
/* Help overlay — distinct from tip-overlay */
#help-overlay{position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.65);display:none;align-items:flex-end;justify-content:center;padding:0;box-sizing:border-box;opacity:0;pointer-events:none;transition:opacity .22s}
#help-overlay.show{opacity:1;pointer-events:all}
#help-card{background:var(--msheet-bg);border:1px solid var(--border2);border-bottom:none;border-radius:28px 28px 0 0;width:100%;max-width:430px;max-height:88vh;overflow-y:auto;transform:translateY(100%);transition:transform .32s cubic-bezier(.32,.72,0,1);padding:0 0 env(safe-area-inset-bottom,0px)}
#help-card::-webkit-scrollbar{width:0}
#help-overlay.show #help-card{transform:translateY(0)}
.help-card-inner{padding:24px 20px 32px}
.help-drag-pill{width:36px;height:4px;border-radius:999px;background:var(--border2);margin:14px auto 0;display:block}
.help-section-title{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--cyan);margin:18px 0 10px}
.help-step{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.help-step:last-child{border-bottom:none}
.help-step-num{width:24px;height:24px;border-radius:50%;background:rgba(0,229,255,.12);border:1.5px solid rgba(0,229,255,.25);color:var(--cyan);font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.help-step-text{font-size:13px;color:var(--text2);line-height:1.55;flex:1}
.help-step-text strong{color:var(--text);font-weight:700}
.help-tip-box{background:rgba(255,171,0,.08);border:1px solid rgba(255,171,0,.25);border-radius:12px;padding:12px 14px;margin-top:14px;display:flex;gap:10px;align-items:flex-start}
.help-tip-box span:first-child{font-size:16px;flex-shrink:0;margin-top:1px}
.help-tip-box span:last-child{font-size:12px;color:var(--text2);line-height:1.5}
/* Month badge */
.mon-badge{display:flex;align-items:center;gap:8px;cursor:pointer;transition:opacity .15s}
.mon-badge:active{opacity:.7}

/* Pchip */
.pchip{padding:7px 12px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--text3);font-family:'Outfit',sans-serif;transition:all .15s}
.pchip.on{background:var(--cyan);border-color:var(--cyan);color:#fff}

/* Cat chip for txn form */

<!-- ═══ Firebase Init + Auth ═══ -->
<script>
(function(){
  if(typeof firebase === 'undefined'){
    console.error('[FIN] Firebase SDK não carregou — precisa de https://');
    setTimeout(function(){
      document.getElementById('login-screen').style.display='none';
      document.getElementById('app').style.display='flex';
      window.autoCreateRecurring&&window.autoCreateRecurring();
      window.render&&window.render();
    },100);
    return;
  }

  // Configuração centralizada via APP_CONFIG — não edite aqui
  firebase.initializeApp(APP_CONFIG.firebase);

  var _auth = firebase.auth();
  var _db   = firebase.firestore();

  // ── Firestore Offline Persistence (IndexedDB) ────────────────────────
  // Faz o app ler do cache local do dispositivo em vez do servidor toda vez.
  // Reduz drasticamente leituras no Firestore → resolve Quota Exceeded.
  if (APP_CONFIG.features.enableIDBPersist) {
    try {
      _db.enablePersistence({ synchronizeTabs: false })
        .then(function() {
          console.log('[FIN v' + APP_CONFIG.version + '] Firestore offline persistence ativada.');
        })
        .catch(function(err) {
          if (err.code === 'failed-precondition') {
            console.warn('[FIN] Persistence desabilitada — múltiplas abas detectadas.');
          } else if (err.code === 'unimplemented') {
            console.warn('[FIN] Persistence não suportada neste navegador.');
          } else {
            console.warn('[FIN] Persistence erro:', err.code);
          }
        });
    } catch(e) {
      console.warn('[FIN] Persistence não disponível:', e.message);
    }
  }

  // ── Guard: garante apenas UM listener onSnapshot ativo por sessão ────
  var _activeUnsubscribe = null;
  function _attachListener(uid) {
    if (_activeUnsubscribe) {
      _activeUnsubscribe();
      _activeUnsubscribe = null;
    }
    _activeUnsubscribe = _ref(uid).onSnapshot(
      { includeMetadataChanges: false },
      function(snap) {
        if (!snap.exists) return;
        var data = snap.data();
        try {
          if (data.profiles && Array.isArray(data.profiles) && data.profiles.length > 0) {
            S = window.migrateToProfiles
              ? window.migrateToProfiles(Object.assign({}, data, { userName: S.userName || data.userName || 'Usuário' }))
              : Object.assign({}, S, data);
          } else {
            if (data.bills && window.dedupBills) data.bills = window.dedupBills(data.bills);
            S = window.migrateToProfiles
              ? window.migrateToProfiles(Object.assign({}, data, { userName: S.userName || data.userName || 'Usuário' }))
              : Object.assign({}, S, data);
          }
          StorageManager.saveLocal(S);
          window.render && window.render();
          console.log('[FIN] Dados carregados do Firestore' + (snap.metadata.fromCache ? ' (cache)' : ' (nuvem)'));
        } catch(e) {
          console.warn('[FIN] onSnapshot merge error:', e);
        }
      },
      function(err) {
        console.warn('[FIN] onSnapshot error:', err.message);
      }
    );
  }

  // Expõe para desconectar ao fazer logout
  window._detachListener = function() {
    if (_activeUnsubscribe) {
      _activeUnsubscribe();
      _activeUnsubscribe = null;
    }
  };

  // Paths via APP_CONFIG.db — um lugar único para alterar a estrutura de coleções
  var _ref  = function(uid){ return _db.doc(APP_CONFIG.db.userDoc(uid)); };

  // ── Mensagens de erro traduzidas ─────────────────────────
  var ERROS = {
    'auth/wrong-password':      'Senha incorreta. Tente novamente.',
    'auth/invalid-credential':  'E-mail ou senha incorretos.',
    'auth/weak-password':       'Senha muito fraca — use ao menos 6 caracteres.',
    'auth/email-already-in-use':'Este e-mail já tem conta. Verifique a senha.',
    'auth/invalid-email':       'E-mail inválido. Verifique o formato.',
    'auth/too-many-requests':   'Muitas tentativas. Aguarde alguns minutos.',
    'auth/network-request-failed':'Sem conexão. Verifique sua internet.',
    'auth/popup-closed-by-user':'Login cancelado. Tente novamente.',
    'auth/popup-blocked':       'Pop-up bloqueado. Permita pop-ups para este site.',
  };
  function mostrarErro(code, fallback){
    var msg = ERROS[code] || fallback || 'Erro desconhecido. Tente novamente.';
    var el = document.getElementById('login-err');
    if(el) el.textContent = msg;
    console.warn('[FIN] auth error:', code, msg);
  }
  function setBtnState(id, txt, disabled){
    var b = document.getElementById(id);
    if(b){ b.textContent=txt; b.disabled=disabled; }
  }

  // ── Salvar no Firestore (debounce 2s) ───────────────────
  var _t = null;
  window.persistCloud = function(state){
    var uid = _auth.currentUser && _auth.currentUser.uid;
    if(!uid) return;
    clearTimeout(_t);
    _t = setTimeout(function(){
      _ref(uid).set(state).catch(function(e){ console.warn('[FIN] save:',e.message); });
    }, APP_CONFIG.cache.syncDebounceMs);
  };

  // ── Logout ───────────────────────────────────────────────
  window.doLogout = function(){
    window._detachListener && window._detachListener(); // cancela listener ativo
    _auth.signOut();
  };

  // ── Recuperação de senha ─────────────────────────────────
  window.finForgotPassword = function(){
    var email = (document.getElementById('login-email').value||'').trim();
    var errEl = document.getElementById('login-err');
    if(!email){
      if(errEl) errEl.textContent='Digite seu e-mail acima antes de continuar.';
      document.getElementById('login-email').focus();
      return;
    }
    if(errEl){ errEl.style.color='#ff4466'; errEl.textContent=''; }
    _auth.sendPasswordResetEmail(email)
      .then(function(){
        if(errEl){
          errEl.style.color='#00e5ff';
          errEl.textContent='✅ Link enviado! Verifique sua caixa de entrada.';
          setTimeout(function(){ errEl.style.color='#ff4466'; errEl.textContent=''; },7000);
        }
      })
      .catch(function(e){ mostrarErro(e.code, e.message); });
  };

  // ── Login E-mail/Senha com auto-cadastro ─────────────────
  window.finLogin = function(){
    var email = (document.getElementById('login-email').value||'').trim();
    var pass  = (document.getElementById('login-pass').value||'');
    var errEl = document.getElementById('login-err');
    if(errEl) errEl.textContent = '';

    if(!email){ mostrarErro('','Preencha o e-mail.'); return; }
    if(!pass) { mostrarErro('','Preencha a senha.');  return; }

    setBtnState('login-btn','...', true);

    _auth.signInWithEmailAndPassword(email, pass)
      .catch(function(e){
        // Conta não existe → criar automaticamente
        if(e.code==='auth/user-not-found' || e.code==='auth/invalid-credential'){
          setBtnState('login-btn','Criando conta...', true);
          return _auth.createUserWithEmailAndPassword(email, pass);
        }
        throw e;
      })
      .catch(function(e){
        mostrarErro(e.code, e.message);
        setBtnState('login-btn','ENTRAR / CADASTRAR', false);
      });
  };

  // ── Login com Google ─────────────────────────────────────
  window.finLoginGoogle = function(){
    var errEl = document.getElementById('login-err');
    if(errEl) errEl.textContent = '';
    var btn = document.getElementById('google-btn');
    if(btn){ btn.textContent='Aguarde...'; btn.disabled=true; }

    var provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });

    _auth.signInWithPopup(provider)
      .catch(function(e){
        mostrarErro(e.code, e.message);
        if(btn){ btn.innerHTML='<svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg> Entrar com Google'; btn.disabled=false; }
      });
  };

  // Referências aos dois documentos do user — via APP_CONFIG.db
  var _perfil = function(uid){ return _db.doc(APP_CONFIG.db.perfilDoc(uid)); };

  // ── Mostrar modal de nome (conta nova) ─────────────────────
  window.finSaveName = function(){
    var nm = (document.getElementById('welcome-name').value||'').trim();
    if(!nm){ document.getElementById('welcome-name').focus(); return; }
    var uid = _auth.currentUser && _auth.currentUser.uid;
    if(!uid) return;
    // Salvar nome no Firestore perfil
    _perfil(uid).set({ nome: nm }, { merge: true }).catch(function(e){
      console.warn('[FIN] perfil save:', e.message);
    });
    // Salvar no estado local
    S.userName = nm;
    window.persist && window.persist();
    // Esconder modal e mostrar app
    var wm = document.getElementById('welcome-modal');
    if(wm) wm.style.display = 'none';
    window.autoCreateRecurring && window.autoCreateRecurring();
    window.render && window.render();
    window.showToast && window.showToast('Olá, ' + nm + '! 👋');
  };

  _auth.onAuthStateChanged(function(user){
    var ls  = document.getElementById('login-screen');
    var ap  = document.getElementById('app');
    var wm  = document.getElementById('welcome-modal');

    if(!user){
      if(ls) ls.style.display = 'flex';
      if(ap) ap.style.display = 'none';
      if(wm) wm.style.display = 'none';
      setBtnState('login-btn','ENTRAR / CADASTRAR', false);
      var gb = document.getElementById('google-btn');
      if(gb) gb.disabled = false;
      return;
    }

    // ── Mudança de usuário → limpar dados locais do anterior ──
    var lastUid = localStorage.getItem('fin_uid');
    if(lastUid && lastUid !== user.uid){
      StorageManager.clearLocal();
      S = Object.assign({}, window.INIT || S);
      console.log('[FIN] Novo usuário — cache limpo via StorageManager');
    }
    localStorage.setItem('fin_uid', user.uid);

    // Esconder login
    if(ls) ls.style.display = 'none';
    window._uid = user.uid;
    window._db = window.firebase&&window.firebase.firestore?window.firebase.firestore():null;

    // ── Carregar perfil (nome) + dados em paralelo ─────────────
    Promise.all([
      _perfil(user.uid).get(),
      _ref(user.uid).get()
    ]).then(function(results){
      var perfSnap = results[0];
      var dadosSnap = results[1];

      // Nome do usuário
      var nomeCloud = perfSnap.exists ? (perfSnap.data().nome || '') : '';
      var nomeFallback = user.displayName || '';
      var nomeLocal = S.userName && S.userName !== 'Matheus' ? S.userName : '';
      var nomeDefinitivo = nomeCloud || nomeLocal || nomeFallback || '';

      // Dados financeiros — suporte multi-perfil + migração legacy
      if(dadosSnap.exists){
        var data = dadosSnap.data();
        // Verificar se é novo formato (tem profiles[]) ou legado
        if(data.profiles && Array.isArray(data.profiles) && data.profiles.length > 0){
          // Novo formato multi-perfil
          S = window.migrateToProfiles ? window.migrateToProfiles(Object.assign({},data,{userName:nomeDefinitivo||data.userName||'Usuário'}))
            : Object.assign({}, S, data, {userName:nomeDefinitivo||data.userName||'Usuário'});
        } else {
          // Legado: migrar para multi-perfil
          if(data.bills && window.dedupBills) data.bills = window.dedupBills(data.bills);
          var legacyData = Object.assign({}, data, {userName:nomeDefinitivo||data.userName||'Usuário'});
          S = window.migrateToProfiles ? window.migrateToProfiles(legacyData) : legacyData;
        }
        S.userName = nomeDefinitivo || S.userName || 'Usuário';
      } else {
        S = Object.assign({}, S, { userName: nomeDefinitivo || 'Usuário' });
      }

      // Carregar dados de cada perfil a partir da sub-coleção /perfis/
      if(window._db && user.uid && S.profiles){
        try{
          var profileIds = S.profiles.map(function(p){ return p.id; });
          Promise.all(profileIds.map(function(pid){
            return window._db.collection('usuarios').doc(user.uid)
              .collection('perfis').doc(pid).get()
              .then(function(snap){ return {pid:pid,snap:snap}; })
              .catch(function(){ return {pid:pid,snap:null}; });
          })).then(function(results){
            results.forEach(function(r){
              if(r.snap && r.snap.exists){
                var pd = r.snap.data();
                S.profiles = S.profiles.map(function(p){
                  return p.id===r.pid ? Object.assign({},p,pd) : p;
                });
              }
            });
            // Carregar tema global
            return window._db.collection('usuarios').doc(user.uid)
              .collection('planejamento').doc('main').get()
              .then(function(pSnap){
                if(pSnap.exists){
                  var pd=pSnap.data();
                  if(pd.theme) S.theme=pd.theme;
                  if(pd.activeProfileId) S.activeProfileId=pd.activeProfileId;
                }
                window.applyTheme && window.applyTheme();
                try{localStorage.setItem('fin_v1',JSON.stringify(S));}catch(e){}
                window.render && window.render();
              }).catch(function(){
                window.applyTheme && window.applyTheme();
                window.render && window.render();
              });
          }).catch(function(){
            window.applyTheme && window.applyTheme();
            window.render && window.render();
          });
        }catch(e){
          window.applyTheme && window.applyTheme();
          window.render && window.render();
        }
      }
      // Mostrar app
      if(ap) ap.style.display = 'flex';

      // ── Ativar listener único de sincronização em tempo real ─────────
      // Só é chamado UMA VEZ por sessão. O guard interno cancela qualquer
      // listener anterior, garantindo zero duplicatas.
      _attachListener(user.uid);

      // Conta nova sem nome → mostrar modal de boas-vindas
      if(!nomeDefinitivo && !dadosSnap.exists){
        if(wm){ wm.style.display = 'flex'; }
        // Pré-preencher com displayName do Google se disponível
        var inp = document.getElementById('welcome-name');
        if(inp && nomeFallback) inp.value = nomeFallback.split(' ')[0];
      } else {
        if(wm) wm.style.display = 'none';
        window.autoCreateRecurring && window.autoCreateRecurring();
        window.applyTheme && window.applyTheme();
        window.render && window.render();
        if(dadosSnap.exists) window.showToast && window.showToast('☁️ Olá, '+S.userName+'!');
      }

    }).catch(function(e){
      console.warn('[FIN] load error:', e.message);
      if(ap) ap.style.display = 'flex';
      if(wm) wm.style.display = 'none';
      window.autoCreateRecurring && window.autoCreateRecurring();
      window.render && window.render();
    });
  });
})();
</script>

<script>
// ═══════════════════════════════════════════════════════════════════════
// FIN v22 — ARCHITECTURE LAYER
// (APP_CONFIG definido no bloco acima, antes do Firebase init)
// ═══════════════════════════════════════════════════════════════════════

// ─── 2. STORAGEMANAGER — abstract persistence layer ──────────────────
// O app NUNCA chama localStorage/Firestore diretamente.
// Para migrar para React/Node: reimplemente apenas este objeto.
const StorageManager = (() => {
  // ── IndexedDB helpers (smart cache) ──────────────────────────────────
  let _idb = null;
  function _openIDB() {
    if (_idb) return Promise.resolve(_idb);
    return new Promise((resolve, reject) => {
      if (!APP_CONFIG.features.enableIDB || typeof indexedDB === 'undefined') {
        return resolve(null);
      }
      const req = indexedDB.open(APP_CONFIG.cache.idbName, 1);
      req.onupgradeneeded = e => {
        e.target.result.createObjectStore(APP_CONFIG.cache.idbStore);
      };
      req.onsuccess = e => { _idb = e.target.result; resolve(_idb); };
      req.onerror   = () => resolve(null); // fallback silencioso
    });
  }
  let _idbTimer = null;
  function _idbWrite(data) {
    clearTimeout(_idbTimer);
    _idbTimer = setTimeout(() => {
      _openIDB().then(db => {
        if (!db) return;
        try {
          const tx = db.transaction(APP_CONFIG.cache.idbStore, 'readwrite');
          tx.objectStore(APP_CONFIG.cache.idbStore).put(data, APP_CONFIG.cache.idbKey);
        } catch(e) { console.warn('[StorageManager] IDB write:', e); }
      });
    }, APP_CONFIG.cache.idbDebounceMs);
  }
  function _idbRead() {
    return _openIDB().then(db => new Promise(resolve => {
      if (!db) return resolve(null);
      try {
        const tx = db.transaction(APP_CONFIG.cache.idbStore, 'readonly');
        const req = tx.objectStore(APP_CONFIG.cache.idbStore).get(APP_CONFIG.cache.idbKey);
        req.onsuccess = e => resolve(e.target.result || null);
        req.onerror   = () => resolve(null);
      } catch(e) { resolve(null); }
    }));
  }

  // ── Public API ────────────────────────────────────────────────────────
  return {
    // Lê o estado salvo: tenta IDB primeiro, cai no localStorage
    async load() {
      try {
        const idbData = await _idbRead();
        if (idbData) return idbData;
      } catch(e) {}
      try {
        const ls = localStorage.getItem(APP_CONFIG.cache.localKey);
        return ls ? JSON.parse(ls) : null;
      } catch(e) { return null; }
    },

    // Salva localmente (síncrono via localStorage + assíncrono via IDB)
    saveLocal(state) {
      try { localStorage.setItem(APP_CONFIG.cache.localKey, JSON.stringify(state)); } catch(e) {}
      _idbWrite(state); // background, non-blocking
    },

    // Sincroniza com a nuvem (debounced — reduz custo de writes no Firestore)
    // Um único timer compartilhado garante que writes rápidos consecutivos
    // (ex: usuário digitando) disparem apenas UMA gravação ao Firestore.
    syncCloud(state) {
      if (!APP_CONFIG.features.enableCloud) return;
      if (window.persistCloud) window.persistCloud(state); // já tem debounce interno de 2s

      // Sincronizar perfil ativo na sub-coleção (debounced separado para evitar
      // gravação duplicada com persistCloud acima)
      const ap = typeof getActiveProfile === 'function' ? getActiveProfile() : null;
      if (window._db && window._uid && ap) {
        clearTimeout(this._profileSyncTimer);
        this._profileSyncTimer = setTimeout(() => {
          try {
            const cfg = APP_CONFIG.db;
            window._db.doc(cfg.profileDoc(window._uid, ap.id))
              .set(JSON.parse(JSON.stringify(ap)), { merge: false })
              .catch(e => console.warn('[StorageManager] profile save:', e.message));
            window._db.doc(cfg.planDoc(window._uid))
              .set({ theme: state.theme || 'light', activeProfileId: state.activeProfileId, updatedAt: new Date().toISOString() }, { merge: true })
              .catch(() => {});
          } catch(e) {}
        }, APP_CONFIG.cache.syncDebounceMs); // mesmos 2s do persistCloud
      }
    },

    // Ponto único de escrita — o app chama APENAS este método
    update(state) {
      this.saveLocal(state);
      this.syncCloud(state);
    },

    // Limpeza ao trocar usuário
    clearLocal() {
      try { localStorage.removeItem(APP_CONFIG.cache.localKey); } catch(e) {}
      _openIDB().then(db => {
        if (!db) return;
        try {
          const tx = db.transaction(APP_CONFIG.cache.idbStore, 'readwrite');
          tx.objectStore(APP_CONFIG.cache.idbStore).delete(APP_CONFIG.cache.idbKey);
        } catch(e) {}
      });
    },
  };
})();

// ─── 3. SUBSCRIPTION STUBS (ready for Stripe / RevenueCat) ──────────
// Integração: substitua o corpo destas funções pelo SDK do seu provedor.
// Stripe: https://stripe.com/docs/js  |  RevenueCat: https://www.revenuecat.com/docs/web
const SubscriptionManager = {
  // Planos disponíveis — altere para refletir seus tiers
  PLANS: {
    FREE:    { id: 'free',    label: 'Gratuito',  maxProfiles: 1 },
    PRO:     { id: 'pro',     label: 'FIN Pro',   maxProfiles: 5, priceId: 'price_TODO' },
    PREMIUM: { id: 'premium', label: 'Premium',   maxProfiles: 10, priceId: 'price_TODO' },
  },

  // Estado local do plano (substituído por dados reais quando integrado)
  _status: { plan: 'free', expiresAt: null, features: [] },

  // Verifica o status da assinatura do usuário logado.
  // TODO: Substitua por: const res = await fetch('/api/subscription?uid='+uid)
  // ou pelo SDK da RevenueCat: Purchases.getCustomerInfo()
  async checkSubscriptionStatus(uid) {
    if (!APP_CONFIG.features.subscriptions) {
      // Stub: todos os usuários têm plano free até a integração estar ativa
      this._status = { plan: 'free', expiresAt: null, features: [] };
      return this._status;
    }
    try {
      // STUB — substituir pelo endpoint real:
      // const res = await fetch(`https://api.seuprovedor.com/subscriptions/${uid}`);
      // this._status = await res.json();
      console.log('[SubscriptionManager] checkSubscriptionStatus — stub ativo');
      return this._status;
    } catch(e) {
      console.warn('[SubscriptionManager] check failed:', e);
      return this._status;
    }
  },

  // Desbloqueia features pro na UI.
  // TODO: Chame após checkSubscriptionStatus retornar plano >= pro.
  // Stripe Checkout: stripe.redirectToCheckout({ lineItems: [{ price: PLANS.PRO.priceId }] })
  async unlockProFeatures(uid) {
    const status = await this.checkSubscriptionStatus(uid);
    if (status.plan !== 'free') {
      // Ativar features bloqueadas (ex: +perfis, exportação, relatórios avançados)
      console.log('[SubscriptionManager] Pro features unlocked for', uid);
      // TODO: atualizar UI — ex: document.body.classList.add('plan-pro')
    } else {
      // Mostrar paywall / CTA de upgrade
      console.log('[SubscriptionManager] Free plan — show upgrade CTA');
      // TODO: openUpgradeModal()
    }
    return status;
  },

  // Helper: verifica se uma feature está disponível no plano atual
  canUse(feature) {
    if (!APP_CONFIG.features.subscriptions) return true; // tudo liberado no stub
    return this._status.features.includes(feature) || this._status.plan !== 'free';
  },
};

// Expõe ao escopo global para compatibilidade com código legado
window.checkSubscriptionStatus  = function(uid){ return SubscriptionManager.checkSubscriptionStatus(uid); };
window.unlockProFeatures         = function(uid){ return SubscriptionManager.unlockProFeatures(uid); };

// ─── UTILS ────────────────────────────────────────────────────────────
const $=id=>document.getElementById(id),$$=s=>document.querySelectorAll(s);
const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const safeNum=v=>{const n=typeof v==='string'?parseFloat(v.replace(/[^0-9.,]/g,'').replace(',','.')):Number(v);return isFinite(n)?n:0};

// ── Máscara de moeda (R$ X.XXX,XX) ──────────────────────────────────────
// parseCurrency: extrai float puro de um campo mascarado ou numérico
function parseCurrency(el){
  if(!el) return 0;
  const raw=el.value||'';
  // Remove 'R$', espaços, pontos de milhar; troca vírgula decimal por ponto
  const clean=raw.replace(/R\$\s?/g,'').replace(/\./g,'').replace(',','.').trim();
  const n=parseFloat(clean);
  return isFinite(n)?n:0;
}
// maskCurrency: aplica máscara ao digitar — mantém centavos fixos como caixa registradora
function maskCurrency(el){
  // Pega só os dígitos digitados
  let digits=el.value.replace(/\D/g,'');
  // Limita a 12 dígitos (999.999.999,99)
  if(digits.length>12) digits=digits.slice(-12);
  if(digits===''){el.value='';return;}
  // Converte para centavos → reais
  const cents=parseInt(digits,10);
  const reais=cents/100;
  // Formata como pt-BR
  el.value='R$ '+reais.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}
// setMaskVal: aplica valor numérico formatado a um campo já mascarado (ou não)
// Garante que openEditBill consiga popular o campo mesmo após cfBind() ter rodado
function setMaskVal(el, numVal){
  if(!el) return;
  const v = Number(numVal);
  if(v > 0){
    el.value = 'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  }
}
// bindMask: anexa evento de máscara + foco e aplica valor inicial se houver
function bindMask(el,opts){
  if(!el) return;
  // Se já está mascarado, apenas aplica initVal se fornecido (não re-registra listeners)
  if(el._masked){
    if(opts&&opts.initVal&&Number(opts.initVal)>0) setMaskVal(el, opts.initVal);
    return;
  }
  el._masked=true;
  // Garante teclado numérico no mobile
  el.setAttribute('inputmode','numeric');
  el.type='text';
  // Mostra valor inicial formatado
  if(opts&&opts.initVal&&Number(opts.initVal)>0){
    setMaskVal(el, opts.initVal);
  }
  el.addEventListener('input',function(){
    maskCurrency(this);
    if(opts&&opts.onInput) opts.onInput(parseCurrency(this));
  });
  el.addEventListener('focus',function(){
    // Posiciona cursor no final
    const len=this.value.length;
    setTimeout(()=>{try{this.setSelectionRange(len,len);}catch(e){}},10);
  });
  el.addEventListener('blur',function(){
    // Limpa campo vazio
    if(this.value.replace(/\D/g,'')==='') this.value='';
  });
}

// ── Lançamentos Recentes: busca as últimas 4 transações do perfil ativo por tipo ──
function getRecentTxns(type){
  const txns=AP().transactions.filter(t=>t.mode===AP().mode&&t.type===type);
  // Ordena por data desc, depois pega as 4 mais recentes
  return [...txns].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,4);
}
function buildRecentChips(type){
  const recent=getRecentTxns(type);
  if(!recent.length) return '';
  const isRec=type==='receita';
  const chips=recent.map(t=>{
    const label=(t.description||'Lançamento').substring(0,18);
    const val=fmt(t.amount);
    const cat=t.category||'';
    const platform=t.platform||'';
    // Encode data safely for onclick
    const data=encodeURIComponent(JSON.stringify({description:t.description,amount:t.amount,category:t.category,platform:t.platform}));
    return `<button onclick="applyRecentChip('${data}')" style="display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:rgba(128,128,128,.1);color:var(--text2);font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s;max-width:160px;overflow:hidden;text-overflow:ellipsis" onmouseover="this.style.background='rgba(128,128,128,.2)'" onmouseout="this.style.background='rgba(128,128,128,.1)'" title="${esc(t.description||'')} — ${val}"><span style="font-size:10px;opacity:.7">↩</span><span style="overflow:hidden;text-overflow:ellipsis">${esc(label)}</span><span style="color:${isRec?'var(--em)':'var(--rose)'};flex-shrink:0">${val}</span></button>`;
  }).join('');
  return `<div style="margin-bottom:18px"><div class="lbl" style="margin-bottom:8px;font-size:10px">LANÇAMENTOS RECENTES</div><div id="recent-chips-wrap" style="display:flex;flex-wrap:wrap;gap:6px">${chips}</div></div>`;
}
function applyRecentChip(encoded){
  try{
    const d=JSON.parse(decodeURIComponent(encoded));
    // Preencher valor
    const aEl=$('tf-amt');
    if(aEl&&d.amount){
      TF.amount=d.amount;
      // Formata como moeda BR para exibir no campo
      const fmtd=d.amount.toFixed(2).replace('.',',');
      aEl.value='R$ '+fmtd.replace(/\B(?=(\d{3})+(?!\d))/g,'.');
      tfBtn();
    }
    // Preencher descrição
    const dEl=$('tf-desc');
    if(dEl&&d.description){TF.description=d.description;dEl.value=d.description;}
    // Preencher categoria
    if(d.category) tfCat(d.category);
    // Preencher plataforma (receita moto)
    if(d.platform) tfPlat(d.platform);
  }catch(e){console.warn('[FIN] applyRecentChip:',e);}
}

// Getter dinâmico — sempre retorna categorias salvas; na primeira abertura, inicializa a partir dos defaults
function getCats(mode){
  const m=mode||AP().mode;
  const key=m==='moto'?'customCats_moto':'customCats_pessoal';
  const saved=AP()[key];
  if(saved&&saved.length) return saved;
  // Inicializa no perfil ativo se ainda não existir
  const defaults=m==='moto'?[...DEFAULT_CATS_M]:[...DEFAULT_CATS_P];
  // Lazy-init: salva no perfil ativo sem triggerar re-render completo
  if(!_catsInitializing){
    _catsInitializing=true;
    setPS(p=>({...p,[key]:defaults}));
    _catsInitializing=false;
  }
  return defaults;
}

function getTopCats(type){
  const allCats=type==='receita'?getRecCats():getCats();
  const txns=AP().transactions.filter(t=>t.mode===AP().mode&&t.type===type);
  // Conta uso de cada categoria
  const freq={};
  txns.forEach(t=>{const k=t.category||t.platform;if(k)freq[k]=(freq[k]||0)+1;});
  // Ordena por frequência desc
  const sorted=[...allCats].sort((a,b)=>(freq[b.id]||0)-(freq[a.id]||0));
  return {top:sorted.slice(0,3),all:allCats};
}

// ─── LIMPEZA DE BILLS DUPLICADOS ─────────────────────────────────────
function deduplicateBills(profileData){
  if(!profileData||!profileData.bills) return profileData;
  
  // PASSO 1: dentro do mesmo grupo, remover parcelas com mesmo índice
  const seenIdx=new Set();
  let bills=profileData.bills.filter(b=>{
    if(!b.installmentGroupId) return true;
    const key=`${b.installmentGroupId}|${b.installmentIndex||'0'}`;
    if(seenIdx.has(key)) return false;
    seenIdx.add(key); return true;
  });

  // PASSO 2: detectar grupos duplicados (mesmo label + totalParcelas + mesmo mês base)
  // Grupos gerados pelo mesmo salvamento acidental
  const installments=profileData.installments||[];
  if(installments.length>1){
    const groupSeen=new Set();
    const badGroupIds=new Set();
    installments.forEach(g=>{
      // chave: label + totalParcelas (ignora id único)
      const key=`${(g.label||'').trim()}|${g.totalParcelas||0}|${g.amountPerParcela||0}`;
      if(groupSeen.has(key)) badGroupIds.add(g.id);
      else groupSeen.add(key);
    });
    if(badGroupIds.size>0){
      console.log('[FIN] Grupos duplicados removidos:',badGroupIds.size);
      bills=bills.filter(b=>!badGroupIds.has(b.installmentGroupId));
      const cleanedInst=(profileData.installments||[]).filter(g=>!badGroupIds.has(g.id));
      profileData={...profileData,installments:cleanedInst};
    }
  }

  if(bills.length !== profileData.bills.length){
    console.log(`[FIN] Limpeza: removidos ${profileData.bills.length-bills.length} bill(s) duplicado(s)`);
  }
  return {...profileData, bills};
}

function dedupBills(bills){
  // Remove boletos com mesmo label+amount+dueDate+mode — mantém primeiro encontrado
  const seen=new Set();
  return (bills||[]).filter(b=>{
    const key=`${b.mode||''}|${b.label||''}|${b.amount||0}|${b.dueDate||''}|${b.installmentGroupId||''}|${b.installmentIndex||''}`;
    if(seen.has(key))return false;
    seen.add(key);return true;
  });

function migrateToProfiles(parsed){
  // Se já tem o novo sistema de perfis, não migrar
  if(parsed.profiles&&Array.isArray(parsed.profiles)&&parsed.profiles.length>0){
    // Garantir que cada perfil tem campos necessários + deduplicar bills
    parsed.profiles=parsed.profiles.map(p=>{
      const base={...INIT_PROFILE(p.id,p.name,p.mode),...p};
      base.bills=deduplicateBills(base).bills;
      return base;
    });
    if(!parsed.activeProfileId) parsed.activeProfileId=parsed.profiles[0].id;
    return parsed;
  }
  // Migração: estado legado → primeiro perfil
  const legacyMode=parsed.mode||'moto';
  const p1={
    ...INIT_PROFILE('p1',legacyMode==='moto'?'Motorista':'Principal',legacyMode),
    icon: legacyMode==='moto'?'🏍️':'💼',
    transactions:parsed.transactions||[],
    bills:dedupBills(parsed.bills||[]),
    installments:parsed.installments||[],creditCards:parsed.creditCards||[],forecasts:parsed.forecasts||[],paidInvoices:parsed.paidInvoices||{},
    metaDiaria:parsed.metaDiaria||250,

    tags:parsed.tags||[],
    dashOrder:parsed.dashOrder||['meta','kpis','score','urgency','lucrokm','chart','donut','plat'],
    pinned:parsed.pinned||[],
    dashMetas:parsed.dashMetas||{diaria:250,semanal:0,mensal:0,custom:0,customLabel:'Meta Personalizada',customSaved:0},
  };
  return{
    userName:parsed.userName||'',
    avatarId:parsed.avatarId||'av1',
    theme:parsed.theme||'light',
    profiles:[p1],

// ─── CÁLCULO (comp) ─────────────────────────────────────────────────
function comp(){
  const cats=getCats();
  const allTx=AP().transactions.filter(t=>t.mode===AP().mode);
  const txnsMonth=allTx.filter(t=>getYM(t.date)===selYM);
  // Filtro por intervalo de datas (substitui selDay se activo)
  let txns;
  if(dateRangeStart&&dateRangeEnd){
    txns=allTx.filter(t=>t.date>=dateRangeStart&&t.date<=dateRangeEnd);
  } else if(selDay){
    txns=txnsMonth.filter(t=>t.date===selYM+'-'+String(selDay).padStart(2,'0'));
  } else {
    txns=txnsMonth;
  }
  const rec=txns.filter(t=>t.type==='receita'),dep=txns.filter(t=>t.type==='despesa');
  const totalR=round2(rec.reduce((a,b)=>a+b.amount,0)),totalD=round2(dep.reduce((a,b)=>a+b.amount,0));
  const saldo=round2(totalR-totalD);
  const abast=dep.filter(t=>t.category==='combustivel'&&t.litros&&t.kmAnterior!=null&&t.kmAtual!=null&&t.kmAtual>t.kmAnterior);
  const totLit=round2(abast.reduce((a,b)=>a+b.litros,0)),totKm=round2(abast.reduce((a,b)=>a+(b.kmAtual-b.kmAnterior),0));
  const consMed=totKm>0&&totLit>0?round2(totKm/totLit):null;
  // Lucro/km
  const totalKmAll=round2(allTx.filter(t=>t.type==='despesa'&&t.category==='combustivel'&&t.kmAnterior!=null&&t.kmAtual!=null&&t.kmAtual>t.kmAnterior&&getYM(t.date)===selYM).reduce((a,b)=>a+(b.kmAtual-b.kmAnterior),0));
  const lucroKm=totalKmAll>0?round2(saldo/totalKmAll):null;
  // ganhoHj: selDay activo → esse dia; senão hoje (mês actual) ou último dia com receita
  const tod=today();
  const isCurrentMonth=selYM===curYM();
  const selDate=selDay?selYM+'-'+String(selDay).padStart(2,'0'):null;
  const ganhoHj=selDate
    ?round2(rec.filter(t=>t.date===selDate).reduce((a,b)=>a+b.amount,0))
    :isCurrentMonth
      ?round2(rec.filter(t=>t.date===tod).reduce((a,b)=>a+b.amount,0))
      :round2(rec.filter(t=>t.date===rec.reduce((best,r)=>r.date>best?r.date:best,'')).reduce((a,b)=>a+b.amount,0));
  const meta=AP().metaDiaria||250,metaPct=meta>0?Math.min((ganhoHj/meta)*100,100):0;
  const platD=getRecCats('moto').map(rc=>({id:rc.id,label:rc.label,color:rc.color,value:round2(rec.filter(t=>t.category===rc.id||(t.platform&&t.platform===rc.label)).reduce((a,b)=>a+b.amount,0))})).filter(p=>p.value>0);
  const pieD=cats.map(c=>({...c,value:round2(dep.filter(t=>t.category===c.id).reduce((a,b)=>a+b.amount,0))})).filter(c=>c.value>0);
  const mBills=AP().bills.filter(b=>b.mode===AP().mode);
  const mInst=(AP().installments||[]).filter(g=>g.mode===AP().mode);
  const sBills=mBills.filter(b=>!b.installmentGroupId&&b.dueDate?.startsWith(selYM));
  const parMes=mBills.filter(b=>b.installmentGroupId&&b.dueDate?.startsWith(selYM));
  // DRE — considera todas as receitas exceto 'outros'
  const recCatsMoto=getRecCats('moto');
  const outrosCatId=recCatsMoto.find(c=>c.label.toLowerCase()==='outros'||c.id==='outros_rec')?.id||'outros_rec';
  const recBruta=round2(rec.filter(t=>t.category!==outrosCatId&&!(PLATS.includes(t.platform)&&t.platform==='Outros')).reduce((a,b)=>a+b.amount,0));
  const recOth=round2(rec.filter(t=>t.category===outrosCatId||(t.platform==='Outros'&&!t.category)).reduce((a,b)=>a+b.amount,0));
  const custVar=round2(dep.filter(t=>getCats('moto').find(c=>c.id===t.category&&c.tipo==='variavel')).reduce((a,b)=>a+b.amount,0));
  const despFix=round2(dep.filter(t=>getCats('moto').find(c=>c.id===t.category&&c.tipo==='fixo')).reduce((a,b)=>a+b.amount,0));
  // margC = Receita Operacional - Custos Variáveis (base: recBruta, sem outras receitas)
  const margC=round2(recBruta-custVar);
  // lucro = Margem de Contribuição - Despesas Fixas + Outras Receitas
  const lucro=round2(margC-despFix+recOth);
  const pontoEq=round2(Math.max(0,despFix-margC));
  const margContribPct=recBruta>0?round2(margC/recBruta*100):0;
  // Daily data for chart (last 7 days of selYM or all days)
  const daysInMonth=new Date(parseInt(selYM.split('-')[0]),parseInt(selYM.split('-')[1]),0).getDate();
  const dailyData=Array.from({length:daysInMonth},(_,i)=>{
    const d=`${selYM}-${String(i+1).padStart(2,'0')}`;
    const dr=round2(rec.filter(t=>t.date===d).reduce((a,b)=>a+b.amount,0));
    const dd=round2(dep.filter(t=>t.date===d).reduce((a,b)=>a+b.amount,0));
    return{day:i+1,rec:dr,dep:dd};
  });
  // Projeção corrigida: baseada nos dias passados do período selecionado
  // Se intervalo ativo: (totalR / dias no intervalo) * dias no mês
  // Se mês inteiro: (totalR / diasPassados) * daysInMonth
  // Sem duplicidade com bills — só usa receitas registradas
  let projecao=0;
  if(dateRangeStart&&dateRangeEnd){
    // Intervalo: não faz projeção por dias (período fixo)
    projecao=round2(totalR-totalD); // saldo do intervalo = projeção para o período
  } else {
    const diaAtual=parseInt(today().split('-')[2])||1;
    const diasComDados=new Set(rec.map(t=>t.date)).size; // dias únicos com receita
    if(diasComDados>0){
      const mediaRec=round2(totalR/diaAtual); // média por dia corrido
      projecao=round2(mediaRec*daysInMonth);
    }
  }
  // Prev month comparison
  const prevTxns=AP().transactions.filter(t=>t.mode===AP().mode&&getYM(t.date)===prevYM(selYM));
  const prevLucro=round2(prevTxns.filter(t=>t.type==='receita').reduce((a,b)=>a+b.amount,0)-prevTxns.filter(t=>t.type==='despesa').reduce((a,b)=>a+b.amount,0));
  const tendencia=prevLucro>0?(saldo-prevLucro)/prevLucro*100:null;
  const margLiq=totalR>0?round2(lucro/totalR*100):0;
  // ── Orçamentos ────────────────────────────────────────────────────────
  const budgets=AP().budgets||{};
  const budgetStatus=cats.map(cat=>{
    const limit=budgets[cat.id]||0;
    const spent=round2(dep.filter(t=>t.category===cat.id).reduce((a,b)=>a+b.amount,0));
    const pct=limit>0?Math.min((spent/limit)*100,100):0;
    return{...cat,limit,spent,pct,over:limit>0&&spent>limit};
  }).filter(c=>c.limit>0);
  // ── Saldo / métricas ─────────────────────────────────────────────────
  const savRate=totalR>0?Math.max(0,(totalR-totalD)/totalR):0;
  const billScore=c_mBills=>{const tot=c_mBills.length;const paid=c_mBills.filter(b=>b.paid).length;return tot>0?paid/tot:1};
  const mBills_=mBills.filter(b=>(b.dueDate||'').startsWith(selYM));
  const scoreRaw=Math.round(savRate*40+billScore(mBills_)*35+(metaPct/100)*25);
  const score=Math.min(100,Math.max(0,scoreRaw));
  // ── Comparativo 6 meses ────────────────────────────────────────────────
  const compMonths=[];
  for(let i=5;i>=0;i--){
    let ym=selYM;
    for(let j=0;j<i;j++) ym=prevYM(ym);
    const mTx=AP().transactions.filter(t=>t.mode===AP().mode&&(t.date||'').startsWith(ym));
    compMonths.push({ym,rec:round2(mTx.filter(t=>t.type==='receita').reduce((a,b)=>a+b.amount,0)),dep:round2(mTx.filter(t=>t.type==='despesa').reduce((a,b)=>a+b.amount,0))});
  }
  return{cats,txns,rec,dep,totalR,totalD,saldo,abast,totLit,totKm,consMed,lucroKm,ganhoHj,meta,metaPct,platD,pieD,mBills:mBills_,mInst,sBills,parMes,recBruta,recOth,custVar,despFix,margC,lucro,pontoEq,dailyData,projecao,tendencia,margLiq,margContribPct,selDate,budgetStatus,score,compMonths};
}

// ─── TOOLTIP (modal global centralizado) ─────────────────────────────
function T(id){
  if(!GLOSS[id])return'';
  return'<span class="tip-w"><button class="tip-dot" type="button" onclick=\'event.stopPropagation();tT("'+id+'")\'  aria-label="Saiba mais">!</button></span>';
}
function tT(id){
  const g=GLOSS[id];if(!g)return;
  const ov=document.getElementById('tip-overlay');if(!ov)return;
  document.getElementById('tip-title').textContent=g.term;
  document.getElementById('tip-body').textContent=g.def;
  // display:flex primeiro, depois .show no próximo frame para disparar a transição CSS
  ov.style.display='flex';
  requestAnimationFrame(()=>requestAnimationFrame(()=>ov.classList.add('show')));
}
function closeTip(){
  const ov=document.getElementById('tip-overlay');if(!ov)return;
  ov.classList.remove('show');
  setTimeout(()=>{if(!ov.classList.contains('show'))ov.style.display='none'},260);
}
document.addEventListener('click',function(e){
  // Não interceptar botões funcionais (mas deixar passar tip-dot)
  const _notTip=e.target.closest('button:not(.tip-dot)')||e.target.closest('a');
  if(_notTip) return;
  const btn=e.target.closest?e.target.closest('[data-tip]'):(e.target.getAttribute&&e.target.getAttribute('data-tip')?e.target:null);
  if(btn){
    const id=btn.getAttribute('data-tip');
    if(id){e.preventDefault();tT(id);}
  }
},{capture:true});

// ── Long Press — Extrato (500ms) ──────────────────────────────
(function(){
  let _lpTimer=null,_lpEl=null,_lpMoved=false;
  const THRESHOLD=500;
  function lpStart(e){
    const el=e.target.closest('[data-longpress]');
    if(!el)return;
    // Se este card já está sendo swipado, não activar long-press
    if(el._swipeLocked)return;
    _lpMoved=false;
    _lpEl=el;
    _lpTimer=setTimeout(()=>{
      if(_lpMoved)return;
      const id=el.getAttribute('data-longpress');
      el.classList.add('lp-active');
      if(navigator.vibrate)navigator.vibrate(30);
      setTimeout(()=>el.classList.remove('lp-active'),300);
      longPressMenu(id);
    },THRESHOLD);
  }
  function lpCancel(){
    clearTimeout(_lpTimer);
    _lpTimer=null;
    if(_lpEl){_lpEl.classList.remove('lp-active');_lpEl=null;}
  }
  function lpMove(){_lpMoved=true;lpCancel();}
  document.addEventListener('touchstart',lpStart,{passive:true});
  document.addEventListener('touchend',lpCancel,{passive:true});
  document.addEventListener('touchcancel',lpCancel,{passive:true});
  document.addEventListener('touchmove',lpMove,{passive:true});
  // Mouse (desktop)
  document.addEventListener('mousedown',lpStart);
  document.addEventListener('mouseup',lpCancel);
  document.addEventListener('mousemove',e=>{if(e.buttons)lpMove();});
})();

// ── Swipe Actions — Extrato ────────────────────────────────────
(function(){
  const SWIPE_THRESHOLD = 72;   // px para confirmar ação
  const SWIPE_MAX       = 96;   // máximo de deslocamento
  const AXIS_LOCK       = 8;    // px para travar eixo
  let _active=null; // {wrap, inner, bgL, bgR, startX, startY, curX, axisLocked, direction}

  function getWrap(el){return el.closest('.swipe-wrap');}

  function resetCard(wrap,animate=true){
    const inner=wrap.querySelector('.swipe-inner');
    const bgR=wrap.querySelector('.swipe-bg-right');
    const bgL=wrap.querySelector('.swipe-bg-left');
    if(!animate){inner.classList.add('no-transition');}
    inner.style.transform='translateX(0)';
    bgR.classList.remove('reveal');
    bgL.classList.remove('reveal');
    if(!animate){requestAnimationFrame(()=>{inner.classList.remove('no-transition');});}
    if(inner._swipeLocked) inner._swipeLocked=false;
  }

  function onStart(e){
    const clientX=e.touches?e.touches[0].clientX:e.clientX;
    const clientY=e.touches?e.touches[0].clientY:e.clientY;
    const wrap=getWrap(e.target);
    if(!wrap)return;
    const inner=wrap.querySelector('.swipe-inner');
    const bgR=wrap.querySelector('.swipe-bg-right');
    const bgL=wrap.querySelector('.swipe-bg-left');
    // Fechar qualquer outro card aberto
    if(_active&&_active.wrap!==wrap){resetCard(_active.wrap,true);_active=null;}
    _active={wrap,inner,bgR,bgL,startX:clientX,startY:clientY,curX:0,axisLocked:false,direction:null};
  }

  function onMove(e){
    if(!_active)return;
    const clientX=e.touches?e.touches[0].clientX:e.clientX;
    const clientY=e.touches?e.touches[0].clientY:e.clientY;
    const dx=clientX-_active.startX;
    const dy=clientY-_active.startY;
    if(!_active.axisLocked){
      if(Math.abs(dy)>AXIS_LOCK&&Math.abs(dy)>Math.abs(dx)){_active=null;return;} // scroll vertical
      if(Math.abs(dx)>AXIS_LOCK){_active.axisLocked=true;_active.direction=dx>0?'right':'left';}
      else return;
    }
    // Travar eixo: prevenir scroll vertical enquanto swipando
    if(e.cancelable)e.preventDefault();
    // Marcar inner para impedir long-press
    _active.inner._swipeLocked=true;
    const clamped=Math.max(-SWIPE_MAX,Math.min(SWIPE_MAX,dx));
    _active.curX=clamped;
    _active.inner.classList.add('no-transition');
    _active.inner.style.transform=`translateX(${clamped}px)`;
    _active.inner.classList.remove('no-transition');
    const ratio=Math.abs(clamped)/SWIPE_THRESHOLD;
    if(clamped>0){
      _active.bgR.classList.add('reveal');_active.bgL.classList.remove('reveal');
      _active.bgR.style.opacity=Math.min(1,ratio*0.9+0.1);
    } else if(clamped<0){
      _active.bgL.classList.add('reveal');_active.bgR.classList.remove('reveal');
      _active.bgL.style.opacity=Math.min(1,ratio*0.9+0.1);
    } else {
      _active.bgR.classList.remove('reveal');_active.bgL.classList.remove('reveal');
    }
  }

  function onEnd(e){
    if(!_active)return;
    const {wrap,inner,bgR,bgL,curX}=_active;
    _active=null;
    const id=inner.getAttribute('data-longpress');
    if(Math.abs(curX)>=SWIPE_THRESHOLD){
      // Ação confirmada — animar para fora, executar, depois resetar
      inner.style.transform=`translateX(${curX>0?SWIPE_MAX*1.4:-SWIPE_MAX*1.4}px)`;
      if(navigator.vibrate)navigator.vibrate(40);
      setTimeout(()=>{
        resetCard(wrap,true);
        inner._swipeLocked=false;
        if(curX>0){swipeMarkPaid(id);}
        else{swipeEdit(id);}
      },220);
    } else {
      // Cancelar — voltar ao centro
      inner.style.transform='translateX(0)';
      bgR.classList.remove('reveal');bgL.classList.remove('reveal');
      bgR.style.opacity='';bgL.style.opacity='';
      setTimeout(()=>{inner._swipeLocked=false;},320);
    }
  }

  // Touch events (passive:false para poder preventDefault no move)
  document.addEventListener('touchstart',onStart,{passive:true});
  document.addEventListener('touchmove',onMove,{passive:false});
  document.addEventListener('touchend',onEnd,{passive:true});
  document.addEventListener('touchcancel',onEnd,{passive:true});
  // Mouse (desktop) — pressionar e arrastar
  document.addEventListener('mousedown',onStart);
  document.addEventListener('mousemove',e=>{if(e.buttons===1)onMove(e);});
  document.addEventListener('mouseup',onEnd);
})();

function openDateRangeModal(){

  if(!modal)return;

  const si=document.getElementById('dr-start');
  const ei=document.getElementById('dr-end');
  if(si) si.value=dateRangeStart||(selYM+'-01');
  if(ei){
    if(dateRangeEnd){

    } else {
      const[y,m]=selYM.split('-');
      const last=new Date(parseInt(y),parseInt(m),0).getDate();
      ei.value=`${y}-${m}-${String(last).padStart(2,'0')}`;
    }
  }
  _updateQuickBtns();
  // Highlight active quick btn if range matches one
  if(dateRangeStart&&dateRangeEnd){
    const[y,m]=selYM.split('-');

function setQuickRange(type){
  const n=new Date();
  const pad=v=>String(v).padStart(2,'0');
  const fmt2=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  let start,end=fmt2(n);
  if(type==='mes'){
    const[y,m]=selYM.split('-');
    const daysInMonth=new Date(parseInt(y),parseInt(m),0).getDate();
    start=`${y}-${m}-01`;end=`${y}-${m}-${pad(daysInMonth)}`;
  } else if(type==='week'){
    const dow=n.getDay()||7;
    const mon=new Date(n);mon.setDate(n.getDate()-(dow-1));
    const sun=new Date(mon);sun.setDate(mon.getDate()+6);
    start=fmt2(mon);end=fmt2(sun);
  } else if(type==='7d'){
    const s=new Date(n);s.setDate(n.getDate()-6);
    start=fmt2(s);
  } else if(type==='30d'){
    const s=new Date(n);s.setDate(n.getDate()-29);
    start=fmt2(s);
  }
  dateRangeStart=start;dateRangeEnd=end;
  const si=document.getElementById('dr-start');const ei=document.getElementById('dr-end');
  if(si) si.value=start;if(ei) ei.value=end;
  _updateQuickBtns();
  const btn=document.getElementById('drq-'+type);
  if(btn) btn.className='dr-quick on';
  closeDateRangeModal();
  render();renderHdr();
}

function drawBarChart(canvasId,data){
  const canvas=$(canvasId);if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height,pad=30;
  const dk=S.theme==='dark';
  const gridCol=dk?'rgba(255,255,255,.08)':'rgba(0,0,0,.08)';
  const labelCol=dk?'rgba(255,255,255,.55)':'rgba(0,0,0,.55)';
  // Adaptar largura/gap ao nº de barras (1 barra = vista de dia, 6 = vista de mês)
  const n=data.length;
  const barW=n===1?40:24;
  const gap=n===1?0:38;
  const maxVal=Math.max(...data.map(d=>Math.max(d.rec,d.dep)),1);
  ctx.clearRect(0,0,W,H);
  // Grid lines
  for(let i=0;i<=4;i++){
    const y=pad+(H-pad*2)*(1-i/4);
    ctx.beginPath();ctx.strokeStyle=gridCol;ctx.lineWidth=1;
    ctx.moveTo(pad,y);ctx.lineTo(W-10,y);ctx.stroke();
    ctx.fillStyle=labelCol;ctx.font='10px JetBrains Mono';
    ctx.textAlign='right';ctx.fillText(Math.round(maxVal*i/4),pad-4,y+4);
  }
  // Offset de início para centrar quando há poucos pontos
  const totalW=n*(barW*2+4)+(n-1)*gap;
  const startX=n===1?Math.floor((W-totalW)/2):pad+20;
  data.forEach((d,i)=>{
    const x=startX+i*(barW*2+4+gap);
    const rH=Math.max((d.rec/maxVal)*(H-pad*2),d.rec>0?2:0);
    const dH=Math.max((d.dep/maxVal)*(H-pad*2),d.dep>0?2:0);
    // Rec bar
    const rY=pad+(H-pad*2)-rH;
    const rGrad=ctx.createLinearGradient(0,rY,0,rY+rH);
    rGrad.addColorStop(0,'rgba(0,230,118,.9)');rGrad.addColorStop(1,'rgba(0,230,118,.3)');
    ctx.fillStyle=rGrad;roundRect(ctx,x,rY,barW,rH,4);ctx.fill();
    // Dep bar
    const dY=pad+(H-pad*2)-dH;
    const dGrad=ctx.createLinearGradient(0,dY,0,dY+dH);
    dGrad.addColorStop(0,'rgba(255,51,102,.85)');dGrad.addColorStop(1,'rgba(255,51,102,.25)');
    ctx.fillStyle=dGrad;roundRect(ctx,x+barW+4,dY,barW,dH,4);ctx.fill();
    // Label data
    ctx.fillStyle=labelCol;ctx.font='10px Outfit';
    ctx.textAlign='center';ctx.fillText(d.label,x+barW+2,H-6);
    // Valor no topo da barra (apenas vista de 1 dia)
    if(n===1){
      if(d.rec>0){ctx.fillStyle='rgba(0,230,118,.8)';ctx.font='bold 11px Outfit';ctx.textAlign='center';ctx.fillText('+'+fmtN(d.rec),x+barW/2,rY-5);}
      if(d.dep>0){ctx.fillStyle='rgba(255,51,102,.8)';ctx.font='bold 11px Outfit';ctx.textAlign='center';ctx.fillText('−'+fmtN(d.dep),x+barW*1.5+4,dY-5);}
    }
  });
}
function drawWaveChart(canvasId,data){
  const canvas=$(canvasId);if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height,padL=36,padR=10,padT=10,padB=24;
  const dk=S.theme==='dark';
  const gridCol=dk?'rgba(255,255,255,.08)':'rgba(0,0,0,.08)';
  const labelCol=dk?'rgba(255,255,255,.55)':'rgba(0,0,0,.55)';
  const maxVal=Math.max(...data.flatMap(d=>[d.rec,d.dep]),1);
  ctx.clearRect(0,0,W,H);
  const xOf=i=>padL+i*(W-padL-padR)/(data.length-1||1);
  const yOf=v=>padT+(H-padT-padB)*(1-v/maxVal);
  // Grid + Y labels
  for(let i=0;i<=3;i++){
    const y=padT+(H-padT-padB)*i/3;
    ctx.beginPath();ctx.strokeStyle=gridCol;ctx.lineWidth=1;ctx.moveTo(padL,y);ctx.lineTo(W,y);ctx.stroke();
    const val=maxVal*(1-i/3);
    ctx.fillStyle=labelCol;ctx.font='8px JetBrains Mono';ctx.textAlign='right';
    ctx.fillText(val>=1000?Math.round(val/1000)+'k':Math.round(val),padL-3,y+3);
  }
  const drawArea=(key,col)=>{
    if(data.length<2)return;
    ctx.beginPath();ctx.moveTo(xOf(0),yOf(data[0][key]));
    for(let i=1;i<data.length;i++){const xc=(xOf(i-1)+xOf(i))/2;ctx.bezierCurveTo(xc,yOf(data[i-1][key]),xc,yOf(data[i][key]),xOf(i),yOf(data[i][key]))}
    ctx.lineTo(xOf(data.length-1),H-padB);ctx.lineTo(xOf(0),H-padB);ctx.closePath();
    const grad=ctx.createLinearGradient(0,0,0,H);grad.addColorStop(0,col.replace('1)','.45)'));grad.addColorStop(1,col.replace('1)','0)'));ctx.fillStyle=grad;ctx.fill();
    ctx.beginPath();ctx.moveTo(xOf(0),yOf(data[0][key]));
    for(let i=1;i<data.length;i++){const xc=(xOf(i-1)+xOf(i))/2;ctx.bezierCurveTo(xc,yOf(data[i-1][key]),xc,yOf(data[i][key]),xOf(i),yOf(data[i][key]))}
    ctx.strokeStyle=col.replace('1)','.9)');ctx.lineWidth=2;ctx.stroke();
  };
  drawArea('dep','rgba(255,51,102,1)');drawArea('rec','rgba(0,230,118,1)');
  // X labels
  const step=Math.ceil(data.length/6)||1;
  data.forEach((d,i)=>{if(i%step===0||i===data.length-1){ctx.fillStyle=labelCol;ctx.font='9px Outfit';ctx.textAlign='center';ctx.fillText(d.label,xOf(i),H-6)}});
}
// ─ Donut interativo ─────────────────────────────────────────────────
let _donutData=[], _donutSlices=[], _donutCanvas=null;

function drawDonut(canvasId, data, selectedCatId){
  const canvas=$(canvasId); if(!canvas) return;
  _donutCanvas = canvas;
  _donutData   = data;
  const dpr    = window.devicePixelRatio||1;
  const SIZE   = 140;
  canvas.width  = SIZE*dpr; canvas.height = SIZE*dpr;
  canvas.style.width  = SIZE+'px'; canvas.style.height = SIZE+'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W=SIZE, H=SIZE, cx=W/2, cy=H/2;
  const R=cx-8, r=R*0.54;
  const tot=data.reduce((a,b)=>a+b.value,0); if(!tot) return;

  const hasSel = !!selectedCatId;
  _donutSlices=[];
  ctx.clearRect(0,0,W,H);
  let ang=-Math.PI/2;
  data.forEach((d)=>{
    const slice=2*Math.PI*(d.value/tot);
    const isSel = hasSel && d.id===selectedCatId;
    const isOff = hasSel && !isSel;
    const boost = isSel ? 6 : 0; // fatia selecionada cresce para fora
    const midAng = ang + slice/2;
    const ox = isSel ? Math.cos(midAng)*boost : 0;
    const oy = isSel ? Math.sin(midAng)*boost : 0;

    ctx.save();
    ctx.globalAlpha = isOff ? 0.28 : 1;
    ctx.beginPath();
    ctx.moveTo(cx+ox, cy+oy);
    ctx.arc(cx+ox, cy+oy, R, ang, ang+slice);
    ctx.closePath();
    ctx.fillStyle = d.color;
    ctx.fill();
    // Anel de destaque na fatia selecionada
    if(isSel){
      ctx.beginPath();
      ctx.arc(cx+ox, cy+oy, R+2, ang-0.02, ang+slice+0.02);
      ctx.arc(cx+ox, cy+oy, R-3, ang+slice+0.02, ang-0.02, true);
      ctx.closePath();
      ctx.strokeStyle = d.color;
      ctx.lineWidth = 2.5;
      ctx.stroke();
    }
    ctx.restore();
    _donutSlices.push({id:d.id, label:d.label, color:d.color, startAng:ang, endAng:ang+slice, ox, oy});
    ang+=slice;
  });
  // Buraco central
  const bgCol = S.theme==='dark'?'#161a20':'#ffffff';
  ctx.beginPath(); ctx.arc(cx,cy,r,0,2*Math.PI);
  ctx.fillStyle=bgCol; ctx.fill();
  // Texto central
  if(hasSel){
    const sel=data.find(d=>d.id===selectedCatId);
    if(sel){
      const pct=((sel.value/tot)*100).toFixed(0)+'%';
      ctx.fillStyle=sel.color; ctx.font='bold 15px Outfit,sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(pct, cx, cy-2);
      ctx.fillStyle=S.theme==='dark'?'rgba(240,244,248,.5)':'rgba(55,65,81,.6)';
      ctx.font='600 9px Outfit,sans-serif';
      ctx.fillText(sel.icon||'', cx, cy+12);
    }
  }
}

function attachDonutInteraction(canvasId, data){
  const canvas=$(canvasId); if(!canvas||!data.length) return;
  const SIZE=140;
  function getHitCat(clientX, clientY){
    const rect=canvas.getBoundingClientRect();
    const x=(clientX-rect.left)*(SIZE/rect.width)-SIZE/2;
    const y=(clientY-rect.top)*(SIZE/rect.height)-SIZE/2;
    const dist=Math.sqrt(x*x+y*y);
    const R=SIZE/2-8, r=R*0.54;
    if(dist<r||dist>R+10) return null;
    let ang=Math.atan2(y,x);
    if(ang<-Math.PI/2) ang+=2*Math.PI;
    const tot=data.reduce((a,b)=>a+b.value,0);
    let a=-Math.PI/2;
    for(const d of data){
      const slice=2*Math.PI*(d.value/tot);
      const end=a+slice;
      if(ang>=a&&ang<end) return d.id;
      a=end;
    }
    return null;
  }
  const old=canvas._donutHandler;
  if(old){canvas.removeEventListener('click',old);canvas.removeEventListener('touchend',old);}

  function handler(e){
    e.preventDefault();
    const src=e.touches?e.changedTouches[0]:e;
    const catId=getHitCat(src.clientX,src.clientY);
    if(!catId) return;
    if(navigator.vibrate) navigator.vibrate(8);
    // Anima seleção no donut momentaneamente
    drawDonut(canvasId,data,catId);
    _renderDonutLegend(data,catId);
    setTimeout(()=>{
      openDonutSheet(catId, data);
    },120);
  }
  canvas._donutHandler=handler;
  canvas.addEventListener('click',handler);
  canvas.addEventListener('touchend',handler,{passive:false});
}

function _doRestoreInSheet(txnId,histIdx){
  var tx=AP().transactions.find(function(t){return t.id===txnId;});
  if(!tx) return;
  var h=(tx._editHistory||[])[histIdx];
  if(!h) return;
  var p=h.prev;
  var snap={at:new Date().toISOString(),note:'\u21a9 Restaura\u00e7\u00e3o autom\u00e1tica',prev:{description:tx.description,amount:tx.amount,date:tx.date,category:tx.category,emoji:tx.emoji||''}};
  setPS(function(ps){return Object.assign({},ps,{transactions:ps.transactions.map(function(t){
    if(t.id!==txnId) return t;
    var hist=[snap].concat(t._editHistory||[]).slice(0,20);
    return Object.assign({},t,{description:p.description,amount:p.amount,date:p.date,category:p.category,emoji:p.emoji,_editHistory:hist});
  })});});
  showToast('\u21a9 Vers\u00e3o anterior restaurada!');
  openDonutSheet(p.category||tx.category,_donutData);
}

// ─── ALERTS ───────────────────────────────────────────────────────────
function renderAlerts(mBills){
  // 1. Candidatos: não pagos, vencimento <= 2 dias
  const cands=mBills.filter(b=>!b.paid).map(b=>({...b,d:daysDiff(b.dueDate)})).filter(b=>isFinite(b.d)&&b.d<=2).sort((a,b)=>a.d-b.d);

  // 2. Agrupar por série (installmentGroupId ou nome base normalizado)
  const groups=new Map();
  cands.forEach(b=>{
    // Para parcelamentos: agrupar pelo label base (sem "X/Y") para capturar grupos duplicados
    const baseLabel=(b.label||'').replace(/\s*\(\d+\/\d+\)$/,'').trim();
    const key=b.installmentGroupId
      ? `grp:${baseLabel}|${b.installmentIndex||'0'}` // agrupa duplicados pelo label+parcela
      : baseLabel||b.id;
    if(!groups.has(key)) groups.set(key,[]);
    groups.get(key).push(b);
  });

  // 3. Um alerta por grupo — o mais antigo (já ordenado por d)
  const al=[...groups.values()].map(grp=>({
    bill:    grp[0],                          // mais antigo / urgente
    count:   grp.length,                      // total de vencidas/próximas no grupo
    allPaid: grp.every(x=>x.paid)
  })).sort((a,b)=>a.bill.d-b.bill.d);

  $('alerts-wrap').innerHTML=al.length?`<div style="padding:4px 0 2px">${al.map(({bill:b,count})=>{
    const r=b.d<0,z=b.d===0,u=b.d===1;
    const base=(b.label||'').replace(/\s*\(\d+\/\d+\)$/,'').trim();
    const msg=r?`VENCIDA há ${Math.abs(b.d)}d`:z?'VENCE HOJE!':u?'Vence amanhã':'';
    const extra=count>1?` <span style="background:var(--rose);color:#fff;border-radius:5px;padding:1px 5px;font-size:10px;font-weight:700">${count}x</span>`:'';
    const label=b.installmentGroupId?`${base} (${b.installmentIndex||'?'}/${b.installmentTotal||'?'})`:esc(b.label);
    return`<div class="alert-s ${r||z?'alert-r':'alert-a'} ${r||z?'pulse':''}">${r?'🚨':z?'⚠️':'🔔'}<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"><strong>${msg}</strong>${extra} — ${label} ${fmt(b.amount)}</span>${`<button onclick="pagarBill('${b.id}')" style="padding:5px 10px;border-radius:8px;background:var(--rose);border:none;color:#fff;font-weight:700;font-size:11px;cursor:pointer;white-space:nowrap">Pagar</button>`}</div>`;
  }).join('')}</div>`:'';
}
