var _importFileCtx='tab';
// Vincula o listener ao input fixo uma única vez após o DOM carregar
document.addEventListener('DOMContentLoaded',function(){
  const inp=document.getElementById('bkp-file-input');
  if(inp) inp.addEventListener('change',handleImportFile);
});
function triggerImportFile(ctx){
  _importFileCtx=ctx||'tab';
  const inp=document.getElementById('bkp-file-input');
  if(!inp) return;
  inp.value=''; // reset para permitir selecionar o mesmo arquivo novamente
  inp.click();
}
function handleImportFile(e){
  const file=(e.target||e).files?.[0];
  if(!file) return;
  const errId=_importFileCtx==='tab'?'tab-imp-err':'imp-err';
  const errEl=document.getElementById(errId);
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const p=JSON.parse(ev.target.result);
      const isNew=p.profiles&&Array.isArray(p.profiles)&&p.profiles.length>0;
      const isLegacy=Array.isArray(p.transactions);
      if(!isNew&&!isLegacy) throw new Error('Formato inválido — arquivo não reconhecido.');
      S=migrateToProfiles(p);
      persist();
      if(errEl) errEl.style.display='none';
      closeM(); closeMC();
      render();
      setTimeout(()=>showToast('✅ Backup importado com sucesso!'),150);
    } catch(err){
      if(errEl){
        errEl.textContent='Erro: '+(err.message||'arquivo inválido.');
        errEl.style.display='block';
      } else {
        showToast('⚠️ Erro ao importar: '+(err.message||'arquivo inválido.'));
      }
    }
  };
  reader.onerror=()=>showToast('⚠️ Não foi possível ler o arquivo.');
  reader.readAsText(file);
}

  // Modo herdado do perfil ativo — sem exposição na UI
  const mode=AP().mode||'moto';

function confirmDeleteProfile(id){
  const p=S.profiles.find(x=>x.id===id);
  if(!p||S.profiles.length<=1)return;
  closeM();
  setTimeout(()=>{
    showMC(`<div style="padding:24px">
      <div style="font-size:24px;text-align:center;margin-bottom:12px">⚠️</div>
      <div style="font-size:17px;font-weight:900;text-align:center;margin-bottom:8px">Excluir Perfil</div>
      <div style="font-size:13px;color:var(--text2);text-align:center;margin-bottom:6px">Tem certeza que deseja excluir <strong style="color:var(--text)">"${esc(p.name)}"</strong>?</div>
      <div style="font-size:12px;color:var(--rose);text-align:center;background:var(--rose-dim);border:1px solid rgba(255,51,102,.2);border-radius:10px;padding:10px;margin-bottom:20px">⚠️ Todos os ${(p.transactions||[]).length} lançamentos e dados deste perfil serão perdidos permanentemente.</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <button class="btn btn-ghost" onclick="closeMC();setTimeout(openProfileSwitchModal,180)">Cancelar</button>
        <button class="btn btn-rose" onclick="deleteProfile('${id}')">Excluir</button>
      </div>
    </div>`);
  },180);
}
function deleteProfile(id){
  if(S.profiles.length<=1){showToast('⚠️ Não é possível excluir o único perfil.');return;}
  // Se deletando o perfil ativo, ativar o primeiro disponível
  const wasActive=id===S.activeProfileId;
  S.profiles=S.profiles.filter(p=>p.id!==id);
  if(wasActive) S.activeProfileId=S.profiles[0].id;
  // Remover do Firestore também
  if(window._db&&window._uid){
    try{window._db.collection('usuarios').doc(window._uid).collection('perfis').doc(id).delete().catch(()=>{});}catch(e){}
  }
  persist();applyTheme();render();
  closeMC();
  setTimeout(openProfileSwitchModal,180);
  showToast('🗑️ Perfil excluído.');
}

// ── getCatKey: retorna a chave correta do perfil para o tipo de transação ────
function getCatKey(txType){
  const mode=AP().mode;
  if(txType==='receita') return mode==='moto'?'customRecCats_moto':'customRecCats_pessoal';
  return mode==='moto'?'customCats_moto':'customCats_pessoal';
}
function getCatsForType(txType){
  return txType==='receita'?getRecCats():getCats();
}
function getDefaultsForType(txType){
  const mode=AP().mode;
  if(txType==='receita') return mode==='moto'?[...DEFAULT_REC_CATS_M]:[...DEFAULT_REC_CATS_P];
  return mode==='moto'?[...DEFAULT_CATS_M]:[...DEFAULT_CATS_P];
}

function _delTxnOnly(id){
  setPS(p=>{

    const installments=(p.installments||[]).filter(g=>p.bills.some(b=>b.installmentGroupId===g.id));
    return {...p,transactions,installments};
  });

}
function _delTxnAndGroup(id,gid){

    installments:(p.installments||[]).filter(g=>g.id!==gid)

}

function longPressBill(id, type){
  if(navigator.vibrate) navigator.vibrate([30,60,20]);
  const isInst = type==='inst';

  // Para série: id = installmentGroupId; bill = parcela do mês actual
  const gid  = isInst ? id : null;
  const bill = isInst
    ? (AP().bills.find(b=>b.installmentGroupId===id && (b.dueDate||'').startsWith(selYM))
       || AP().bills.find(b=>b.installmentGroupId===id))
    : AP().bills.find(b=>b.id===id);

  // Variáveis de referência — todas derivadas de bill
  const billId   = bill?.id   || null;
  const billDate = bill?.dueDate || '';
  const lbl      = (bill?.label||'').replace(/\s*\(\d+\/\d+\)$/,'').trim()
                   || (isInst ? 'Parcelamento' : 'Boleto');
  const base     = lbl;

  // ── helpers ──────────────────────────────────────────────
  function dropTxns(labelsArr, s){
    const set=new Set(labelsArr.map(l=>l.trim()));
    return s.transactions.filter(t=>!set.has((t.description||'').trim()));
  }
  function pruneInst(newBills, s){
    if(!gid) return s.installments||[];
    return newBills.some(b=>b.installmentGroupId===gid)
      ? (s.installments||[])
      : (s.installments||[]).filter(g=>g.id!==gid);
  }

  // ── EXCLUIR APENAS ESTE (bill.id único) ──────────────────
  function delOne(){
    if(!billId){ showToast('⚠️ Boleto não encontrado'); return; }
    if(navigator.vibrate) navigator.vibrate(40);
    setPS(p=>{
      const nb=p.bills.filter(b=>b.id!==billId);
      return {...p, bills:nb, installments:pruneInst(nb,p),
        transactions:dropTxns([bill.label||lbl],p)};
    });
    showToast('Boleto excluído');
  }

  // ── EXCLUIR ESTE E FUTUROS (mesmo gid, data >= billDate) ─
  function delFuture(){
    if(!billDate){ showToast('⚠️ Data não encontrada'); return; }
    if(navigator.vibrate) navigator.vibrate([40,30,40]);
    const toRemove = gid
      ? AP().bills.filter(b=>b.installmentGroupId===gid && (b.dueDate||'')>=billDate)
      : AP().bills.filter(b=>b.id===billId);
    const ids    = new Set(toRemove.map(b=>b.id));
    const labels = [...new Set(toRemove.map(b=>b.label))];
    setPS(p=>{
      const nb=p.bills.filter(b=>!ids.has(b.id));
      return {...p, bills:nb, installments:pruneInst(nb,p),
        transactions:dropTxns(labels,p)};
    });
    showToast(`${toRemove.length} boleto(s) excluído(s)`);
  }

  // ── EXCLUIR TODA A SÉRIE (mesmo gid) ─────────────────────
  function delAll(){
    if(navigator.vibrate) navigator.vibrate([40,30,40,30,40]);
    const toRemove = gid
      ? AP().bills.filter(b=>b.installmentGroupId===gid)
      : AP().bills.filter(b=>b.id===billId);
    const ids    = new Set(toRemove.map(b=>b.id));
    const labels = [...new Set(toRemove.map(b=>b.label))];
    setPS(p=>({...p,
      bills:        p.bills.filter(b=>!ids.has(b.id)),
      installments: gid ? (p.installments||[]).filter(g=>g.id!==gid) : (p.installments||[]),
      transactions: dropTxns(labels,p)
    }));
    showToast(`Série excluída (${toRemove.length})`);

  const overlay=document.createElement('div');

function etxSetPay(m){
  window._etxPay=m;
  document.querySelectorAll('[id^="etxp-"]').forEach(b=>b.classList.remove('on'));
  const el=document.getElementById('etxp-'+m);if(el)el.classList.add('on');
  const sec=document.getElementById('etx-card-sec');
  if(sec) sec.style.display=(m==='Crédito'?'block':'none');
}
function etxSetCard(id){
  window._etxCard=id;
  document.querySelectorAll('[id^="etxc-"]').forEach(b=>b.classList.remove('on'));
  const el=document.getElementById('etxc-'+id);if(el)el.classList.add('on');
  // Busca configurações do cartão selecionado
  const card=(AP().creditCards||[]).find(c=>c.id===id);
  // Pré-preenche fechamento e vencimento com os dados do cartão
  const cDay=card?.closingDay||null;
  const dDay=card?.dueDay||null;
  if(cDay) etxSetClosingDay(cDay);
  else {
    // Limpa seleção de fechamento se cartão não tem dia definido
    document.querySelectorAll('[id^="etxclos-"]').forEach(b=>b.classList.remove('on'));
    window._etxClosingDay='';
    const cust=document.getElementById('etx-clos-custom');if(cust)cust.value='';
  }
  if(dDay) etxSetDueDay(dDay);
  else {
    document.querySelectorAll('[id^="etxdue-"]').forEach(b=>b.classList.remove('on'));
    window._etxDueDay='';
    const cust=document.getElementById('etx-due-custom');if(cust)cust.value='';
  }
  // Mostra painel apenas ao clicar num cartão
  const ovr=document.getElementById('etx-invoice-override');
  if(ovr) ovr.style.display='block';
}
function etxSetClosingDay(d){
  window._etxClosingDay=d;
  document.querySelectorAll('[id^="etxclos-"]').forEach(b=>b.classList.remove('on'));
  const el=document.getElementById('etxclos-'+d);if(el)el.classList.add('on');
}
function etxSetDueDay(d){
  window._etxDueDay=d;
  document.querySelectorAll('[id^="etxdue-"]').forEach(b=>b.classList.remove('on'));
  const el=document.getElementById('etxdue-'+d);if(el)el.classList.add('on');
}

function etxCat(id){
  window._etxCat=id;
  const allCats=[...getCats(),...getRecCats()];

    el.className='cchip'+(sel?' on':'');

function saveEditTxn(id){
  const desc=(document.getElementById('etx-desc')?.value||'').trim();
  const amt=round2(parseCurrency(document.getElementById('etx-amt')));
  const date=document.getElementById('etx-date')?.value||today();
  const cat=window._etxCat;
  const editNote=(document.getElementById('etx-editnote')?.value||'').trim();
  const paymentMethod=window._etxPay||'';
  const creditCard=window._etxCard||'';
  const closingDay=window._etxClosingDay||'';
  const invoiceDueDay=window._etxDueDay||'';
  const tags=[..._txTags];
  const err=document.getElementById('etx-err');
  if(amt<=0){if(err){err.textContent='Digite um valor válido.';err.style.display='block'}return}
  const txEmoji=window._etxEmoji!==undefined?window._etxEmoji:(AP().transactions.find(t=>t.id===id)?.emoji||'');
  const orig=AP().transactions.find(t=>t.id===id);
  if(!orig)return;
  // Snapshot do estado anterior para o histórico
  const snap={
    at: new Date().toISOString(),
    note: editNote||'',
    prev:{
      description: orig.description,
      amount: orig.amount,
      date: orig.date,
      category: orig.category,
      emoji: orig.emoji||'',
      paymentMethod: orig.paymentMethod||'',
      creditCard: orig.creditCard||'',
      closingDay: orig.closingDay||'',
      invoiceDueDay: orig.invoiceDueDay||'',
      tags: orig.tags||[]
    }
  };
  setPS(p=>({...p,transactions:p.transactions.map(t=>{
    if(t.id!==id)return t;
    const hist=[snap,...(t._editHistory||[])].slice(0,20);
    return{...t,
      description:desc||t.description,

// ─── AUTO-CREATE RECURRING BILLS ──────────────────────────────────────
function autoCreateRecurring(){
  // For each bill marked as 'fixo', check if it needs to be created for current month
  const curY=selYM.split('-')[0], curM=selYM.split('-')[1];
  const fixedBills=AP().bills.filter(b=>b.recurrence==='fixo'&&b.mode===AP().mode&&!b.installmentGroupId);
  if(!fixedBills.length) return;

  const newBills=[];
  fixedBills.forEach(b=>{
    if(!b.dueDate) return;
    const [y,m]=b.dueDate.split('-');
    // already exists for this month?
    const alreadyHas=AP().bills.some(x=>x.label===b.label&&x.mode===AP().mode&&x.dueDate?.startsWith(selYM));
    if(!alreadyHas && (y!==curY||m!==curM)){
      // create one for current month with same day
      const day=b.dueDate.split('-')[2]||'01';
      const maxDay=new Date(parseInt(curY),parseInt(curM),0).getDate();
      const safeDay=String(Math.min(parseInt(day),maxDay)).padStart(2,'0');
      newBills.push({
        ...b,
        id:uid(),mode:AP().mode,
        dueDate:`${selYM}-${safeDay}`,paid:false,recurrence:'fixo',
        notifEnabled:b.notifEnabled!==false,notifAdvance:b.notifAdvance||'24h'
      });
    }
  });
  if(newBills.length){
    setPS(p=>({...p,bills:[...newBills,...p.bills]}));
    showToast(`🔄 ${newBills.length} conta(s) fixa(s) criada(s) para ${ymLbl(selYM)}`);
  }
}

// ─── COPY FIXED BILLS FROM PREV MONTH ─────────────────────────────────
function copiarFixas(){
  const prev=prevYM(selYM);
  const prevFixed=AP().bills.filter(b=>b.recurrence==='fixo'&&b.mode===AP().mode&&b.dueDate?.startsWith(prev));
  if(!prevFixed.length){showToast('Nenhuma conta fixa no mês anterior.');return}
  const [cy,cm]=selYM.split('-');
  const newBills=[];
  prevFixed.forEach(b=>{
    const already=AP().bills.some(x=>x.label===b.label&&x.mode===AP().mode&&x.dueDate?.startsWith(selYM));
    if(!already){
      const day=b.dueDate.split('-')[2]||'01';
      const maxDay=new Date(parseInt(cy),parseInt(cm),0).getDate();
      const safeDay=String(Math.min(parseInt(day),maxDay)).padStart(2,'0');
      newBills.push({...b,id:uid(),mode:AP().mode,dueDate:`${selYM}-${safeDay}`,paid:false,recurrence:'fixo',notifEnabled:b.notifEnabled!==false,notifAdvance:b.notifAdvance||'24h'});
    }
  });
  if(!newBills.length){showToast('Contas fixas já foram copiadas para este mês.');return}
  setPS(p=>({...p,bills:[...newBills,...p.bills]}));
  showToast(`✅ ${newBills.length} conta(s) fixa(s) copiada(s) de ${ymLblS(prev)}`);
}

      '<div style="padding:9px 6px;border-radius:10px;background:var(--glass);border:1px solid '+(isQuit?'var(--em)':'var(--border)')+';text-align:center">'+

function _addFcAporte(id){
  var aEl=document.getElementById('fc-ap-amt');
  var amt=round2(parseCurrency(aEl));
  var obs=(document.getElementById('fc-ap-obs')?.value||'').trim();
  var catId=document.getElementById('fc-ap-cat')?.value||'';
  var encerrar=document.getElementById('fc-ap-encerrar')?.checked||false;
  if(!amt||amt<=0){showToast('⚠️ Informe um valor.');return;}
  var f=(AP().forecasts||[]).find(function(x){return x.id===id;});
  if(!f)return;
  var isDesp=f.type==='despesa';
  var pmt={id:uid(),amount:amt,date:today(),obs:obs,launched:true};
  var txDesc=f.label+(obs?' · '+obs:'');
  var txCat=catId||(isDesp?(AP().mode==='moto'?'outros_m':'outros_p'):(getRecCats()[0]?.id||''));
  var newTxn={id:uid(),mode:AP().mode,type:isDesp?'despesa':'receita',
    description:txDesc,amount:amt,category:txCat,
    date:today(),emoji:isDesp?'🔴':'💡',fromForecast:id};
  if(encerrar){
    setPS(function(p){return{...p,
      forecasts:(p.forecasts||[]).filter(function(fc){return fc.id!==id;}),
      transactions:[newTxn,...p.transactions]};});
    closeMC();
    showToast('✅ '+fmt(amt)+' efetivado. Previsão encerrada.');
  } else {
    setPS(function(p){return{...p,
      forecasts:(p.forecasts||[]).map(function(fc){return fc.id===id?{...fc,payments:[...(fc.payments||[]),pmt]}:fc;}),
      transactions:[newTxn,...p.transactions]};});
    closeMC();
    var f2=(AP().forecasts||[]).find(function(x){return x.id===id;});
    var totalPmts=round2((f2?.payments||[]).reduce(function(s,p){return s+p.amount;},0));
    var falta2=round2((f2?.amount||0)-totalPmts);
    showToast(falta2>0?'✅ '+fmt(amt)+' efetivado! Faltam '+fmt(falta2)+'.':'✅ '+fmt(amt)+' efetivado! Previsão 100% realizada.');
  }
}

function delFcPayment(fid,pid){
  setPS(p=>({...p,forecasts:(p.forecasts||[]).map(f=>f.id===fid?{...f,payments:(f.payments||[]).filter(p=>p.id!==pid)}:f)}));
}
function delFcPaymentMC(fid,pid){
  delFcPayment(fid,pid);
  // Reabrir modal atualizado
  setTimeout(()=>openFcAporte(fid),60);
}

// alias legado
function openConfirmForecast(id){ openFcAporte(id); }
function _confirmForecast(id){ openFcAporte(id); }

// ─── INIT v26 ─────────────────────────────────────────────────────────
// Bootstrap síncrono — IDB warm-up em background, cloud via onAuthStateChanged
// v26: Firestore offline persistence + listener único + debounce unificado
S = loadS(); applyTheme();

// Warm up IndexedDB cache em background (não-bloqueante)
// Se IDB tem dados mais recentes que localStorage, hidrata silenciosamente
StorageManager.load().then(function(idbState) {
  if (!idbState) return;
  var lsRaw = localStorage.getItem(APP_CONFIG.cache.localKey);
  if (!lsRaw) {
    // IDB tinha dados mas localStorage não — hidrata S do IDB
    try {
      S = migrateToProfiles(idbState);
      applyTheme();
      // Só re-renderiza se o app estiver visível (auth já resolveu)
      var appEl = document.getElementById('app');
      if (appEl && appEl.style.display !== 'none') render();
    } catch(e) {}
  }
}).catch(function() {});

// Expor ao Firebase init (que corre após este script)
window.INIT                = Object.assign({}, INIT); // snapshot do estado inicial
window.migrateToProfiles   = migrateToProfiles;
window.dedupBills          = dedupBills;
window.applyTheme          = applyTheme;
window.autoCreateRecurring = autoCreateRecurring;
window.render              = render;
window.showToast           = showToast;
window.persist             = persist;
// Arquitetura v22 — exposta para debugging e futura migração React/Node
window.APP_CONFIG          = APP_CONFIG;
window.StorageManager      = StorageManager;
window.SubscriptionManager = SubscriptionManager;

// Log de inicialização — console.log simples (compatível com todos os WebViews)
try {
  console.log('[FIN v' + APP_CONFIG.version + '] Inicializado. APP_CONFIG, StorageManager, SubscriptionManager disponíveis no window.');
} catch(e) {}
// onAuthStateChanged vai chamar render() quando auth estiver pronto
</script>
