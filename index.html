</div>`}
function cfBind(){$('cf-lbl').addEventListener('input',function(){CF.label=this.value});$('cf-amt').addEventListener('input',function(){CF.amount=this.value;cfHint()});const fd=$('cf-fdue'),du=$('cf-due'),np=$('cf-npc'),sp=$('cf-sp');if(fd)fd.addEventListener('input',function(){CF.firstDueDate=this.value;cfPrev()});if(du)du.addEventListener('input',function(){CF.dueDate=this.value});if(np)np.addEventListener('input',function(){const v=safeInt(this.value,0);if(v>1){CF.totalParcelas=v;cfSpUpdate();cfChips();cfHint();cfPrev()}});if(sp)sp.addEventListener('input',function(){const v=safeInt(this.value,1);CF.startParcela=Math.max(1,Math.min(v,CF.totalParcelas||60));cfSpUpdate();cfHint();cfPrev();})}
function cfSpUpdate(){
  const nP=safeInt(CF.totalParcelas,2);
  const sP=Math.max(1,Math.min(safeInt(CF.startParcela,1),nP));
  CF.startParcela=sP;
  const tot=$('cf-sp-tot');if(tot)tot.textContent=nP;
  const spVal=$('cf-sp-val');if(spVal)spVal.textContent=sP;
  const spHid=$('cf-sp');if(spHid)spHid.value=sP;
  // Label do campo de data
  const allLbls=document.querySelectorAll('.lbl');
  allLbls.forEach(el=>{if(el.textContent.match(/VENCIMENTO DA PARCELA/))el.textContent=`VENCIMENTO DA PARCELA ${sP} *`;});
}
function cfSpStep(delta){
  const nP=safeInt(CF.totalParcelas,2);
  CF.startParcela=Math.max(1,Math.min((safeInt(CF.startParcela,1)+delta),nP));
  cfSpUpdate();cfHint();cfPrev();
}
function cfRec(){const u=$('cf-r-u'),f=$('cf-r-f');if(u){u.style.borderColor=CF.recurrence==='unico'?'var(--em)':'var(--border)';u.style.background=CF.recurrence==='unico'?'var(--em-dim)':'transparent';u.style.color=CF.recurrence==='unico'?'var(--em)':'var(--text3)'}if(f){f.style.borderColor=CF.recurrence==='fixo'?'var(--em)':'var(--border)';f.style.background=CF.recurrence==='fixo'?'var(--em-dim)':'transparent';f.style.color=CF.recurrence==='fixo'?'var(--em)':'var(--text3)'}}
function cfHint(){const nP=safeInt(CF.totalParcelas,2),amt=safeNum(CF.amount),sP=Math.max(1,Math.min(safeInt(CF.startParcela,1),nP)),countP=nP-sP+1;const h=$('cf-hint');if(h){if(CF.parcelado&&amt>0&&nP>1){h.textContent=sP>1?`Gerando parcelas ${sP} a ${nP} (${countP}x de ${fmt(amt)}) — ${sP-1} já pagas.`:`A despesa será parcelada em ${nP}x de ${fmt(amt)}.`}else h.textContent=''}const la=$('cf-al');if(la)la.textContent=CF.parcelado?'VALOR POR PARCELA *':'VALOR *';const sb=$('cf-sb');if(sb&&!editingBillId){sb.textContent=CF.parcelado?(sP>1?`CRIAR PARCELAS ${sP}→${nP} (${countP}x)`:`CRIAR ${nP}x PARCELAS`):'SALVAR';sb.style.background=CF.parcelado?'var(--amber)':'var(--em)'}}
function cfChips(){[2,3,4,6,8,10,12].forEach(n=>{const el=$('cpc-'+n);if(el)el.className='pchip'+(n===CF.totalParcelas?' on':'')})}
function cfTogPar(){CF.parcelado=!CF.parcelado;const t=$('cf-tog');if(t)t.className='tog'+(CF.parcelado?' on':'');const ps=$('cf-par'),ss=$('cf-single'),lb=$('cf-par-lbl2');if(ps)ps.style.display=CF.parcelado?'block':'none';if(ss)ss.style.display=CF.parcelado?'none':'block';if(lb)lb.textContent=CF.parcelado?'Sim':'Não';cfHint()}
// força estado sem toggle — usado por openEditBill
function cfSetParc(v){if(CF.parcelado!==v){CF.parcelado=v;const t=$('cf-tog');if(t)t.className='tog'+(v?' on':'');const ps=$('cf-par'),ss=$('cf-single'),lb=$('cf-par-lbl2');if(ps)ps.style.display=v?'block':'none';if(ss)ss.style.display=v?'none':'block';if(lb)lb.textContent=v?'Sim':'Não';cfHint();}}
function cfNP(n){CF.totalParcelas=n;const _npc=$('cf-npc');if(_npc)_npc.value=String(n);cfSpUpdate();cfChips();cfHint();cfPrev()}
function cfMode(m){CF.dueDateMode=m;const ab=$('cf-ab'),mb=$('cf-mb');if(ab){ab.style.background=m==='auto'?'var(--em-dim)':'transparent';ab.style.color=m==='auto'?'var(--em)':'var(--text3)'}if(mb){mb.style.background=m==='manual'?'var(--em-dim)':'transparent';mb.style.color=m==='manual'?'var(--em)':'var(--text3)'}cfPrev()}
function cfPrev(){const pEl=$('cf-prev');if(!pEl)return;const nP=safeInt(CF.totalParcelas,2),amt=safeNum(CF.amount),sP=Math.max(1,Math.min(safeInt(CF.startParcela,1),nP)),countP=nP-sP+1;if(!CF.firstDueDate||nP<2){pEl.innerHTML='';return}if(CF.dueDateMode==='auto'){pEl.innerHTML=`<div style="padding:11px;border-radius:12px;background:rgba(0,0,0,.3);border:1px solid var(--border);max-height:140px;overflow-y:auto;margin-bottom:12px"><div class="lbl" style="margin-bottom:7px">PREVIEW (${sP>1?`parcelas ${sP}→${nP}`:`${nP}x`})</div>${Array.from({length:Math.min(countP,24)},(_,i)=>{const idx=sP+i;return`<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:12px"><span style="color:var(--text3)">${idx}/${nP} — ${addMo(CF.firstDueDate,i)}</span><span class="val" style="color:var(--em);font-size:12px">${fmt(amt)}</span></div>`}).join('')}</div>`}else{const rows=Array.from({length:Math.min(countP,24)},(_,i)=>{const idx=sP+i;return i===0?`<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:12px"><span style="color:var(--text3)">${idx}/${nP}</span><span style="color:var(--em)">${CF.firstDueDate}</span></div>`:`<div style="display:flex;align-items:center;gap:7px;padding:2px 0"><span style="font-size:11px;color:var(--text3);width:38px;flex-shrink:0">${idx}/${nP}</span><input type="date" value="${CF.customDates[i]||addMo(CF.firstDueDate,i)}" data-idx="${i}" class="cfd" style="flex:1;padding:4px 7px;border-radius:8px;background:rgba(0,0,0,.4);border:1px solid var(--border);color:var(--text);font-size:11px;outline:none"/></div>`}).join('');pEl.innerHTML=`<div style="padding:11px;border-radius:12px;background:rgba(0,0,0,.3);border:1px solid var(--border);max-height:160px;overflow-y:auto;margin-bottom:12px"><div class="lbl" style="margin-bottom:7px">DATAS INDIVIDUAIS</div>${rows}</div>`;pEl.querySelectorAll('.cfd').forEach(inp=>inp.addEventListener('input',function(){CF.customDates[parseInt(this.dataset.idx)]=this.value}))}}
function cfSave(){
  const lEl=$('cf-lbl'),aEl=$('cf-amt'),fEl=$('cf-fdue'),dEl=$('cf-due');
  if(lEl)CF.label=lEl.value;if(aEl)CF.amount=aEl.value;
  if(fEl)CF.firstDueDate=fEl.value;if(dEl)CF.dueDate=dEl.value;
  const lbl=(CF.label||'').trim(),amt=round2(safeNum(CF.amount));
  if(!lbl){alert('⚠️ Digite o nome da conta.');return}
  if(amt<=0){alert('⚠️ Digite um valor válido.');return}

  // ── MODO EDIÇÃO ───────────────────────────────────────────────────
  if(editingBillId){
    const due=CF.parcelado?CF.firstDueDate:CF.dueDate;
    if(!due){alert('⚠️ Selecione a data de vencimento.');return}

    const eid        = editingBillId;
    const spEl       = $('cf-sp');
    const npcEl      = $('cf-npc');
    // Fonte de verdade: cf-sp (hidden, mantido por cfSpUpdate) > CF.startParcela > 1
    const rawIdx     = spEl ? safeInt(spEl.value, CF.startParcela) : CF.startParcela;
    const newIdx     = Math.max(1, rawIdx);
    const src        = S.bills.find(x=>x.id===eid);
    const gid        = src?.installmentGroupId||null;
    const nT         = src?.installmentTotal||src?.totalParcelas||null;
    // cf-npc.value é mantido por cfNP (chips) e pelo listener cfBind
    const newTotal   = CF.parcelado
      ? Math.max(1, npcEl&&safeInt(npcEl.value,0)>1 ? safeInt(npcEl.value) : safeInt(CF.totalParcelas,nT||2))
      : null;
    const dueDay     = due ? parseInt(due.split('-')[2],10) : null;
    const myNT       = newTotal||nT;
    editingBillId=null;

    // Fallback de grupo por nome base (bills antigos sem installmentGroupId)
    const baseLblSrc=(src?.label||'').replace(/\s*\(\d+\/\d+\)$/,'').trim();

    if(!gid){
      // ── Sem installmentGroupId — actualiza por nome base (série legada) ou só este ──
      const sameGroup=S.bills.filter(x=>{
        const xBase=(x.label||'').replace(/\s*\(\d+\/\d+\)$/,'').trim();
        return xBase===baseLblSrc && x.installmentIndex!=null;
      });
      const isLegacySeries = sameGroup.length > 1;

      setS(s=>({...s,bills:s.bills.map(x=>{
        const xBase=(x.label||'').replace(/\s*\(\d+\/\d+\)$/,'').trim();
        const inGroup = isLegacySeries && xBase===baseLblSrc && x.installmentIndex!=null;
        if(!inGroup && x.id!==eid) return x;
        const myIdx = x.id===eid ? newIdx : (x.installmentIndex||newIdx);
        const relI  = myIdx - newIdx;
        let newDue;
        if(CF.dueDateMode!=='auto'){
          newDue = relI===0
            ? (CF.firstDueDate||x.dueDate)
            : (CF.customDates[relI]||addMo(CF.firstDueDate,relI)||x.dueDate);
        } else {
          newDue = x.id===eid ? due : x.dueDate;
          if(isLegacySeries && dueDay && x.dueDate){
            const p=x.dueDate.split('-');
            const maxD=new Date(+p[0],+p[1],0).getDate();
            newDue=`${p[0]}-${p[1]}-${String(Math.min(dueDay,maxD)).padStart(2,'0')}`;
          }
        }
        const xNT   = myNT!=null ? myNT : (x.installmentTotal||x.totalParcelas||null);
        const xLbl  = xNT ? `${lbl} (${myIdx}/${xNT})` : lbl;
        return{...x,label:xLbl,amount:amt,dueDate:newDue,recurrence:CF.recurrence,
          installmentIndex:myIdx,
          installmentTotal:xNT,
          totalParcelas:xNT};
      })}));
    } else {
      // ── Série com installmentGroupId — actualiza TODOS do grupo ──────
      setS(s=>({...s,
        bills:s.bills.map(x=>{
          if(x.installmentGroupId!==gid) return x;
          // Índice deste bill relativo ao sP (para lookup em customDates)
          const myIdx = x.id===eid ? newIdx : (x.installmentIndex||newIdx);
          const relI  = myIdx - newIdx; // 0 = parcela editada, 1+ = seguintes
          let newDue;
          if(CF.dueDateMode!=='auto'){
            // modo manual: 1ª parcela = firstDueDate, restantes = customDates[relI]
            newDue = relI===0
              ? (CF.firstDueDate||x.dueDate)
              : (CF.customDates[relI]||addMo(CF.firstDueDate,relI)||x.dueDate);
          } else {
            // modo auto: propagar novo dia mantendo o mês de cada boleto
            newDue = x.dueDate;
            if(dueDay&&x.dueDate){
              const p=x.dueDate.split('-');
              const maxD=new Date(+p[0],+p[1],0).getDate();
              newDue=`${p[0]}-${p[1]}-${String(Math.min(dueDay,maxD)).padStart(2,'0')}`;
            }
          }
          const xLbl  = myNT ? `${lbl} (${myIdx}/${myNT})` : lbl;
          // paid preservado pelo spread ...x
          return{...x,label:xLbl,amount:amt,dueDate:newDue,recurrence:CF.recurrence,
            installmentIndex:myIdx,
            installmentTotal:myNT,
            totalParcelas:myNT};
        }),
        // Actualizar registo-mestre → cabeçalho da aba Contas
        installments:(s.installments||[]).map(g=>g.id!==gid?g:
          {...g,label:lbl,amountPerParcela:amt,
            ...(myNT!=null?{totalParcelas:myNT}:{})})
      }));
    }

    showToast('Conta atualizada ✅');
    closeM();
    return;
  }

  // ── MODO CRIAÇÃO — lógica original intacta ────────────────────────
  if(CF.parcelado){
    if(!CF.firstDueDate){alert('⚠️ Selecione o vencimento da 1ª parcela.');return}
    const nP=safeInt(CF.totalParcelas,2),gid=uid();
    const startP=Math.max(1,Math.min(safeInt(CF.startParcela,1),nP));
    const countP=nP-startP+1;
    const grp={id:gid,mode:S.mode,label:lbl,amountPerParcela:amt,totalParcelas:nP,startParcela:startP};
    const bills=Array.from({length:countP},(_,i)=>{
      const idx=startP+i;
      const dueDate=CF.dueDateMode==='auto'
        ?addMo(CF.firstDueDate,i)
        :(CF.customDates[i]||addMo(CF.firstDueDate,i));
      return{id:uid(),mode:S.mode,label:`${lbl} (${idx}/${nP})`,amount:amt,dueDate,paid:false,installmentGroupId:gid,installmentIndex:idx,installmentTotal:nP,recurrence:CF.recurrence,notifEnabled:true,notifAdvance:'24h'};
    });
    setS(s=>{const clean=dedupBills([...bills,...s.bills]);return{...s,installments:[grp,...(s.installments||[])],bills:clean};});
  } else {
    if(!CF.dueDate){alert('⚠️ Selecione a data de vencimento.');return}
    setS(s=>({...s,bills:[{id:uid(),mode:S.mode,label:lbl,amount:amt,dueDate:CF.dueDate,paid:false,recurrence:CF.recurrence,notifEnabled:true,notifAdvance:'24h'},...s.bills]}));
  }
  closeM();
}

function exportBkp(){
  try{
    const json=JSON.stringify(S,null,2);
    const b=new Blob([json],{type:'application/json'});
    const u=URL.createObjectURL(b);
    const a=document.createElement('a');
    a.href=u;a.download='fin_backup_'+today()+'.json';
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(u);},300);
    showToast('✅ Backup exportado!');
  }catch(e){
    // Fallback: abre como data URI em nova aba
    const uri='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(S,null,2));
    window.open(uri,'_blank');
    showToast('Backup aberto em nova aba — salve manualmente.');
  }
}

function longPressBill(id, type){
  if(navigator.vibrate) navigator.vibrate([30,60,20]);
  const isInst = type==='inst';

  // Para série: id = installmentGroupId; bill = parcela do mês actual
  const gid  = isInst ? id : null;
  const bill = isInst
    ? (S.bills.find(b=>b.installmentGroupId===id && (b.dueDate||'').startsWith(selYM))
       || S.bills.find(b=>b.installmentGroupId===id))
    : S.bills.find(b=>b.id===id);

  // Variáveis de referência — todas derivadas de bill
  const billId   = bill?.id   || null;
  const billDate = bill?.dueDate || '';
  const lbl      = (bill?.label||'').replace(/\s*\(\d+\/\d+\)$/,'').trim()
                   || (isInst ? 'Parcelamento' : 'Boleto');
  const base     = lbl;

  // ── helpers ──────────────────────────────────────────────
  function dropTxns(labelsArr, s){
    const set=new Set(labelsArr.map(l=>l.trim()));
    return s.transactions.filter(t=>!set.has((t.description||'').trim()));
  }
  function pruneInst(newBills, s){
    if(!gid) return s.installments||[];
    return newBills.some(b=>b.installmentGroupId===gid)
      ? (s.installments||[])
      : (s.installments||[]).filter(g=>g.id!==gid);
  }

  // ── EXCLUIR APENAS ESTE (bill.id único) ──────────────────
  function delOne(){
    if(!billId){ showToast('⚠️ Boleto não encontrado'); return; }
    if(navigator.vibrate) navigator.vibrate(40);
    setS(s=>{
      const nb=s.bills.filter(b=>b.id!==billId);
      return {...s, bills:nb, installments:pruneInst(nb,s),
        transactions:dropTxns([bill.label||lbl],s)};
    });
    showToast('Boleto excluído');
  }

  // ── EXCLUIR ESTE E FUTUROS (mesmo gid, data >= billDate) ─
  function delFuture(){
    if(!billDate){ showToast('⚠️ Data não encontrada'); return; }
    if(navigator.vibrate) navigator.vibrate([40,30,40]);
    const toRemove = gid
      ? S.bills.filter(b=>b.installmentGroupId===gid && (b.dueDate||'')>=billDate)
      : S.bills.filter(b=>b.id===billId);
    const ids    = new Set(toRemove.map(b=>b.id));
    const labels = [...new Set(toRemove.map(b=>b.label))];
    setS(s=>{
      const nb=s.bills.filter(b=>!ids.has(b.id));
      return {...s, bills:nb, installments:pruneInst(nb,s),
        transactions:dropTxns(labels,s)};
    });
    showToast(`${toRemove.length} boleto(s) excluído(s)`);
  }

  // ── EXCLUIR TODA A SÉRIE (mesmo gid) ─────────────────────
  function delAll(){
    if(navigator.vibrate) navigator.vibrate([40,30,40,30,40]);
    const toRemove = gid
      ? S.bills.filter(b=>b.installmentGroupId===gid)
      : S.bills.filter(b=>b.id===billId);
    const ids    = new Set(toRemove.map(b=>b.id));
    const labels = [...new Set(toRemove.map(b=>b.label))];
    setS(s=>({...s,
      bills:        s.bills.filter(b=>!ids.has(b.id)),
      installments: gid ? (s.installments||[]).filter(g=>g.id!==gid) : (s.installments||[]),
      transactions: dropTxns(labels,s)
    }));
    showToast(`Série excluída (${toRemove.length})`);

}

// ─── AUTO-CREATE RECURRING BILLS ──────────────────────────────────────
function autoCreateRecurring(){
  // For each bill marked as 'fixo', check if it needs to be created for current month
  const curY=selYM.split('-')[0], curM=selYM.split('-')[1];
  const fixedBills=S.bills.filter(b=>b.recurrence==='fixo'&&b.mode===S.mode&&!b.installmentGroupId);
  if(!fixedBills.length) return;

  const newBills=[];
  fixedBills.forEach(b=>{
    if(!b.dueDate) return;
    const [y,m]=b.dueDate.split('-');
    // already exists for this month?
    const alreadyHas=S.bills.some(x=>x.label===b.label&&x.mode===S.mode&&x.dueDate?.startsWith(selYM));
    if(!alreadyHas && (y!==curY||m!==curM)){
      // create one for current month with same day
      const day=b.dueDate.split('-')[2]||'01';
      const maxDay=new Date(parseInt(curY),parseInt(curM),0).getDate();
      const safeDay=String(Math.min(parseInt(day),maxDay)).padStart(2,'0');
      newBills.push({
        id:uid(),mode:S.mode,label:b.label,amount:b.amount,
        dueDate:`${selYM}-${safeDay}`,paid:false,recurrence:'fixo',
        notifEnabled:b.notifEnabled!==false,notifAdvance:b.notifAdvance||'24h'
      });
    }
  });
  if(newBills.length){
    setS(s=>({...s,bills:[...newBills,...s.bills]}));
    showToast(`🔄 ${newBills.length} conta(s) fixa(s) criada(s) para ${ymLbl(selYM)}`);
  }
}

// ─── COPY FIXED BILLS FROM PREV MONTH ─────────────────────────────────
function copiarFixas(){
  const prev=prevYM(selYM);
  const prevFixed=S.bills.filter(b=>b.recurrence==='fixo'&&b.mode===S.mode&&b.dueDate?.startsWith(prev));
  if(!prevFixed.length){showToast('Nenhuma conta fixa no mês anterior.');return}
  const [cy,cm]=selYM.split('-');
  const newBills=[];
  prevFixed.forEach(b=>{
    const already=S.bills.some(x=>x.label===b.label&&x.mode===S.mode&&x.dueDate?.startsWith(selYM));
    if(!already){
      const day=b.dueDate.split('-')[2]||'01';
      const maxDay=new Date(parseInt(cy),parseInt(cm),0).getDate();
      const safeDay=String(Math.min(parseInt(day),maxDay)).padStart(2,'0');
      newBills.push({id:uid(),mode:S.mode,label:b.label,amount:b.amount,dueDate:`${selYM}-${safeDay}`,paid:false,recurrence:'fixo',notifEnabled:b.notifEnabled!==false,notifAdvance:b.notifAdvance||'24h'});
    }
  });
  if(!newBills.length){showToast('Contas fixas já foram copiadas para este mês.');return}
  setS(s=>({...s,bills:[...newBills,...s.bills]}));
  showToast(`✅ ${newBills.length} conta(s) fixa(s) copiada(s) de ${ymLblS(prev)}`);
}
